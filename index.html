function invLoadFromOrder(){
  captureInvoiceForm();
  const cid=invForm.customerId;
  let list=(DB.orders||[]).slice();
  if(cid)list=list.filter(o=>o.customerId===cid);
  list=list.filter(o=>(o.items||[]).length).sort((a,b)=>String(b.created||'').localeCompare(String(a.created||''))).slice(0,15);
  if(!list.length){toast(cid?t('inv_no_orders_cust'):t('no_orders'),'bad');renderInvoiceForm();return;}
  const rowsH=list.map(o=>{
    const names=sortItems(o.items||[]).map(g=>{const x=G(g);return x?x.n:g;}).join(', ');
    return `<div class="cust-result" style="margin-bottom:8px" onclick="invPullOrder('${o.id}')">
      <div><b>#${esc(o.orderNo)} · ${esc(o.customerName||'')}</b>
      <div class="hint">${esc(names)}</div>
      <div class="hint">📅 ${fmtDate(o.deliveryDate)}${o.total?' · ₹'+esc(o.total):''}</div></div>
      <span class="btn sm primary">${t('select')}</span></div>`;}).join('');
  modal(t('pick_order'),`<p class="hint" style="margin-bottom:10px">${t('inv_load_order_hint')}</p>${rowsH}`,
    [{label:t('cancel'),cls:'ghost',fn:()=>renderInvoiceForm()}]);
}
function invPullOrder(oid){
  const o=(DB.orders||[]).find(x=>x.id===oid); if(!o){renderInvoiceForm();return;}
  const items=orderBillLines(o);
  if(!items.length){renderInvoiceForm();return;}
  const existing=(invForm.items||[]).filter(it=>it.label||+it.rate);
  invForm.items=existing.concat(items);
  if(!invForm.deliveryDate&&o.deliveryDate)invForm.deliveryDate=o.deliveryDate;
  if(!invForm.salesmanId&&o.salesmanId)invForm.salesmanId=o.salesmanId;
  if(!invForm.customerId&&o.customerId){invForm.customerId=o.customerId;invForm.customerName=o.customerName||'';invForm.phone=o.phone||'';}
  closeSheet(); renderInvoiceForm(); toast(t('inv_loaded',{n:items.length}),'ok');
}

function invCustSearch(q){const box=$('#invCustResults');q=q.trim().toLowerCase();if(q.length<2){box.innerHTML='';return;}
  const hits=(DB.customers||[]).filter(c=>(c.name||'').toLowerCase().includes(q)||(c.phone||'').includes(q)).slice(0,5);
  box.innerHTML=hits.map(c=>`<div class="cust-result" style="margin-top:7px" onclick="invPickCustomer('${c.id}')"><div><b>${esc(c.name)}</b><div class="hint">${esc(c.phone||'')}</div></div><span class="btn sm primary">${t('select')}</span></div>`).join('');}
function invPickCustomer(id){captureInvoiceForm();const c=custById(id);if(!c)return;invForm.customerId=id;invForm.customerName=c.name;invForm.phone=c.phone;renderInvoiceForm();}
async function invPickContact(){
  if(!(navigator.contacts&&navigator.contacts.select)){toast(t('contacts_na'),'bad');return;}
  try{
    const sel=await navigator.contacts.select(['name','tel'],{multiple:false});
    if(!sel||!sel.length)return;
    const c=sel[0];
    const nm=(c.name&&c.name[0])?c.name[0]:'';
    let tel=(c.tel&&c.tel[0])?String(c.tel[0]).replace(/\s+/g,''):'';
    captureInvoiceForm();
    invForm.customerId=null; if(nm)invForm.customerName=nm; if(tel)invForm.phone=tel;
    if(tel){const d=tel.replace(/\D/g,'').slice(-10);
      const ex=(DB.customers||[]).find(x=>(x.phone||'').replace(/\D/g,'').slice(-10)===d);
      if(ex){invForm.customerId=ex.id;invForm.customerName=ex.name;invForm.phone=ex.phone;}}
    renderInvoiceForm();toast(t('t_contact_loaded'),'ok');
  }catch(e){}
}

function updateInvTotals(){

  const set=(id,v)=>{const e=$('#'+id); if(e)e.textContent=v;};
  set('tSub',money(comp.gross));

function previewInvoice(){
  captureInvoiceForm();const f=invForm;
  const rec=invRecOf(f.kind,f.id); if(!rec)return;
  const tempInv={no:f.no,date:f.date,interstate:f.interstate,paymentMode:f.paymentMode,discType:f.discType||'amount',discValue:f.discValue||0,items:f.items};
  let previewRec=rec;
  if(f.kind==='sale'){
    const comp=invCompute(tempInv);
    const recv=(f.receivedNow!=null)?f.receivedNow:comp.total;
    previewRec=Object.assign({},rec,{customerName:f.customerName||'',phone:f.phone||'',total:comp.total,notes:f.notes||'',
      payments:recv>0?[{amt:recv,date:f.date}]:[]});
  }
  const html=buildInvoiceHTML(previewRec,tempInv);
  const win=window.open('','_blank');
  if(win){win.document.write(html);win.document.close();}
  else{toast(t('t_popup_blocked'),'bad');}
}
function invAddItem(){captureInvoiceForm();invForm.items.push({label:'',hsn:'',qty:1,unit:'Pcs',rate:'',price:'',disc:0,incl:[],includes:'',masterId:''});renderInvoiceForm();}
function invDelItem(i){captureInvoiceForm();invForm.items.splice(i,1);renderInvoiceForm();}
function captureInvoiceForm(){const f=invForm;
  if($('#inv_no'))f.no=$('#inv_no').value.trim();
  if($('#inv_date'))f.date=$('#inv_date').value;
  if($('#inv_inter'))f.interstate=$('#inv_inter').checked;
  if($('#inv_pm'))f.paymentMode=$('#inv_pm').value;
  if($('#inv_disctype'))f.discType=$('#inv_disctype').value;
  if($('#inv_discval'))f.discValue=+$('#inv_discval').value||0;
  if($('#inv_cname')&&!f.customerId)f.customerName=$('#inv_cname').value.trim();
  if($('#inv_cphone')&&!f.customerId)f.phone=$('#inv_cphone').value.trim();
  if($('#inv_notes'))f.notes=$('#inv_notes').value.trim();
  if($('#inv_recv'))f.receivedNow=$('#inv_recv').value===''?null:(+$('#inv_recv').value||0);
  if($('#inv_ddate'))f.deliveryDate=$('#inv_ddate').value;
  if($('#pos_ono'))f.orderNo=($('#pos_ono').value||'').trim();
  if($('#inv_sm'))f.salesmanId=$('#inv_sm').value;
  document.querySelectorAll('[data-iin]').forEach(inp=>{f.items[+inp.dataset.iin].label=inp.value.trim();});
  document.querySelectorAll('[data-ihsn]').forEach(inp=>{f.items[+inp.dataset.ihsn].hsn=inp.value.trim();});
  document.querySelectorAll('[data-iqty]').forEach(inp=>{f.items[+inp.dataset.iqty].qty=(+inp.value||1);});
  document.querySelectorAll('[data-irate]').forEach(inp=>{f.items[+inp.dataset.irate].rate=+inp.value||0;});
  // line amount = qty x rate ; keep .price (line total) for GST engine & printing
  (f.items||[]).forEach(it=>{ it.qty=+it.qty||1; it.rate=+it.rate||0; it.price=r2(it.qty*it.rate);
    it.incl=Array.isArray(it.incl)?it.incl:[]; it.includes=it.incl.join(', '); });
}
function saveInvoice(){
  captureInvoiceForm();const f=invForm;
  if(!f.no){toast(t('t_no_invno'),'bad');return;}
  f.items=(f.items||[]).filter(it=>it.label||+it.price);
  if(!f.items.length||f.items.every(it=>!(+it.price))){toast(t('t_no_invitem'),'bad');return;}

  // Make-to-order: this bill belongs on a real ORDER, not a counter sale.
  // Create the order (or reuse the number), move everything onto it, drop the sale stub.
  if(f.kind==='sale' && f.saleType==='mto'){
    const ono=(f.orderNo||'').trim() || nextOrderNo();
    let o=(DB.orders||[]).find(x=>String(x.orderNo).toLowerCase()===ono.toLowerCase());
    let cust=null;
    if(f.customerId)cust=(DB.customers||[]).find(x=>x.id===f.customerId);
    if(!cust&&f.customerName){
      cust=(DB.customers||[]).find(x=>String(x.name||'').toLowerCase()===f.customerName.toLowerCase()&&(x.phone||'')===(f.phone||''));
      if(!cust){cust={id:uid(),name:f.customerName,phone:f.phone||'',m:{}};DB.customers.push(cust);}
    }
    if(!o){
      o={id:uid(),created:new Date().toISOString(),orderNo:ono,
        customerId:cust?cust.id:null,customerName:f.customerName||'',phone:f.phone||'',
        items:[],itemStatus:{},m:{},design:{},photos:[],voiceNotes:[],log:[],
        deliveryDate:f.deliveryDate||'',salesmanId:f.salesmanId||'',
        total:0,payments:[],notes:f.notes||'',fromBill:true};
      DB.orders.push(o);
    }else{
      if(cust){o.customerId=cust.id;o.customerName=f.customerName||o.customerName;o.phone=f.phone||o.phone;}
      if(f.deliveryDate)o.deliveryDate=f.deliveryDate;
    }
    // remove the temporary sale stub this form was sitting on
    DB.sales=(DB.sales||[]).filter(x=>x.id!==f.id);
    f.kind='order'; f.id=o.id; f.saleType=null;
    save();
  }

  const rec=invRecOf(f.kind,f.id); if(!rec)return;
  rec.invoice={no:f.no,date:f.date,interstate:f.interstate,paymentMode:f.paymentMode,discType:f.discType||'amount',discValue:f.discValue||0,
    deliveryDate:f.deliveryDate||'',salesmanId:f.salesmanId||'',items:f.items};
  // delivery date & salesman live on the record so they print on the invoice
  if(f.deliveryDate)rec.deliveryDate=f.deliveryDate;
  rec.salesmanId=f.salesmanId||'';

  // the bill is now the final word on the amount — write it back onto the record
  if(f.kind==='order'||f.kind==='alt'){
    rec.total=invCompute(rec.invoice).total;
    // all money lives on the bill now: the "Received" box is the advance
    migratePayments(rec);
    if((rec.payments||[]).length<=1 && f.receivedNow!=null){
      const recv=+f.receivedNow||0;
      rec.payments = recv>0 ? [{amt:recv,date:f.date||todayISO()}] : [];
    }
  }
  // an order created from the billing screen has no payment of its own — take it from the bill
  if(f.kind==='order' && rec.fromBill){
    const comp=invCompute(rec.invoice);
    rec.total=comp.total;
    if(f.customerName)rec.customerName=f.customerName;
    if(f.phone)rec.phone=f.phone;
    const recv=(f.receivedNow!=null)?f.receivedNow:comp.total;
    if(!(rec.payments||[]).length){ rec.payments = recv>0?[{amt:recv,date:f.date}]:[]; }
  }
  if(f.kind==='sale'){
    const comp=invCompute(rec.invoice);
    rec.customerName=f.customerName||'';rec.phone=f.phone||'';rec.total=comp.total;rec.notes=f.notes||'';
    if(f.customerId)rec.customerId=f.customerId;
    else{ let c=(DB.customers||[]).find(x=>(x.name||'').toLowerCase()===(f.customerName||'').toLowerCase()&&(x.phone||'')===(f.phone||''));
      if(!c&&f.customerName){c={id:uid(),name:f.customerName,phone:f.phone||'',m:{}};DB.customers.push(c);}
      if(c)rec.customerId=c.id; }
    const recv=(f.receivedNow!=null)?f.receivedNow:comp.total;
    rec.payments=recv>0?[{amt:recv,date:f.date}]:[];
  }
  // learn any new item names into the master so next bill is one tap
  DB.itemMaster=DB.itemMaster||[];
  f.items.forEach(it=>{ if(!it.label)return;
    let m=DB.itemMaster.find(x=>String(x.name).toLowerCase()===String(it.label).toLowerCase());
    if(!m){ DB.itemMaster.push({id:uid(),name:it.label,hsn:it.hsn||'',rate:it.rate||'',incl:[...(it.incl||[])],kind:'stitch',stk:{}}); }
  });
  // readymade items leave stock; stitched (made-to-order) items never touch stock
  if(!f._stockDone){
    f.items.forEach(it=>{
      const m=DB.itemMaster.find(x=>x.id===it.masterId);
      if(!m||m.kind!=='ready')return;
      const sz=it.size||'';
      const q=+it.qty||1;
      if(sz){ readySet(m,sz,readyQty(m,sz)-q); }
      move({dir:MV_OUT,target:'ready',itemId:m.id,size:sz,qty:q,rate:+it.rate||0,
        reason:'sale',ref:'Invoice '+f.no,refId:f.id});
    });
    f._stockDone=true;
    rec.invoice._stockDone=true;
  }
  save();closeSheet();toast(t('t_invoice_saved'),'ok');
  invQ=''; invSort='new';
  go('invoices');                       // the new bill is right there when you close the preview
  openInvoicePreview(f.kind,f.id);
}

function delSale(id){confirmModal(t('confirm_del'),t('confirm_del_msg'),()=>{

function buildInvoiceText(rec,inv){
  const comp=invCompute(inv);
  const prevBal=customerOutstanding(rec.customerId,rec.orderNo?'order':(rec.altNo?'alt':'sale'),rec.id);
  const currBal=r2(prevBal+orderBaaki(rec));
  let s=`${(DB.shopInfo&&DB.shopInfo.name)||'PARAMPARA'}\nGSTIN: ${(DB.shopInfo&&DB.shopInfo.gstin)||''}\n\nInvoice No: ${inv.no}\nDate: ${fmtDate(inv.date)}\n`;
  if(rec.orderNo)s+=`Order #${rec.orderNo}\n`; else if(rec.altNo)s+=`Alteration #${rec.altNo}\n`;
  if(rec.deliveryDate)s+=`📅 Delivery Date: ${fmtDate(rec.deliveryDate)}\n`;
  const sm=rec.salesmanId?(DB.salesmen||[]).find(x=>x.id===rec.salesmanId):null;
  if(sm)s+=`Salesman: ${sm.name}${sm.phone?' ('+sm.phone+')':''}\n`;
  s+='\n';
  (inv.items||[]).forEach(it=>{const qty=+it.qty||1;const p=+it.price||0;
    s+=`${it.label}${qty>1?' x'+qty:''} — ${money(p)} (GST ${invRate(p/qty)}%)${it.includes?'\n  Includes: '+it.includes:''}\n`;});
  if(comp.discount>0)s+=`\nGross: ${money(comp.gross)}\nDiscount: −${money(comp.discount)}\n`;
  s+=`\nTaxable: ${money(comp.taxable)}\n`;
  if(inv.interstate)s+=`IGST: ${money(comp.igst)}\n`; else s+=`CGST: ${money(comp.cgst)}  SGST: ${money(comp.sgst)}\n`;
  s+=`Grand Total: ${money(comp.total)}\nReceived: ${money(orderReceived(rec))}\nBalance: ${money(orderBaaki(rec))}\n`;
  s+=`Payment Mode: ${inv.paymentMode||'Cash'}\n`;
  if(prevBal>0)s+=`\nPrevious Balance: ${money(prevBal)}\nCurrent Balance: ${money(currBal)}\n`;
  if(rec.notes)s+=`\nNotes: ${rec.notes}\n`;
  if(DB.shopInfo&&DB.shopInfo.terms)s+=`\n---\n${DB.shopInfo.terms}\n`;
  return s;
}

function invoiceGreetingText(rec,inv){

function wrapCanvasText(ctx,text,maxWidth){
  const words=String(text).split(' ');let lines=[],cur='';
  words.forEach(w=>{const test=cur?cur+' '+w:w;if(ctx.measureText(test).width>maxWidth&&cur){lines.push(cur);cur=w;}else cur=test;});
  if(cur)lines.push(cur);return lines;
}
function buildInvoiceCanvas(rec,inv){
  const comp=invCompute(inv),shop=DB.shopInfo||{};
  const received=orderReceived(rec),baaki=orderBaaki(rec);
  const prevBal=customerOutstanding(rec.customerId,rec.orderNo?'order':(rec.altNo?'alt':'sale'),rec.id);
  const currBal=r2(prevBal+baaki);
  const W=750,pad=40,contentW=W-pad*2;
  const meas=document.createElement('canvas').getContext('2d');
  const L=[];
  if(shop.blessing)L.push({t:shop.blessing,s:19,b:1,c:'#a8590a'});
  L.push({t:shop.name||'PARAMPARA',s:34,b:1,c:'#c97e10'});
  if(shop.tagline)L.push({t:shop.tagline,s:16,c:'#2e7d32',b:1});
  if(shop.address)L.push({t:shop.address,s:16,c:'#444'});
  L.push({t:'GSTIN: '+(shop.gstin||''),s:15,c:'#444'});
  L.push({rule:1,gap:16});
  L.push({t:'TAX INVOICE',s:14,b:1,c:'#888'});
  L.push({t:'Invoice No: '+inv.no+'   ·   Date: '+fmtDate(inv.date),s:19,b:1,c:'#111'});
  if(rec.orderNo)L.push({t:'Order No: '+rec.orderNo,s:16,c:'#444'});
  else if(rec.altNo)L.push({t:'Alteration No: '+rec.altNo,s:16,c:'#444'});
  if(rec.deliveryDate)L.push({t:'Delivery Date: '+fmtDate(rec.deliveryDate),s:18,b:1,c:'#7a4f01',hl:'#fff3cd'});
  L.push({gap:10});
  L.push({t:(rec.customerName||'').toUpperCase(),s:22,b:1,c:'#111'});
  L.push({t:'Contact: '+(rec.phone||''),s:16,c:'#444'});
  const sm=rec.salesmanId?(DB.salesmen||[]).find(x=>x.id===rec.salesmanId):null;
  if(sm)L.push({t:'Salesman: '+sm.name+(sm.phone?' ('+sm.phone+')':''),s:15,c:'#555'});
  L.push({rule:1,gap:14});
  (inv.items||[]).forEach(it=>{const p=+it.price||0,qty=+it.qty||1;
    L.push({t:it.label||'Item',s:19,b:1,c:'#111',right:money(p),rightS:19,rightB:1});
    L.push({t:qty>1?`Qty ${qty}`:'',s:14,c:'#777'});
    if(it.includes)L.push({t:'Includes: '+it.includes,s:14,c:'#777',italic:1});
    L.push({gap:6});});
  L.push({rule:1,gap:12});
  L.push({t:'Sub Total',s:16,c:'#444',right:money(comp.gross),rightS:16});
  if(comp.discount>0)L.push({t:'Discount',s:16,c:'#444',right:'− '+money(comp.discount),rightS:16});
  L.push({t:'Grand Total',s:24,b:1,c:'#111',right:money(comp.total),rightS:24,rightB:1});
  L.push({gap:6});
  L.push({t:'Received',s:16,c:'#444',right:money(received),rightS:16});
  L.push({t:'Balance Due',s:19,b:1,c:baaki>0?'#c0392b':'#2e7d32',right:money(baaki),rightS:19,rightB:1});
  if(prevBal>0){L.push({gap:6});
    L.push({t:'Previous Balance',s:15,c:'#666',right:money(prevBal),rightS:15});
    L.push({t:'Current Balance',s:16,b:1,c:'#444',right:money(currBal),rightS:16,rightB:1});}
  L.push({t:'Payment Mode: '+(inv.paymentMode||'Cash'),s:15,c:'#555'});
  L.push({rule:1,gap:14});
  if(shop.terms){
    L.push({t:'Terms & Conditions',s:15,b:1,c:'#555'});
    meas.font='13px Arial,sans-serif';
    String(shop.terms).split('\n').forEach(line=>{if(!line.trim())return;
      wrapCanvasText(meas,line,contentW).forEach(w=>L.push({t:w,s:13,c:'#777'}));});
  }
  let h=pad*2;
  L.forEach(l=>{h+=l.gap?l.gap:0; if(l.t!=='')h+= (l.s?l.s*1.7:24); if(l.rule)h+=6;});
  const qAmt = (DB.shopInfo&&DB.shopInfo.qrOpen) ? 0 : (baaki>0?baaki:comp.total);
  const qUri = (()=>{try{return upiUri(qAmt,'Invoice '+inv.no);}catch(e){return null;}})();
  const QBLOCK = qUri ? 300 : 0;          // room for the UPI QR at the bottom
  h += QBLOCK;
  const c=document.createElement('canvas');c.width=W;c.height=h;const x=c.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,h);let y=pad+24;
  L.forEach(l=>{
    if(l.gap)y+=l.gap;
    if(l.rule){x.strokeStyle='#ddd';x.beginPath();x.moveTo(pad,y);x.lineTo(W-pad,y);x.stroke();y+=6;return;}
    if(l.t===''){return;}
    if(l.hl){x.fillStyle=l.hl;x.font=(l.b?'bold ':'')+(l.s||16)+'px Arial,sans-serif';const wtxt=x.measureText(l.t).width;x.fillRect(pad-4,y-l.s,wtxt+8,l.s+10);}
    x.fillStyle=l.c||'#111';x.font=(l.italic?'italic ':'')+(l.b?'bold ':'')+(l.s||16)+'px Arial,sans-serif';x.fillText(l.t,pad,y);
    if(l.right){x.font=(l.rightB?'bold ':'')+(l.rightS||16)+'px Arial,sans-serif';const rw=x.measureText(l.right).width;x.fillText(l.right,W-pad-rw,y);}
    y+=(l.s?l.s*1.7:24);
  });
  // --- UPI QR at the bottom (space reserved above) ---
  try{
    if(qUri){
      const q=qrCanvas(qUri,300);
      const qs=200, qx=(W-qs)/2, qy=h-QBLOCK+30;
      x.fillStyle='#fff'; x.fillRect(qx-10,qy-10,qs+20,qs+20);
      x.strokeStyle='#ddd'; x.lineWidth=1; x.strokeRect(qx-10,qy-10,qs+20,qs+20);
      x.drawImage(q,qx,qy,qs,qs);
      x.textAlign='center';
      x.fillStyle='#111'; x.font='bold 18px sans-serif';
      x.fillText('Scan & Pay'+(qAmt>0?'  '+money(qAmt):''), W/2, qy+qs+32);
      x.fillStyle='#666'; x.font='14px sans-serif';
      x.fillText((DB.shopInfo&&DB.shopInfo.upi)||'', W/2, qy+qs+54);
      x.textAlign='left';
    }
  }catch(e){}
  return c;
}
async function waInvoice(kind,id){const rec=invRecOf(kind,id);if(!rec||!rec.invoice)return;

function allInvoices(){
  const list=[];
  (DB.orders||[]).forEach(o=>{if(o.invoice)list.push({kind:'order',rec:o,inv:o.invoice});});
  (DB.alterations||[]).forEach(a=>{if(a.invoice)list.push({kind:'alt',rec:a,inv:a.invoice});});

  list.sort((x,y)=>String(y.inv.date||'').localeCompare(String(x.inv.date||'')));
  return list;
}
let invQ='', invSort='new';
function setInvQ(v){invQ=v;renderInvoices(true);}
function setInvSort(v){invSort=v;renderInvoices();}
const SORTS=[['new','↓ '],['old','↑ '],['hi','₹↓ '],['lo','₹↑ ']];
function sortChips(cur,fn){
  return `<div class="gtags" style="margin-bottom:10px">
    <span class="gtag ${cur==='new'?'on-tag':''}" style="cursor:pointer" onclick="${fn}('new')">🕐 ${t('srt_new')}</span>
    <span class="gtag ${cur==='old'?'on-tag':''}" style="cursor:pointer" onclick="${fn}('old')">🕐 ${t('srt_old')}</span>
    <span class="gtag ${cur==='hi'?'on-tag':''}" style="cursor:pointer" onclick="${fn}('hi')">₹ ${t('srt_hi')}</span>
    <span class="gtag ${cur==='lo'?'on-tag':''}" style="cursor:pointer" onclick="${fn}('lo')">₹ ${t('srt_lo')}</span>
  </div>`;
}
function applySort(arr,mode,dateOf,amtOf){
  const a=arr.slice();
  if(mode==='old')a.sort((x,y)=>String(dateOf(x)||'').localeCompare(String(dateOf(y)||'')));
  else if(mode==='hi')a.sort((x,y)=>amtOf(y)-amtOf(x));
  else if(mode==='lo')a.sort((x,y)=>amtOf(x)-amtOf(y));
  else a.sort((x,y)=>String(dateOf(y)||'').localeCompare(String(dateOf(x)||'')));
  return a;
}
function renderInvoices(keepFocus){
  const el=$('#invList');
  const all=allInvoices();
  const head=`<div class="row" style="margin-bottom:12px;gap:8px">
    <button class="btn primary" style="flex:2" onclick="openSaleForm()">+ ${t('new_sale')}</button>
    <button class="btn ghost simple-hide" style="flex:1" onclick="go('reports')">📊 ${t('reports')}</button></div>`;

  if(!all.length){ el.innerHTML=head+`<div class="empty"><div class="big">🧾</div><p><b>${t('no_invoices')}</b></p><p style="font-size:13px">${t('no_invoices_sub2')}</p></div>`; return; }

  const q=(invQ||'').trim().toLowerCase();
  const list=q?all.filter(x=>{
    const no=String(x.inv.no||'').toLowerCase();
    const nm=String(x.rec.customerName||'').toLowerCase();
    const ph=String(x.rec.phone||'');
    const ref=String(x.rec.orderNo||x.rec.altNo||'').toLowerCase();
    return no.includes(q)||nm.includes(q)||ph.includes(q)||ref.includes(q);
  }):all;

  const searchBox=`<div class="field" style="margin-bottom:10px">
    <input id="invSearch" value="${esc(invQ)}" placeholder="🔍 ${t('inv_search_ph')}" oninput="setInvQ(this.value)"></div>`

  const title=`<div class="kv" style="margin:0 0 10px">
    <h3 style="margin:0;font-size:16px">📋 ${t('inv_all')}</h3>
    <span class="hint">${t('inv_count',{n:list.length})}</span></div>`;

  if(!list.length){ el.innerHTML=head+searchBox+title+`<div class="empty"><p>${t('inv_none_match')}</p></div>`; if(keepFocus)focusInvSearch(); return; }

  const amtOf=x=>invCompute(x.inv).total;
  if(invSort==='hi'||invSort==='lo'){
    const flat=applySort(list,invSort,x=>x.inv.date,amtOf);
    el.innerHTML=head+searchBox+title+flat.map(x=>invCardHTML(x)).join('');

  const groups={};
  list.forEach(x=>{const mk=String(x.inv.date||'').slice(0,7)||'—';(groups[mk]=groups[mk]||[]).push(x);});
  const monthName=mk=>{if(mk==='—')return '—';const[y,m]=mk.split('-');return new Date(+y,+m-1,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});};

  el.innerHTML=head+searchBox+title+Object.keys(groups).sort().reverse().map(mk=>{
    const rows=applySort(groups[mk],invSort,x=>x.inv.date,x=>invCompute(x.inv).total);
    let sales=0,tax=0;
    rows.forEach(x=>{const c=invCompute(x.inv);sales+=c.total;tax+=c.cgst+c.sgst+c.igst;});
    return `<div class="section-h" style="display:flex;justify-content:space-between;align-items:baseline">${monthName(mk)}
      <span style="font-size:12px;font-weight:600;color:var(--txt2)">${t('inv_sales')}: <b style="color:var(--txt)">${money(r2(sales))}</b> · ${t('inv_tax')}: <b style="color:var(--txt)">${money(r2(tax))}</b></span></div>`+
      rows.map(x=>invCardHTML(x)).join('');
  }).join('');
  if(keepFocus)focusInvSearch();

function capturePurchForm(){const f=purchForm;if(!f)return;
  if($('#pu_supplier'))f.supplier=$('#pu_supplier').value.trim();
  if($('#pu_phone'))f.phone=$('#pu_phone').value.trim();
  if($('#pu_billno'))f.billNo=$('#pu_billno').value.trim();
  if($('#pu_date'))f.date=$('#pu_date').value;
  if($('#pu_paid'))f.paidNow=$('#pu_paid').value===''?null:(+$('#pu_paid').value||0);
  if($('#pu_pm'))f.paymentMode=$('#pu_pm').value;
  if($('#pu_disctype'))f.discType=$('#pu_disctype').value;
  if($('#pu_discval'))f.discValue=+$('#pu_discval').value||0;
  if($('#pu_notes'))f.notes=$('#pu_notes').value.trim();
  document.querySelectorAll('[data-puin]').forEach(inp=>{f.items[+inp.dataset.puin].label=inp.value.trim();});
  document.querySelectorAll('[data-puhsn]').forEach(inp=>{f.items[+inp.dataset.puhsn].hsn=inp.value.trim();});
  document.querySelectorAll('[data-puqty]').forEach(inp=>{f.items[+inp.dataset.puqty].qty=+inp.value||0;});
  document.querySelectorAll('[data-puunit]').forEach(inp=>{f.items[+inp.dataset.puunit].unit=inp.value.trim()||'Pcs';});
  document.querySelectorAll('[data-purate]').forEach(inp=>{f.items[+inp.dataset.purate].rate=+inp.value||0;});
  document.querySelectorAll('[data-puamt]').forEach(inp=>{f.items[+inp.dataset.puamt].amount=+inp.value||0;});
}
function purchAddItem(){capturePurchForm();purchForm.items.push({label:'',hsn:'',qty:1,unit:'Mtr',rate:'',amount:0});renderPurchaseForm();}
function purchDelItem(i){capturePurchForm();purchForm.items.splice(i,1);if(!purchForm.items.length)purchForm.items.push({label:'',hsn:'',qty:1,unit:'Mtr',rate:'',amount:0});renderPurchaseForm();}
function purchRateQtyChanged(i){capturePurchForm();const it=purchForm.items[i];
  if((+it.qty||0)&&(+it.rate||0)){it.amount=r2((+it.qty)*(+it.rate));const amtEl=document.querySelector(`[data-puamt="${i}"]`);if(amtEl)amtEl.value=it.amount;}
  updatePurchTotal();}
function purchCompute(f){
  const gross=r2(f.items.reduce((s,it)=>s+(+it.amount||0),0));
  let discAmt=f.discType==='percent'?r2(gross*(+f.discValue||0)/100):r2(+f.discValue||0);
  discAmt=Math.max(0,Math.min(discAmt,gross));
  return {gross,discount:discAmt,total:r2(gross-discAmt)};
}

let rpPeriod='month', rpFrom='', rpTo='';
function rpRange(){
  const today=new Date();const iso=d=>d.toISOString().slice(0,10);
  if(rpPeriod==='week'){const d=new Date(today);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return {from:iso(d),to:iso(today)};}
  if(rpPeriod==='month'){return {from:iso(new Date(today.getFullYear(),today.getMonth(),1)),to:iso(today)};}
  return {from:rpFrom||iso(new Date(today.getFullYear(),today.getMonth(),1)),to:rpTo||iso(today)};
}

async function recToggle(btn,lbl,onDone){
  if(recorder&&recorder.state==='recording'){recorder.stop();return;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){micHelp();return;}
  try{recStream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(err){ if(err&&(err.name==='NotAllowedError'||err.name==='SecurityError'))micHelp(); else toast('Mic: '+(err.name||'error'),'bad'); return; }
  let mime='';['audio/webm','audio/mp4','audio/ogg'].forEach(m=>{if(!mime&&window.MediaRecorder&&MediaRecorder.isTypeSupported(m))mime=m;});
  try{recorder=mime?new MediaRecorder(recStream,{mimeType:mime}):new MediaRecorder(recStream);}catch(e){recorder=new MediaRecorder(recStream);}
  recChunks=[];
  recorder.ondataavailable=e=>{if(e.data&&e.data.size)recChunks.push(e.data);};
  recorder.onstop=async()=>{
    const blob=new Blob(recChunks,{type:recorder.mimeType||'audio/webm'});
    if(recStream){recStream.getTracks().forEach(tr=>tr.stop());recStream=null;}
    clearInterval(recTimer); if(btn){btn.classList.remove('recording');btn.textContent='🎙️';} if(lbl)lbl.textContent=t('vn_hint');
    if(blob.size>0){const vid='voice_'+uid();try{await mPut(vid,blob);onDone&&onDone(vid);toast(t('t_voice'),'ok');}catch(e){toast('Save fail','bad');}}
    recorder=null;
  };
  recorder.start();recT0=Date.now(); if(btn){btn.classList.add('recording');btn.textContent='⏹️';}
  recTimer=setInterval(()=>{const s=Math.floor((Date.now()-recT0)/1000); if(lbl)lbl.textContent=`${t('recording')}  ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;},200);
}

function slipCanvas(o,itemId){
  const items=itemId?[itemId]:sortItems(o.items);

  L.push({t:'PARAMPARA',s:38,b:1,c:'#c97e10'});
  L.push({t:'Order #'+o.orderNo,s:30,b:1,c:'#111'});

  L.push({t:'Delivery: '+fmtDate(masterDate(o.deliveryDate)),s:24,c:'#444'});

    L.push({t:(g.ico||'')+' '+g.n,s:28,b:1,c:'#111',rule:1});
    cols.forEach(col=>{if(v[col.k])L.push({t:'   '+col.n+':  '+v[col.k],s:25,c:'#222'});});
    if(o.design&&o.design[gid])L.push({t:'   ✎ '+o.design[gid],s:22,c:'#666'});
    L.push({gap:10});});
  if(o.notes){L.push({t:'Note: '+o.notes,s:22,c:'#444'});L.push({gap:6});}
  let h=pad*2; L.forEach(l=>h+=l.gap?l.gap:lh);
  const c=document.createElement('canvas');c.width=W;c.height=h;const x=c.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,h);let y=pad+20;
  L.forEach(l=>{ if(l.gap){y+=l.gap;return;} x.fillStyle=l.c||'#111'; x.font=(l.b?'bold ':'')+(l.s||24)+'px Arial,sans-serif'; x.fillText(l.t,pad,y);
    if(l.rule){x.strokeStyle='#ddd';x.beginPath();x.moveTo(pad,y+8);x.lineTo(W-pad,y+8);x.stroke();} y+=lh; });
  return c;
}

function doExport(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=u;a.download='parampara-orderbook-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000);markBackup();renderOrders();closeSheet();toast('Backup ✓','ok');}
async function shareBackup(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const file=new File([blob],'parampara-backup-'+new Date().toISOString().slice(0,10)+'.json',{type:'application/json'});
  markBackup();renderOrders();
  try{ if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:'PARAMPARA Backup'}); closeSheet(); return; } }
  catch(e){ if(e&&e.name==='AbortError'){closeSheet();return;} }
  doExport();
}
function doImport(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.orders)throw 0;
      confirmModal(t('restore_title'),t('restore_msg'),()=>{DB=d;if(!DB.customers)DB.customers=[];if(!DB.designLib)DB.designLib={};if(!DB.karigars)DB.karigars=[];save();closeSheet();go('orders');toast(t('t_restored'),'ok');});
    }catch(_){toast(t('t_wrong'),'bad');}};r.readAsText(f);};inp.click();}
async function restoreSnapshotMenu(){
  const keys=(await mKeys()).filter(k=>String(k).indexOf('snap_')===0).sort().reverse();
  if(!keys.length){toast(t('no_snapshots'),'bad');return;}
  modal(t('auto_backups'),`<p class="hint" style="margin-bottom:10px">${t('auto_backups_desc')}</p>`+keys.map(k=>`<button class="btn ghost block" style="margin-bottom:8px" onclick="restoreSnapshot('${k}')">🕑 ${String(k).replace('snap_','')}</button>`).join(''),[{label:t('close'),cls:'ghost',fn:closeSheet}]);
}
async function restoreSnapshot(key){
  let data=await mGet(key); if(!data){toast(t('t_wrong'),'bad');return;}
  if(data instanceof Blob)data=await data.text();
  confirmModal(t('restore_title'),t('restore_msg'),()=>{try{const d=JSON.parse(data);if(!d.orders)throw 0;DB=d;if(!DB.customers)DB.customers=[];if(!DB.designLib)DB.designLib={};if(!DB.karigars)DB.karigars=[];save();closeSheet();go('orders');toast(t('t_restored'),'ok');}catch(e){toast(t('t_wrong'),'bad');}});
}

/* ====================== MODAL / TOAST ====================== */
let _sheetOn=false, _popping=false, _curTab='home', _exitArm=0;
function sheetIsOpen(){return $('#scrim').classList.contains('show');}
function pushGuard(){try{history.pushState({pbGuard:Date.now()},'');}catch(e){}}
function showSheet(){closeModal();$('#scrim').classList.add('show');_sheetOn=true;}
function closeSheet(){
  if(modalIsOpen()){ closeModal(); return; }      // a modal on top closes first — the form stays
  $('#scrim').classList.remove('show');$('#fracbar').classList.remove('show');
  _sheetOn=false;   // history guard stays put; back press is handled in popstate
  try{ clearInterval(_draftTick); clearTimeout(_draftT); }catch(e){}
}
window.addEventListener('popstate',()=>{
  _popping=true;
  try{
    if(modalIsOpen()){ closeModal(); pushGuard(); return; }     // back out of the modal only
    if(sheetIsOpen()||_sheetOn){ saveDraft(); closeSheet(); pushGuard(); return; }
    if(_curTab && _curTab!=='home'){ go('home'); pushGuard(); return; }
    // on Home with nothing open: ask once before letting the app close
    const now=Date.now();
    if(now-_exitArm>2200){ _exitArm=now; toast(t('back_exit'),''); pushGuard(); return; }
    // second press within 2.2s -> let it go (app closes)
  } finally { _popping=false; }
});
$('#scrim').addEventListener('click',e=>{if(e.target===$('#scrim'))closeSheet();});
/* A modal lives on its own layer. It must NEVER wipe the sheet underneath —
   that used to destroy a half-filled order form (and everything typed into it). */
function modalIsOpen(){ const e=$('#mscrim'); return !!e && e.classList.contains('show'); }
function modal(title,html,actions){
  const acts=(actions||[]).map((a,i)=>`<button class="btn ${a.cls||'ghost'}" data-mi="${i}">${a.label}</button>`).join('');
  $('#msheet').innerHTML=`<div class="grip"></div>${title?`<h3 style="margin-bottom:14px">${title}</h3>`:''}${html}${actions&&actions.length?`<div class="modal-actions">${acts}</div>`:''}`;
  (actions||[]).forEach((a,i)=>{const b=$('#msheet').querySelector(`[data-mi="${i}"]`);if(b)b.onclick=a.fn;});
  $('#mscrim').classList.add('show');
  $('#msheet').scrollTop=0;
}
function closeModal(){ const e=$('#mscrim'); if(e)e.classList.remove('show'); }
function confirmModal(ti,m,onYes){modal(ti,`<p style="color:var(--txt2);font-size:14px;line-height:1.6">${m}</p>`,[{label:t('no'),cls:'ghost',fn:closeSheet},{label:t('yes'),cls:'danger',fn:()=>{closeSheet();onYes();}}]);}
let toastT=null;
function toast(msg,kind){const el=$('#toast');el.textContent=msg;el.className='toast show '+(kind||'');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2400);}

/* ====================== INIT ====================== */
function updateHeadStat(){const due=DB.orders.reduce((s,o)=>s+orderBaaki(o),0);
  const hs=$('#headStat');if(hs)hs.innerHTML=`<b>${DB.orders.length}</b> ${t('orders_word')} · <b>${money(due)}</b> ${t('due')}<br><span onclick="backupMenu()" style="text-decoration:underline;cursor:pointer">💾 ${t('backup')}</span>`;}
async function init(){load();try{await openIDB();}catch(e){}applyLang();document.body.classList.toggle('simple-mode',localStorage.getItem('pb_ob_simple')==='1');renderHome();_curTab='home';pushGuard();}
init();
</script>
