function slipCanvas(o,itemId){
  const items=itemId?[itemId]:sortItems(o.items);
  const W=720,pad=44,lh=44; const L=[];
  L.push({t:'PARAMPARA',s:38,b:1,c:'#c97e10'});
  L.push({t:'Order #'+o.orderNo,s:30,b:1,c:'#111'});
  L.push({t:(o.customerName||''),s:26,c:'#111'});
  L.push({t:'Delivery: '+fmtDate(masterDate(o.deliveryDate)),s:24,c:'#444'});
  L.push({gap:14});
  items.forEach(gid=>{const g=G(gid);if(!g)return;const cols=mcols(g),v=o.m[gid]||{};
    L.push({t:(g.ico||'')+' '+g.n,s:28,b:1,c:'#111',rule:1});
    cols.forEach(col=>{if(v[col.k])L.push({t:'   '+col.n+':  '+v[col.k],s:25,c:'#222'});});
    if(o.design&&o.design[gid])L.push({t:'   ✎ '+o.design[gid],s:22,c:'#666'});
    L.push({gap:10});});
  if(o.notes){L.push({t:'Note: '+o.notes,s:22,c:'#444'});L.push({gap:6});}
  let h=pad*2; L.forEach(l=>h+=l.gap?l.gap:lh);
  const c=document.createElement('canvas');c.width=W;c.height=h;const x=c.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,h);let y=pad+20;
  L.forEach(l=>{ if(l.gap){y+=l.gap;return;} x.fillStyle=l.c||'#111'; x.font=(l.b?'bold ':'')+(l.s||24)+'px Arial,sans-serif'; x.fillText(l.t,pad,y);
    if(l.rule){x.strokeStyle='#ddd';x.beginPath();x.moveTo(pad,y+8);x.lineTo(W-pad,y+8);x.stroke();} y+=lh; });
  return c;
}
async function itemWA(oid,gid){const o=DB.orders.find(x=>x.id===oid);if(!o)return;
  const text=buildMasterText(o,gid?[gid]:sortItems(o.items));
  try{
    const files=[];
    const c=slipCanvas(o,gid);
    const slipBlob=await new Promise(r=>c.toBlob(r,'image/png'));
    if(slipBlob)files.push(new File([slipBlob],'PARAMPARA-'+o.orderNo+'.png',{type:'image/png'}));
    const gids=gid?[gid]:sortItems(o.items);
    for(const k of gids){ for(const pid of((o.itemPhotos&&o.itemPhotos[k])||[])){const b=await mGet(pid);if(b)files.push(new File([b],'photo-'+pid+'.jpg',{type:b.type||'image/jpeg'}));} }
    if(navigator.canShare&&files.length&&navigator.canShare({files})){ await navigator.share({files,title:'Order #'+o.orderNo,text}); return; }
    if(navigator.canShare&&files[0]&&navigator.canShare({files:[files[0]]})){ await navigator.share({files:[files[0]],title:'Order #'+o.orderNo,text}); return; }
  }catch(e){ if(e&&e.name==='AbortError')return; }
  waSend('',text);
}
function buildPrintHTML(o,itemId){
  const items=itemId?[itemId]:sortItems(o.items);
  const blocks=items.map(gid=>{const g=G(gid);if(!g)return '';const cols=mcols(g),v=o.m[gid]||{};
    const rows=cols.filter(col=>v[col.k]).map(col=>`<tr><td>${esc(col.n)}</td><td><b>${esc(v[col.k])}</b></td></tr>`).join('');
    const dn=(o.design&&o.design[gid])?`<div class="dn">✎ ${esc(o.design[gid])}</div>`:'';
    return `<div class="item"><h3>${g.ico||''} ${esc(g.n)}</h3><table>${rows||'<tr><td>—</td><td></td></tr>'}</table>${dn}</div>`;}).join('');
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Order ${esc(o.orderNo)}</title><style>
    *{font-family:Arial,sans-serif;color:#111;-webkit-print-color-adjust:exact}
    body{margin:22px}

    .dn{margin-top:8px;font-size:14px;color:#444;font-style:italic}
    @media print{@page{margin:12mm}body{margin:0}}
  </style></head><body>
    <div class="hd"><div class="b">PARAMPARA</div><div class="o">Order #${esc(o.orderNo)}</div></div>
    <div class="meta"><b>Customer:</b> ${esc(o.customerName)} &nbsp;&nbsp; <b>Phone:</b> ${esc(o.phone||'-')}<br>
      <b>Delivery:</b> ${fmtDate(masterDate(o.deliveryDate))} &nbsp;&nbsp; <b>Order date:</b> ${fmtDate(o.orderDate)}</div>
    ${blocks}
    ${o.notes?`<div class="item"><h3>Note</h3><div style="font-size:15px">${esc(o.notes)}</div></div>`:''}
  </body></html>`;
}
function doPrint(o,itemId){
  const ifr=document.createElement('iframe');

function imCapture(){const d=_imDraft; if(!d)return;
  if($('#im_name'))d.name=$('#im_name').value.trim();
  if($('#im_hsn'))d.hsn=$('#im_hsn').value.trim();
  if($('#im_rate'))d.rate=$('#im_rate').value;
}
function imTogglePart(p){imCapture();const d=_imDraft;const i=d.incl.indexOf(p);
  if(i>=0)d.incl.splice(i,1); else d.incl.push(p); imRender();}
function imAddPart(){imCapture();_imDraft._keep=true;
  modal(t('im_add_part'),`<div class="field"><label>${t('im_new_part')}</label><input id="newPart" placeholder="${t('im_part_ph')}"></div>`,
    [{label:t('cancel'),cls:'ghost',fn:()=>{_imDraft._keep=true;imRender();}},
     {label:t('save'),cls:'primary',fn:()=>{const v=$('#newPart').value.trim();
       if(v){DB.inclLib=DB.inclLib||[];if(!DB.inclLib.includes(v))DB.inclLib.push(v);_imDraft.incl.push(v);save();}
       _imDraft._keep=true;imRender();}}]);
  setTimeout(()=>{const el=$('#newPart');if(el)el.focus();},120);
}
function imSave(){imCapture();const d=_imDraft;
  if(!d.name){toast(t('t_no_im_name'),'bad');return;}
  DB.itemMaster=DB.itemMaster||[];
  let rec;
  if(d.id){rec=DB.itemMaster.find(x=>x.id===d.id);Object.assign(rec,{name:d.name,hsn:d.hsn,rate:d.rate,incl:[...d.incl],photos:[...(d.photos||[])]});}
  else{rec={id:uid(),name:d.name,hsn:d.hsn,rate:d.rate,incl:[...d.incl],photos:[...(d.photos||[])]};DB.itemMaster.push(rec);}
  save();toast(t('t_item_saved'),'ok');
  const back=d.back; const newId=rec.id; _imDraft=null;
  if(back&&back.type==='inv'){ if(back.i>=0)invApplyMaster(back.i,newId); else { renderInvoiceForm(); posAdd(newId); } }
  else itemMaster();
}
function imBack(){const back=_imDraft?_imDraft.back:null;_imDraft=null;
  if(back&&back.type==='inv')renderInvoiceForm(); else itemMaster();}
function imDelete(id){confirmModal(t('confirm_del'),t('confirm_del_msg'),()=>{
  DB.itemMaster=(DB.itemMaster||[]).filter(x=>x.id!==id);save();itemMaster();toast(t('t_deleted'));});}

function salesmanMaster(){
  const ks=DB.salesmen||[];
  $('#sheet').innerHTML=`<div class="grip"></div><h2 style="margin-bottom:6px">${t('salesman_master')}</h2>
    <p class="hint" style="margin-bottom:12px">${t('salesman_desc')}</p>
    ${ks.map(k=>`<div class="cust-result"><div><b>🧑‍💼 ${esc(k.name)}</b>${k.phone?`<div class="hint">📞 ${esc(k.phone)}</div>`:''}</div>
      <div style="display:flex;gap:6px"><button class="btn sm ghost" onclick="salesmanEdit('${k.id}')">✏️</button><button class="btn sm danger" onclick="salesmanDelete('${k.id}')">✕</button></div></div>`).join('')||'<p class="hint">'+t('no_salesmen')+'</p>'}
    <button class="btn primary block" style="margin-top:10px" onclick="salesmanEdit()">+ ${t('add_salesman')}</button>

function salesmanName(id){const k=(DB.salesmen||[]).find(x=>x.id===id);return k?k.name:'';}
function karigarName(id){const k=(DB.karigars||[]).find(x=>x.id===id);return k?k.name:'';}
async function pickKarigarContact(){

function garmentMaster(){
  const items=DB.customItems||[];
  $('#sheet').innerHTML=`<div class="grip"></div><h2 style="margin-bottom:6px">${t('item_master')}</h2>
    <p class="hint" style="margin-bottom:12px">${t('item_master_desc')}</p>
    ${items.map(it=>`<div class="cust-result"><div><b>${it.ico||'🧩'} ${esc(it.n)}</b><div class="hint">${(it.fields||[]).map(f=>esc(f.n)).join(', ')||'—'}</div></div>
      <div style="display:flex;gap:6px"><button class="btn sm ghost" onclick="itemEdit('${it.id}')">✏️</button><button class="btn sm danger" onclick="itemDelete('${it.id}')">✕</button></div></div>`).join('')||'<p class="hint">'+t('no_custom_items')+'</p>'}
    <button class="btn primary block" style="margin-top:10px" onclick="itemEdit()">+ ${t('add_item')}</button>
    <div class="modal-actions"><button class="btn ghost block" onclick="closeSheet()">${t('close')}</button></div>`;

let itemDraft=null;
function itemEdit(id){const ex=id?(DB.customItems||[]).find(x=>x.id===id):null;
  itemDraft=ex?JSON.parse(JSON.stringify(ex)):{id:'ci_'+uid(),n:'',ico:'🧩',cat:'custom',fields:[]};
  renderItemEdit();}
function renderItemEdit(){const d=itemDraft;
  const rows=d.fields.map((f,i)=>`<div class="card" style="padding:10px;margin-bottom:8px">
    <div class="row"><div class="field" style="margin:0"><label>${t('field_name')}</label><input data-fn="${i}" value="${esc(f.n)}" placeholder="Head, Size…"></div>
      <div class="field" style="margin:0"><label>${t('field_type')}</label><select data-ft="${i}">
        <option value="number" ${f.type==='number'?'selected':''}>${t('ft_number')}</option>
        <option value="text" ${f.type==='text'?'selected':''}>${t('ft_text')}</option>
        <option value="select" ${f.type==='select'?'selected':''}>${t('ft_choice')}</option></select></div></div>
    <div class="field" style="margin:8px 0 0;${f.type==='select'?'':'display:none'}"><label>${t('field_options')}</label><input data-fopt="${i}" value="${esc((f.options||[]).join(', '))}" placeholder="Nagra, Loafer, Mojari"></div>
    <button class="btn sm danger" style="margin-top:8px" onclick="itemDraftDelField(${i})">${t('remove')}</button></div>`).join('');
  $('#sheet').innerHTML=`<div class="grip"></div><h3 style="margin-bottom:14px">${d.n?esc(d.n):t('add_item')}</h3>
    <div class="row"><div class="field" style="flex:0 0 64px"><label>${t('icon')}</label><input id="id_ico" value="${esc(d.ico)}" maxlength="2" style="text-align:center;font-size:20px"></div>
      <div class="field"><label>${t('item_name')}</label><input id="id_name" value="${esc(d.n)}" placeholder="Safa, Juti…"></div></div>
    <div class="section-h">${t('fields')}</div>${rows||'<p class="hint">'+t('no_fields')+'</p>'}
    <button class="btn ghost block" style="margin-top:8px" onclick="itemDraftAddField()">+ ${t('add_field')}</button>
    <div class="modal-actions"><button class="btn ghost" onclick="garmentMaster()">${t('cancel')}</button><button class="btn primary" onclick="itemDraftSave()">${t('save')}</button></div>`;
  showSheet();
  $('#sheet').querySelectorAll('select[data-ft]').forEach(sel=>sel.addEventListener('change',()=>{captureItemDraft();renderItemEdit();}));
}
function captureItemDraft(){const d=itemDraft;
  if($('#id_name'))d.n=$('#id_name').value.trim(); if($('#id_ico'))d.ico=$('#id_ico').value.trim()||'🧩';
  $('#sheet').querySelectorAll('[data-fn]').forEach(inp=>{d.fields[+inp.dataset.fn].n=inp.value.trim();});
  $('#sheet').querySelectorAll('[data-ft]').forEach(sel=>{d.fields[+sel.dataset.ft].type=sel.value;});
  $('#sheet').querySelectorAll('[data-fopt]').forEach(inp=>{d.fields[+inp.dataset.fopt].options=inp.value.split(',').map(s=>s.trim()).filter(Boolean);});
}
function itemDraftAddField(){captureItemDraft();itemDraft.fields.push({k:'f_'+uid(),n:'',type:'number',options:[]});renderItemEdit();}
function itemDraftDelField(i){captureItemDraft();itemDraft.fields.splice(i,1);renderItemEdit();}
function itemDraftSave(){captureItemDraft();const d=itemDraft;
  if(!d.n){toast(t('t_no_name'),'bad');return;}
  d.fields=d.fields.filter(f=>f.n);
  DB.customItems=DB.customItems||[];
  const i=DB.customItems.findIndex(x=>x.id===d.id);
  if(i>=0)DB.customItems[i]=d; else DB.customItems.push(d);
  save();garmentMaster();toast(t('t_item_saved'),'ok');}
function itemDelete(id){confirmModal(t('confirm_item_del'),t('confirm_item_del_msg'),()=>{DB.customItems=(DB.customItems||[]).filter(x=>x.id!==id);save();itemMaster();toast(t('t_deleted'));});}

/* ====================== BACKUP ====================== */
/* One short key just for the installed-app name. Never parse the whole DB at boot. */
/* Is this module switched on for this shop? */
function modOn(k){ return !!((DB.modules||{})[k]); }
/* Body classes drive the hiding, same trick simple-mode already uses. */
function applyModules(){
  const b=document.body;
  b.classList.toggle('no-billing', !modOn('billing'));
  b.classList.toggle('no-stock',   !modOn('stock'));
  b.classList.toggle('no-accounts',!modOn('accounts'));
}
function syncShopNameKey(){
  try{ localStorage.setItem('pb_ob_shopname', String(((DB.shopInfo||{}).name)||'').slice(0,40)); }catch(e){}
}
function markBackup(){localStorage.setItem('pb_ob_lastbackup',new Date().toISOString().slice(0,10));}
/* Anything at all worth losing? The old nag only counted orders, so a shop that
   only billed (or only kept stock) was never reminded. */
function hasAnyData(){
  return !!((DB.orders||[]).length || (DB.sales||[]).length || (DB.purchases||[]).length
    || (DB.customers||[]).length || (DB.thaans||[]).length || (DB.alterations||[]).length
    || (DB.itemMaster||[]).length || (DB.ledger||[]).length);
}
function daysSinceBackup(){
  const d=localStorage.getItem('pb_ob_lastbackup');
  if(!d)return null;                                   // never backed up
  return Math.max(0,Math.round((new Date().setHours(0,0,0,0)-new Date(d).setHours(0,0,0,0))/86400000));
}
/* The banner shown on Home and on the Orders list. Silent on the day of a backup. */
function backupNagHTML(){
  if(!hasAnyData()||backupDismissed)return '';
  const n=daysSinceBackup();
  if(n===0)return '';
  const never=(n===null);
  const loud=never||n>=3;
  const msg=never?t('bk_never'):t('bk_days',{n});
  return `<div class="card" style="border-color:${loud?'#7a2f28':'#5a4a1a'};background:${loud?'#2a1614':'#241d10'};margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
      <div style="font-size:13px"><b>${loud?'⚠️':'🛟'} ${esc(msg)}</b></div>
      <div style="display:flex;gap:6px">
        <button class="btn sm primary" onclick="backupMenu()">${t('backup_now')}</button>
        <button class="btn sm ghost" onclick="backupDismissed=true;renderHome();renderOrders()">✕</button></div>
    </div></div>`;
}
function backupMenu(){modal(t('backup_title'),`<p style="color:var(--txt2);font-size:14px;line-height:1.6">${t('backup_desc')}</p>
  <p class="hint" style="margin-top:8px">${t('backup_note')}</p>
  <div class="modal-actions" style="flex-direction:column">
  <button class="btn primary block" onclick="shareBackup()">📤 ${t('send_backup')}</button>
  <p class="hint" style="margin:2px 0 4px">${t('send_backup_hint')}</p>
  <button class="btn ghost block" onclick="doExport()">⬇️ ${t('download_backup')}</button>
  <button class="btn ghost block" onclick="doImport()">⬆️ ${t('restore_backup')}</button>
  <button class="btn ghost block" onclick="restoreSnapshotMenu()">🕑 ${t('restore_auto')}</button></div>`,[]);}
/* Media lives in IndexedDB, not in DB, so a plain JSON dump left every photo and
   voice note behind. Bundle them in as base64 (snapshots excluded — those are
   just old copies of DB and would double the file). */
function blobToB64(b){return new Promise(res=>{const r=new FileReader();r.onloadend=()=>res(String(r.result));r.onerror=()=>res('');r.readAsDataURL(b);});}
async function buildBackup(){
  const out={__v:2, db:DB, media:{}};
  try{
    const keys=(await mKeys()).filter(k=>String(k).indexOf('snap_')!==0);
    for(const k of keys){ const b=await mGet(k); if(b && b.size!==undefined){ const d=await blobToB64(b); if(d)out.media[k]=d; } }
  }catch(e){}
  return out;
}
async function restoreMedia(media){
  const keys=Object.keys(media||{});
  for(const k of keys){
    try{ const r=await fetch(media[k]); const b=await r.blob(); await mPut(k,b); }catch(e){}
  }
  return keys.length;
}
function mediaCount(o){return Object.keys((o&&o.media)||{}).length;}
function doExportLegacy(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=u;a.download='parampara-orderbook-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000);markBackup();renderOrders();closeSheet();toast('Backup ✓','ok');}
async function doExport(){
  toast(t('bk_building'),'ok');
  const pack=await buildBackup();
  const blob=new Blob([JSON.stringify(pack)],{type:'application/json'});
  const u=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=u;a.download='parampara-orderbook-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000);markBackup();renderOrders();closeSheet();
  toast(t('bk_done',{n:mediaCount(pack)}),'ok');
}
async function shareBackup(){
  toast(t('bk_building'),'ok');
  const pack=await buildBackup();
  const blob=new Blob([JSON.stringify(pack)],{type:'application/json'});
  const file=new File([blob],'parampara-backup-'+new Date().toISOString().slice(0,10)+'.json',{type:'application/json'});
  markBackup();renderOrders();
  try{ if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:'PARAMPARA Backup'}); closeSheet(); return; } }
  catch(e){ if(e&&e.name==='AbortError'){closeSheet();return;} }
  doExport();
}
function doImport(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const raw=JSON.parse(r.result);
      const pack = (raw && raw.db && raw.__v) ? raw : {db:raw, media:{}};
      const d=pack.db; if(!d||!d.orders)throw 0;
      const nMedia=mediaCount(pack);
      confirmModal(t('restore_title'),t('restore_msg')+(nMedia?(' '+t('bk_with_media',{n:nMedia})):''),async ()=>{
        DB=d;if(!DB.customers)DB.customers=[];if(!DB.designLib)DB.designLib={};if(!DB.karigars)DB.karigars=[];
        save();
        if(nMedia){ toast(t('bk_restoring'),'ok'); await restoreMedia(pack.media); }
        closeSheet();go('orders');toast(t('t_restored'),'ok');
      });
    }catch(_){toast(t('t_wrong'),'bad');}};r.readAsText(f);};inp.click();}
async function restoreSnapshotMenu(){
  const keys=(await mKeys()).filter(k=>String(k).indexOf('snap_')===0).sort().reverse();
  if(!keys.length){toast(t('no_snapshots'),'bad');return;}
  modal(t('auto_backups'),`<p class="hint" style="margin-bottom:10px">${t('auto_backups_desc')}</p>`+keys.map(k=>`<button class="btn ghost block" style="margin-bottom:8px" onclick="restoreSnapshot('${k}')">🕑 ${String(k).replace('snap_','')}</button>`).join(''),[{label:t('close'),cls:'ghost',fn:closeSheet}]);
}
async function restoreSnapshot(key){
  let data=await mGet(key); if(!data){toast(t('t_wrong'),'bad');return;}
  if(data instanceof Blob)data=await data.text();
  confirmModal(t('restore_title'),t('restore_msg'),()=>{try{const d=JSON.parse(data);if(!d.orders)throw 0;DB=d;if(!DB.customers)DB.customers=[];if(!DB.designLib)DB.designLib={};if(!DB.karigars)DB.karigars=[];save();closeSheet();go('orders');toast(t('t_restored'),'ok');}catch(e){toast(t('t_wrong'),'bad');}});
}

/* ====================== MODAL / TOAST ====================== */
let _sheetOn=false, _popping=false, _curTab='home', _exitArm=0;
function sheetIsOpen(){return $('#scrim').classList.contains('show');}
function pushGuard(){try{history.pushState({pbGuard:Date.now()},'');}catch(e){}}
function showSheet(){closeModal();$('#scrim').classList.add('show');_sheetOn=true;}
function closeSheet(){
  if(modalIsOpen()){ closeModal(); return; }      // a modal on top closes first — the form stays
  $('#scrim').classList.remove('show');$('#fracbar').classList.remove('show');
  _sheetOn=false;   // history guard stays put; back press is handled in popstate
  try{ clearInterval(_draftTick); clearTimeout(_draftT); }catch(e){}
}
window.addEventListener('popstate',()=>{
  _popping=true;
  try{
    if(modalIsOpen()){ closeModal(); pushGuard(); return; }     // back out of the modal only
    if(sheetIsOpen()||_sheetOn){ saveDraft(); closeSheet(); pushGuard(); return; }
    if(_curTab && _curTab!=='home'){ go('home'); pushGuard(); return; }
    // on Home with nothing open: ask once before letting the app close
    const now=Date.now();
    if(now-_exitArm>2200){ _exitArm=now; toast(t('back_exit'),''); pushGuard(); return; }
    // second press within 2.2s -> let it go (app closes)
  } finally { _popping=false; }
});
$('#scrim').addEventListener('click',e=>{if(e.target===$('#scrim'))closeSheet();});
/* A modal lives on its own layer. It must NEVER wipe the sheet underneath —
   that used to destroy a half-filled order form (and everything typed into it). */
function modalIsOpen(){ const e=$('#mscrim'); return !!e && e.classList.contains('show'); }
function modal(title,html,actions){
  const acts=(actions||[]).map((a,i)=>`<button class="btn ${a.cls||'ghost'}" data-mi="${i}">${a.label}</button>`).join('');
  $('#msheet').innerHTML=`<div class="grip"></div>${title?`<h3 style="margin-bottom:14px">${title}</h3>`:''}${html}${actions&&actions.length?`<div class="modal-actions">${acts}</div>`:''}`;
  (actions||[]).forEach((a,i)=>{const b=$('#msheet').querySelector(`[data-mi="${i}"]`);if(b)b.onclick=a.fn;});
  $('#mscrim').classList.add('show');
  $('#msheet').scrollTop=0;
}
function closeModal(){ const e=$('#mscrim'); if(e)e.classList.remove('show'); }
function confirmModal(ti,m,onYes){modal(ti,`<p style="color:var(--txt2);font-size:14px;line-height:1.6">${m}</p>`,[{label:t('no'),cls:'ghost',fn:closeSheet},{label:t('yes'),cls:'danger',fn:()=>{closeSheet();onYes();}}]);}
let toastT=null;
function toast(msg,kind){const el=$('#toast');el.textContent=msg;el.className='toast show '+(kind||'');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2400);}

/* ====================== INIT ====================== */
function updateHeadStat(){const due=DB.orders.reduce((s,o)=>s+orderBaaki(o),0);
  const hs=$('#headStat');if(hs)hs.innerHTML=`<b>${DB.orders.length}</b> ${t('orders_word')} · <b>${money(due)}</b> ${t('due')}<br><span onclick="backupMenu()" style="text-decoration:underline;cursor:pointer">💾 ${t('backup')}</span>`;}
async function init(){load();syncShopNameKey();applyModules();try{await openIDB();}catch(e){}applyLang();document.body.classList.toggle('simple-mode',localStorage.getItem('pb_ob_simple')==='1');renderHome();_curTab='home';pushGuard();}
init();
</script>
