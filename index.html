<title>PARAMPARA Orderbook</title>
<style>
  :root{
    --bg:#16130f; --bg2:#1f1a13; --card:#221c14; --card2:#2a2218;
    --line:#3a2f20; --line2:#4a3c28;
    --saffron:#f6a623; --saffron2:#ffbe4d; --saffronDim:#7a5414;
    --txt:#f3ead9; --txt2:#c9bda6; --mut:#8d8270;
    --ok:#5fb87a; --bad:#e06b5a;
    --r:14px; --r2:10px; --safe-b:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
    padding-bottom:calc(72px + var(--safe-b));}
  h1,h2,h3{margin:0; font-weight:700}
  button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
  input,select,textarea{font-family:inherit; font-size:16px}
  a{color:var(--saffron2); text-decoration:none}

  header{position:sticky; top:0; z-index:40; background:linear-gradient(180deg,#1c1810,#16130f);
    border-bottom:1px solid var(--line); padding:12px 16px 10px}
  .brand{display:flex; align-items:center; gap:10px}
  .logo{width:34px; height:34px; border-radius:9px; flex:none;
    background:linear-gradient(135deg,var(--saffron),#c97e10); display:grid; place-items:center;
    font-weight:800; color:#1a1206; font-size:18px; box-shadow:0 2px 10px rgba(246,166,35,.25)}
  .brand h1{font-size:18px; letter-spacing:1.5px}
  .brand small{display:block; font-size:10px; letter-spacing:2px; color:var(--saffron); font-weight:600}
  .hrow{display:flex; align-items:center; justify-content:space-between}
  .htools{display:flex; align-items:center; gap:8px}
  .langtog{font-size:12px; font-weight:700; border:1px solid var(--line2); border-radius:20px; padding:5px 10px; color:var(--txt2); background:var(--bg2)}
  .langtog b{color:var(--saffron2)}
  .stat{font-size:11px; color:var(--mut); text-align:right} .stat b{color:var(--saffron2); font-size:13px}
  .searchbar{margin-top:10px; position:relative}
  .searchbar input{width:100%; background:var(--bg2); border:1px solid var(--line); color:var(--txt);
    padding:10px 12px 10px 36px; border-radius:var(--r2); outline:none}
  .searchbar input:focus{border-color:var(--saffronDim)}
  .searchbar svg{position:absolute; left:11px; top:11px; opacity:.5}

  main{padding:14px 14px 24px; max-width:760px; margin:0 auto}
  .tabpane{display:none} .tabpane.active{display:block; animation:fade .2s ease}
  @keyframes fade{from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:none}}

  .row{display:flex; gap:10px} .row>*{flex:1}
  .field{margin-bottom:12px}
  .field label{display:block; font-size:12px; color:var(--txt2); margin-bottom:5px; font-weight:600}
  .field input,.field select,.field textarea{width:100%; background:var(--bg2); border:1px solid var(--line);
    color:var(--txt); padding:11px 12px; border-radius:var(--r2); outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--saffron); background:#241d14}
  .field textarea{resize:vertical; min-height:54px}
  .hint{font-size:11px; color:var(--mut); margin-top:4px}

  .btn{display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:12px 16px;
    border-radius:var(--r2); font-weight:700; font-size:14px; background:var(--card2); color:var(--txt);
    border:1px solid var(--line2); transition:.12s}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:linear-gradient(135deg,var(--saffron),#d98a12); color:#1a1206; border:none}
  .btn.ghost{background:transparent}
  .btn.danger{background:transparent; color:var(--bad); border-color:#5a2e28}
  .btn.sm{padding:8px 12px; font-size:13px}
  .btn.block{width:100%}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--r); padding:14px; margin-bottom:12px}
  .section-h{font-size:12px; letter-spacing:1px; text-transform:uppercase; color:var(--mut); font-weight:700; margin:18px 0 8px}

  .ocard .top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px}
  .ocard .ono{font-size:11px; color:var(--saffron); font-weight:700; letter-spacing:.5px}
  .ocard .name{font-size:16px; font-weight:700}
  .ocard .meta{font-size:12px; color:var(--txt2); margin-top:3px}
  .gtags{display:flex; flex-wrap:wrap; gap:5px; margin-top:10px}
  .gtag{font-size:11px; background:var(--bg2); border:1px solid var(--line); padding:4px 8px; border-radius:20px; color:var(--txt2)}
  .deliv{font-size:11px; padding:4px 9px; border-radius:20px; font-weight:700; white-space:nowrap; background:rgba(95,184,122,.13); color:var(--ok)}
  .deliv.soon{background:rgba(224,107,90,.15); color:var(--bad)}
  .baaki-tag{font-size:12px; color:var(--saffron2); font-weight:700; margin-top:8px}
  .ocard .botrow{display:flex; justify-content:space-between; align-items:center; margin-top:8px}

  /* status pill */
  .pill{display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px}
  .st-new{background:#2c2a3a; color:#a9a6d6}
  .st-cut{background:#33291a; color:#e0a85a}
  .st-handwork{background:#3a2330; color:#d98ab5}
  .st-stitching{background:#1f3330; color:#5fc1b0}
  .st-checking{background:#2a3320; color:#a7c95f}
  .st-ready{background:rgba(95,184,122,.18); color:var(--ok)}
  .st-delivered{background:var(--bg2); color:var(--mut)}

  .chip-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:8px}
  .chip{padding:11px 6px; text-align:center; border-radius:var(--r2); border:1px solid var(--line);
    background:var(--bg2); color:var(--txt2); font-size:12.5px; font-weight:600; transition:.12s; position:relative}
  .chip.on{border-color:var(--saffron); background:rgba(246,166,35,.13); color:var(--saffron2)}
  .chip .ico{font-size:19px; display:block; margin-bottom:2px}
  .chip .badge{position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%;
    background:var(--saffron); color:#1a1206; font-size:11px; font-weight:800; display:grid; place-items:center}

  .mcard{border:1px solid var(--line); border-radius:var(--r); margin-bottom:12px; overflow:hidden}
  .mcard .mh{padding:11px 14px; background:var(--bg2); display:flex; justify-content:space-between; align-items:center}
  .mcard .mh b{font-size:15px}
  .mcard .mb{padding:12px 14px}
  .mgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px}
  .mfield{background:var(--bg2); border:1px solid var(--line); border-radius:9px; padding:7px 9px}
  .mfield.lenhl{border-color:var(--saffronDim); background:#241d14}
  .mfield label{font-size:10px; color:var(--mut); display:block; margin-bottom:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .mfield input{width:100%; background:transparent; border:none; color:var(--txt); outline:none; font-size:17px; font-weight:600; padding:2px 0}
  .mfield input.filled{color:var(--saffron2)}
  .prefilled-note{font-size:11px; color:var(--ok); margin:4px 0 0}

  .cust-result{padding:11px 12px; border:1px solid var(--line); border-radius:var(--r2); background:var(--bg2); margin-bottom:7px; display:flex; justify-content:space-between; align-items:center}
  .cust-result b{font-size:15px}
  .kv{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--line); font-size:14px}
  .kv:last-child{border:none} .kv span:first-child{color:var(--txt2)}
  .bill-box{background:var(--bg2); border:1px solid var(--saffronDim); border-radius:var(--r); padding:14px; margin-top:6px}
  .bill-total{font-size:13px; color:var(--txt2)}
  .micbtn{padding:3px 9px !important;font-size:14px !important}
  .micbtn.listening{background:#7a1f1f !important;border-color:#7a1f1f !important;color:#fff !important;animation:micpulse 1s infinite}
  @keyframes micpulse{0%,100%{opacity:1}50%{opacity:.45}}
  .bill-baaki{font-size:24px; font-weight:800; color:var(--saffron2)}

  /* status stepper */
  .stepper{display:flex; gap:4px; margin:10px 0 4px; overflow-x:auto; padding-bottom:4px}
  .stepper .stp{flex:none; font-size:11px; font-weight:700; padding:7px 11px; border-radius:20px; border:1px solid var(--line); background:var(--bg2); color:var(--mut)}
  .stepper .stp.done{color:var(--saffron2); border-color:var(--saffronDim)}
  .stepper .stp.cur{background:linear-gradient(135deg,var(--saffron),#d98a12); color:#1a1206; border:none}

  /* timeline */
  .tl-entry{display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--line)}
  .tl-entry:last-child{border:none}
  .tl-dot{width:9px; height:9px; border-radius:50%; background:var(--saffron); margin-top:6px; flex:none}
  .tl-time{font-size:11px; color:var(--mut)}
  .tl-text{font-size:14px; margin-top:2px}
  audio{width:100%; height:38px; margin-top:6px}
  .rec-btn{width:46px; height:46px; border-radius:50%; flex:none; background:var(--card2); border:1px solid var(--line2); display:grid; place-items:center; font-size:19px; transition:.15s}
  .rec-btn.recording{background:var(--bad); border-color:var(--bad); animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,107,90,.5)} 50%{box-shadow:0 0 0 8px rgba(224,107,90,0)}}

  #fracbar{position:fixed; left:0; right:0; bottom:0; z-index:120; display:none;
    background:#2a2218; border-top:1px solid var(--line2); padding:8px calc(8px + var(--safe-b)) calc(8px + var(--safe-b)); gap:6px; justify-content:center}
  #fracbar.show{display:flex}
  #fracbar button{flex:1; max-width:80px; padding:12px 0; border-radius:9px; background:var(--card2); border:1px solid var(--line2); font-size:18px; font-weight:700}

  nav{position:fixed; bottom:0; left:0; right:0; z-index:50; background:linear-gradient(180deg,#1c1810,#16130f);
    border-top:1px solid var(--line); display:flex; padding:8px 6px calc(8px + var(--safe-b)); justify-content:space-around}
  nav button{display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; padding:4px; color:var(--mut); font-size:10px; font-weight:600}
  nav button.on{color:var(--saffron)} nav .nico{font-size:20px}
  nav .add .nico{width:50px; height:50px; border-radius:50%; background:linear-gradient(135deg,var(--saffron),#d98a12);
    color:#1a1206; display:grid; place-items:center; font-size:28px; font-weight:300; margin-top:-22px;
    box-shadow:0 4px 16px rgba(246,166,35,.4); border:3px solid var(--bg)}

  .empty{text-align:center; padding:50px 20px; color:var(--mut)}
  .empty .big{font-size:46px; opacity:.5; margin-bottom:10px}
  .detail-hd{display:flex; align-items:center; gap:8px; margin-bottom:10px}
  .back{font-size:22px; padding:4px 6px; margin-left:-6px}
  .thumb{width:72px; height:72px; border-radius:var(--r2); object-fit:cover; border:1px solid var(--line2)}
  .thumb-wrap{position:relative; display:inline-block}
  .thumb-x{position:absolute; top:-6px; right:-6px; width:22px; height:22px; border-radius:50%; background:var(--bad); color:#fff; font-size:13px; display:grid; place-items:center; border:2px solid var(--bg)}

  .scrim{position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:90; display:none; align-items:flex-end; justify-content:center}
  .scrim.show{display:flex; animation:fade .15s}
  .sheet{background:var(--card); border:1px solid var(--line); border-top-left-radius:20px; border-top-right-radius:20px;
    width:100%; max-width:760px; max-height:90vh; overflow-y:auto; padding:18px 18px calc(18px + var(--safe-b)); animation:slideup .22s ease}
  @keyframes slideup{from{transform:translateY(100%)} to{transform:none}}
  .grip{width:38px; height:4px; border-radius:4px; background:var(--line2); margin:0 auto 14px}
  .modal-actions{display:flex; gap:10px; margin-top:18px} .modal-actions .btn{flex:1}
  .toast{position:fixed; bottom:calc(86px + var(--safe-b)); left:50%; transform:translateX(-50%) translateY(20px);
    background:#2c2418; border:1px solid var(--line2); color:var(--txt); padding:11px 18px; border-radius:30px;
    font-size:13px; font-weight:600; z-index:130; opacity:0; transition:.25s; pointer-events:none; max-width:90%}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .toast.ok{border-color:var(--ok)} .toast.bad{border-color:var(--bad)}
  .fab-pad{height:10px}
  body.simple-mode{font-size:17px}
  body.simple-mode .btn{padding:14px 16px; font-size:16px}

let lang = localStorage.getItem('pb_ob_lang') || 'en';
function t(k,vars){ let s=(T[lang]&&T[lang][k]!=null)?T[lang][k]:(T.en[k]!=null?T.en[k]:k);
  if(vars) for(const p in vars) s=s.split('{'+p+'}').join(vars[p]); return s; }

/* ---- status workflow ---- */

};

const G=id=>allItems().find(g=>g.id===id);
const colsFor=c=>c==='lower'?LOWER_COLS:UPPER_COLS;
function itemCols(item){ if(!item)return []; if(item.cat==='custom')return item.fields||[];

const $=s=>document.querySelector(s);

function daysLeft(d){if(!d)return null;const x=new Date(d);x.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);return Math.round((x-t)/86400000);}
function masterDate(deliveryDate){const dl=daysLeft(deliveryDate);if(dl==null)return deliveryDate;
  let buf=0; if(dl>1)buf=Math.min(5,Math.max(1,Math.round(dl*0.25)));   // give karigar a buffer that scales with available time
  const d=new Date(deliveryDate);d.setDate(d.getDate()-buf);return d.toISOString().slice(0,10);}

const invRate=p=>(+p||0)>2500?18:5;
const r2=n=>Math.round((+n||0)*100)/100;
function invCompute(inv){
  let gross=0;const perItem=[];
  (inv.items||[]).forEach(it=>{const p=+it.price||0;const qty=+it.qty||1;const r=invRate(p/qty);perItem.push({p,r});gross+=p;});
  let discAmt=inv.discType==='percent'?r2(gross*(+inv.discValue||0)/100):r2(+inv.discValue||0);
  discAmt=Math.max(0,Math.min(discAmt,gross));
  const scale=gross>0?(gross-discAmt)/gross:1;
  let taxable=0,cgst=0,sgst=0,igst=0;
  perItem.forEach(({p,r})=>{const net=r2(p*scale);const base=net/(1+r/100);taxable+=base;
    if(inv.interstate)igst+=(net-base); else {const half=(net-base)/2;cgst+=half;sgst+=half;}});
  return {gross:r2(gross),discount:r2(discAmt),taxable:r2(taxable),cgst:r2(cgst),sgst:r2(sgst),igst:r2(igst),total:r2(gross-discAmt)};}

function numToWordsIndian(num){num=Math.round(+num||0);if(!num)return 'Zero Rupees only';
  const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  const two=n=>n<20?ones[n]:tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'');
  const three=n=>n<100?two(n):ones[Math.floor(n/100)]+' Hundred'+(n%100?' '+two(n%100):'');
  let crore=Math.floor(num/10000000);num%=10000000;
  let lakh=Math.floor(num/100000);num%=100000;
  let thousand=Math.floor(num/1000);num%=1000;
  let rest=num,parts=[];
  if(crore)parts.push(three(crore)+' Crore');
  if(lakh)parts.push(three(lakh)+' Lakh');
  if(thousand)parts.push(three(thousand)+' Thousand');
  if(rest)parts.push(three(rest));
  return (parts.join(' ')||'Zero')+' Rupees only';}
function customerOutstanding(customerId,exKind,exId){

function invGroupItems(gids){

function inDelFilter(o){
  if(delFilter==='all')return true;
  const delivered=orderDelivered(o);
  if(delFilter==='pending')return !delivered;
  const dl=daysLeft(o.deliveryDate);
  if(delFilter==='date')return delDate?o.deliveryDate===delDate:true;
  if(dl==null)return false;
  if(delFilter==='today')return dl===0&&!delivered;
  if(delFilter==='tomorrow')return dl===1&&!delivered;
  if(delFilter==='week')return dl>=0&&dl<=6&&!delivered;
  return true;
}

/* live prefill: copy BODY columns (not length) from any same-category garment already filled */
function prefillGarment(gid){
  const f=form,g=G(gid),common=commonFor(g.cat); if(!f.m[gid])f.m[gid]={};
  const allow=itemCols(g).map(c=>c.k);   // don't carry columns this garment doesn't have (e.g. sleeveless)
  for(const oid of f.items){ if(oid===gid)continue; const og=G(oid); if(!og||og.cat!==g.cat||!f.m[oid])continue;
    common.forEach(k=>{if(allow.includes(k)&&!f.m[gid][k]&&f.m[oid][k])f.m[gid][k]=f.m[oid][k];}); }
  if(f.customerId){const c=custById(f.customerId); if(c&&c.m){
    if(c.m[gid]){Object.keys(c.m[gid]).forEach(k=>{if(allow.includes(k)&&!f.m[gid][k])f.m[gid][k]=c.m[gid][k];});}
    else {for(const okid of Object.keys(c.m)){const og=G(okid);if(!og||og.cat!==g.cat)continue;common.forEach(k=>{if(allow.includes(k)&&!f.m[gid][k]&&c.m[okid][k])f.m[gid][k]=c.m[okid][k];});break;}}
  }}
}
/* keep a measurement to max 2 whole digits (+ optional .dd or fraction). No 3-digit values. */
function sanitizeMeas(v){if(!v)return '';const m=String(v).match(/^(\d{0,2})([.][0-9]{0,2})?([½¼¾⅛])?/);return m?m[0]:'';}
/* fraction bar + live body-measurement propagation across garments */
let _mfocus=null;
function bindMeasInputs(){
  document.querySelectorAll('.mInput').forEach(inp=>{
    if(inp.tagName==='SELECT') return;
    inp.addEventListener('focus',()=>{_mfocus=inp;$('#fracbar').classList.add('show');});
    inp.addEventListener('blur',()=>{setTimeout(()=>{const a=document.activeElement;if(a&&a.classList&&a.classList.contains('mInput')&&a.tagName!=='SELECT')return;$('#fracbar').classList.remove('show');},150);});
    if(inp.inputMode==='text' || (inp.dataset.k&&inp.dataset.k.indexOf('x_')===0)){ inp.addEventListener('input',()=>{inp.dataset.auto='';inp.classList.toggle('filled',!!inp.value.trim());}); return; }
    inp.addEventListener('input',()=>{const sv=sanitizeMeas(inp.value);if(sv!==inp.value)inp.value=sv;inp.dataset.auto='';inp.classList.toggle('filled',!!inp.value.trim());propagate(inp);});
  });
}
function propagate(inp){
  const g=G(inp.dataset.g),k=inp.dataset.k,v=inp.value.trim();
  if(!g||!commonFor(g.cat).includes(k))return; // only BODY columns flow, never Length
  document.querySelectorAll('.mInput').forEach(other=>{ if(other===inp)return;
    const og=G(other.dataset.g);
    if(og&&og.cat===g.cat&&other.dataset.k===k){
      if(!other.value.trim()||other.dataset.auto==='1'){ other.value=v; other.dataset.auto='1'; other.classList.toggle('filled',!!v); }
    }
  });
}
function insFrac(e,val){e.preventDefault();if(!_mfocus)return;
  if(val==='CLR')_mfocus.value=''; else _mfocus.value=(_mfocus.value||'')+val;
  _mfocus.dataset.auto='';
  _mfocus.classList.toggle('filled',!!_mfocus.value.trim());propagate(_mfocus);_mfocus.focus();}

/* ====================== VOICE → TEXT (dictation) ====================== */
let _rec=null,_recBtn=null;
function sttSupported(){return !!(window.SpeechRecognition||window.webkitSpeechRecognition);}
function sttLang(){return localStorage.getItem('pb_ob_stt')||'en-IN';}
function sttLangLabel(){return sttLang()==='hi-IN'?'हिंदी':'English';}
function toggleSTTLang(btn){const nl=sttLang()==='hi-IN'?'en-IN':'hi-IN';localStorage.setItem('pb_ob_stt',nl);if(btn)btn.innerHTML='🎤 '+t('voice_lang')+': <b>'+sttLangLabel()+'</b>';toast(t('voice_lang')+' → '+sttLangLabel(),'ok');}
function micBtn(sel){ return sttSupported()?`<button type="button" class="btn sm ghost micbtn" onclick="dictate('${sel}',this)" title="${t('dictate')}">🎤</button>`:''; }
function dictate(sel,btn){
  if(!sttSupported()){toast(t('stt_na'),'bad');return;}
  const el=document.querySelector(sel); if(!el)return;
  if(_rec){ try{_rec.stop();}catch(e){} const wasSame=(_recBtn===btn); if(_recBtn)_recBtn.classList.remove('listening'); _rec=null;_recBtn=null; if(wasSame)return; }
  const R=window.SpeechRecognition||window.webkitSpeechRecognition; const r=new R(); _rec=r; _recBtn=btn||null;
  r.lang=sttLang(); r.interimResults=true; r.continuous=false; r.maxAlternatives=1;
  const base=el.value?el.value.replace(/\s+$/,'')+' ':'';
  if(btn)btn.classList.add('listening');
  r.onresult=(e)=>{ let interim='',fin=''; for(let i=0;i<e.results.length;i++){const tr=e.results[i][0].transcript; if(e.results[i].isFinal)fin+=tr; else interim+=tr;}
    el.value=base+fin+interim; el.dispatchEvent(new Event('input',{bubbles:true})); };
  r.onerror=()=>{ if(_recBtn)_recBtn.classList.remove('listening'); _rec=null;_recBtn=null; toast(t('stt_err'),'bad'); };
  r.onend=()=>{ if(_recBtn)_recBtn.classList.remove('listening'); _rec=null;_recBtn=null;
    el.dispatchEvent(new Event('input',{bubbles:true}));
    if(el.dataset&&el.dataset.design&&window.form&&form.design)form.design[el.dataset.design]=el.value.trim();
    if(el.id==='f_notes'&&window.form)form.notes=el.value; toast(t('stt_done'),'ok'); };
  try{r.start(); toast(t('stt_listening'),'ok');}catch(e){}
}

let photoTarget={type:'order'};
function pickPhoto(src){captureForm();photoTarget={type:'order'};const inp=src==='cam'?$('#filePickCam'):$('#filePick');inp.value='';inp.click();}
function pickItemPhoto(src,gid){captureForm();photoTarget={type:'item',gid};const inp=src==='cam'?$('#filePickCam'):$('#filePick');inp.value='';inp.click();}
async function processPhoto(e){const file=e.target.files[0];if(!file)return;
  const blob=await downscale(file);const id='img_'+uid();await mPut(id,blob);
  if(photoTarget.type==='item'){const gid=photoTarget.gid;form.itemPhotos=form.itemPhotos||{};form.itemPhotos[gid]=form.itemPhotos[gid]||[];form.itemPhotos[gid].push(id);renderItemPhotos(gid);}

  else {form.photos.push(id);renderFormPhotos();}
  toast(t('t_photo'));}
$('#filePick').addEventListener('change',processPhoto);
$('#filePickCam').addEventListener('change',processPhoto);
function downscale(file){return new Promise(res=>{const img=new Image(),rd=new FileReader();
  rd.onload=()=>{img.onload=()=>{const max=1280;let{width:w,height:h}=img;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(b=>res(b||file),'image/jpeg',.82);};img.onerror=()=>res(file);img.src=rd.result;};
  rd.onerror=()=>res(file);rd.readAsDataURL(file);});}
async function renderFormPhotos(){const el=$('#f_photos');if(!el)return;el.innerHTML='';
  for(const id of form.photos){const url=await mURL(id);const w=document.createElement('div');w.className='thumb-wrap';

    w.querySelector('.thumb-x').onclick=async()=>{await mDel(id);form.photos=form.photos.filter(x=>x!==id);renderFormPhotos();};
    el.appendChild(w);}}
function viewPhoto(url){if(!url)return;modal('',`<img src="${url}" style="width:100%;border-radius:12px">`,[{label:t('close'),cls:'ghost',fn:closeSheet}]);}

function invRecOf(kind,id){return kind==='alt'?altById(id):(kind==='sale'?(DB.sales||[]).find(x=>x.id===id):DB.orders.find(x=>x.id===id));}
function openInvoiceForm(kind,id){
  const rec=invRecOf(kind,id); if(!rec)return;
  if(rec.invoice){ invForm=JSON.parse(JSON.stringify(rec.invoice)); invForm.kind=kind; invForm.id=id;
    if(kind==='sale'){invForm.customerName=rec.customerName||'';invForm.phone=rec.phone||'';invForm.notes=rec.notes||'';} }
  else{
    let items;
    if(kind==='alt'){ items=[{label:rec.itemDesc||t('alterations'),hsn:'',qty:1,unit:'Pcs',price:+rec.total||0,disc:0,includes:''}]; }
    else if(kind==='sale'){ items=[{label:'',hsn:'',qty:1,unit:'Pcs',price:'',disc:0,includes:''}]; }
    else{ const gids=sortItems(rec.items||[]); const groups=invGroupItems(gids);
      const totalMembers=groups.reduce((s,gr)=>s+gr.members.length,0)||1;
      items=groups.map(gr=>{const share=Math.round((+rec.total||0)*gr.members.length/totalMembers);
        const names=gr.members.map(m=>{const gg=G(m);return gg?gg.n:m;});
        return {label:gr.label,hsn:'',qty:1,unit:'Set',price:share,disc:0,includes:names.length>1?names.join(', '):''};});
      if(items.length){const sum=items.reduce((s,it)=>s+it.price,0);items[items.length-1].price+=((+rec.total||0)-sum);}
      if(!items.length)items=[{label:'Item',hsn:'',qty:1,unit:'Pcs',price:+rec.total||0,disc:0,includes:''}];
    }
    invForm={kind,id,no:nextInvoiceNo(),date:todayISO(),interstate:false,paymentMode:'Cash',discType:'amount',discValue:0,
      customerName:kind==='sale'?(rec.customerName||''):undefined,phone:kind==='sale'?(rec.phone||''):undefined,
      notes:kind==='sale'?(rec.notes||''):undefined,items};
  }
  renderInvoiceForm();
}

function captureInvoiceForm(){const f=invForm;
  if($('#inv_no'))f.no=$('#inv_no').value.trim();
  if($('#inv_date'))f.date=$('#inv_date').value;
  if($('#inv_inter'))f.interstate=$('#inv_inter').checked;
  if($('#inv_pm'))f.paymentMode=$('#inv_pm').value;
  if($('#inv_disctype'))f.discType=$('#inv_disctype').value;
  if($('#inv_discval'))f.discValue=+$('#inv_discval').value||0;
  if($('#inv_cname')&&!f.customerId)f.customerName=$('#inv_cname').value.trim();
  if($('#inv_cphone')&&!f.customerId)f.phone=$('#inv_cphone').value.trim();
  if($('#inv_notes'))f.notes=$('#inv_notes').value.trim();
  if($('#inv_recv'))f.receivedNow=$('#inv_recv').value===''?null:(+$('#inv_recv').value||0);
  document.querySelectorAll('[data-iin]').forEach(inp=>{f.items[+inp.dataset.iin].label=inp.value.trim();});
  document.querySelectorAll('[data-iincl]').forEach(inp=>{f.items[+inp.dataset.iincl].includes=inp.value.trim();});
  document.querySelectorAll('[data-ihsn]').forEach(inp=>{f.items[+inp.dataset.ihsn].hsn=inp.value.trim();});
  document.querySelectorAll('[data-iqty]').forEach(inp=>{f.items[+inp.dataset.iqty].qty=(+inp.value||1);});
  document.querySelectorAll('[data-ipr]').forEach(inp=>{f.items[+inp.dataset.ipr].price=+inp.value||0;});

function saveInvoice(){

  rec.invoice={no:f.no,date:f.date,interstate:f.interstate,paymentMode:f.paymentMode,discType:f.discType||'amount',discValue:f.discValue||0,items:f.items};

function buildInvoiceText(rec,inv){
  const comp=invCompute(inv);
  const prevBal=customerOutstanding(rec.customerId,rec.orderNo?'order':(rec.altNo?'alt':'sale'),rec.id);
  const currBal=r2(prevBal+orderBaaki(rec));
  let s=`${(DB.shopInfo&&DB.shopInfo.name)||'PARAMPARA'}\nGSTIN: ${(DB.shopInfo&&DB.shopInfo.gstin)||''}\n\nInvoice No: ${inv.no}\nDate: ${fmtDate(inv.date)}\n`;
  if(rec.orderNo)s+=`Order #${rec.orderNo}\n`; else if(rec.altNo)s+=`Alteration #${rec.altNo}\n`;
  if(rec.deliveryDate)s+=`📅 Delivery Date: ${fmtDate(rec.deliveryDate)}\n`;
  const sm=rec.salesmanId?(DB.salesmen||[]).find(x=>x.id===rec.salesmanId):null;
  if(sm)s+=`Salesman: ${sm.name}${sm.phone?' ('+sm.phone+')':''}\n`;
  s+='\n';
  (inv.items||[]).forEach(it=>{const qty=+it.qty||1;const p=+it.price||0;
    s+=`${it.label}${qty>1?' x'+qty:''} — ${money(p)} (GST ${invRate(p/qty)}%)${it.includes?'\n  Includes: '+it.includes:''}\n`;});
  if(comp.discount>0)s+=`\nGross: ${money(comp.gross)}\nDiscount: −${money(comp.discount)}\n`;
  s+=`\nTaxable: ${money(comp.taxable)}\n`;
  if(inv.interstate)s+=`IGST: ${money(comp.igst)}\n`; else s+=`CGST: ${money(comp.cgst)}  SGST: ${money(comp.sgst)}\n`;
  s+=`Grand Total: ${money(comp.total)}\nReceived: ${money(orderReceived(rec))}\nBalance: ${money(orderBaaki(rec))}\n`;
  s+=`Payment Mode: ${inv.paymentMode||'Cash'}\n`;
  if(prevBal>0)s+=`\nPrevious Balance: ${money(prevBal)}\nCurrent Balance: ${money(currBal)}\n`;
  if(rec.notes)s+=`\nNotes: ${rec.notes}\n`;
  if(DB.shopInfo&&DB.shopInfo.terms)s+=`\n---\n${DB.shopInfo.terms}\n`;
  return s;
}

function wrapCanvasText(ctx,text,maxWidth){
  const words=String(text).split(' ');let lines=[],cur='';
  words.forEach(w=>{const test=cur?cur+' '+w:w;if(ctx.measureText(test).width>maxWidth&&cur){lines.push(cur);cur=w;}else cur=test;});
  if(cur)lines.push(cur);return lines;
}
function buildInvoiceCanvas(rec,inv){
  const comp=invCompute(inv),shop=DB.shopInfo||{};
  const received=orderReceived(rec),baaki=orderBaaki(rec);
  const prevBal=customerOutstanding(rec.customerId,rec.orderNo?'order':(rec.altNo?'alt':'sale'),rec.id);
  const currBal=r2(prevBal+baaki);
  const W=750,pad=40,contentW=W-pad*2;
  const meas=document.createElement('canvas').getContext('2d');
  const L=[];
  L.push({t:shop.name||'PARAMPARA',s:34,b:1,c:'#c97e10'});
  if(shop.tagline)L.push({t:shop.tagline,s:16,c:'#2e7d32',b:1});
  if(shop.address)L.push({t:shop.address,s:16,c:'#444'});
  L.push({t:'GSTIN: '+(shop.gstin||''),s:15,c:'#444'});
  L.push({rule:1,gap:16});
  L.push({t:'TAX INVOICE',s:14,b:1,c:'#888'});
  L.push({t:'Invoice No: '+inv.no+'   ·   Date: '+fmtDate(inv.date),s:19,b:1,c:'#111'});
  if(rec.orderNo)L.push({t:'Order No: '+rec.orderNo,s:16,c:'#444'});
  else if(rec.altNo)L.push({t:'Alteration No: '+rec.altNo,s:16,c:'#444'});
  if(rec.deliveryDate)L.push({t:'Delivery Date: '+fmtDate(rec.deliveryDate),s:18,b:1,c:'#7a4f01',hl:'#fff3cd'});
  L.push({gap:10});
  L.push({t:(rec.customerName||'').toUpperCase(),s:22,b:1,c:'#111'});
  L.push({t:'Contact: '+(rec.phone||''),s:16,c:'#444'});
  const sm=rec.salesmanId?(DB.salesmen||[]).find(x=>x.id===rec.salesmanId):null;
  if(sm)L.push({t:'Salesman: '+sm.name+(sm.phone?' ('+sm.phone+')':''),s:15,c:'#555'});
  L.push({rule:1,gap:14});
  (inv.items||[]).forEach(it=>{const p=+it.price||0,qty=+it.qty||1;
    L.push({t:it.label||'Item',s:19,b:1,c:'#111',right:money(p),rightS:19,rightB:1});
    L.push({t:qty>1?`Qty ${qty}`:'',s:14,c:'#777'});
    if(it.includes)L.push({t:'Includes: '+it.includes,s:14,c:'#777',italic:1});
    L.push({gap:6});});
  L.push({rule:1,gap:12});
  L.push({t:'Sub Total',s:16,c:'#444',right:money(comp.gross),rightS:16});
  if(comp.discount>0)L.push({t:'Discount',s:16,c:'#444',right:'− '+money(comp.discount),rightS:16});
  L.push({t:'Grand Total',s:24,b:1,c:'#111',right:money(comp.total),rightS:24,rightB:1});
  L.push({gap:6});
  L.push({t:'Received',s:16,c:'#444',right:money(received),rightS:16});
  L.push({t:'Balance Due',s:19,b:1,c:baaki>0?'#c0392b':'#2e7d32',right:money(baaki),rightS:19,rightB:1});
  if(prevBal>0){L.push({gap:6});
    L.push({t:'Previous Balance',s:15,c:'#666',right:money(prevBal),rightS:15});
    L.push({t:'Current Balance',s:16,b:1,c:'#444',right:money(currBal),rightS:16,rightB:1});}
  L.push({t:'Payment Mode: '+(inv.paymentMode||'Cash'),s:15,c:'#555'});
  L.push({rule:1,gap:14});
  if(shop.terms){
    L.push({t:'Terms & Conditions',s:15,b:1,c:'#555'});
    meas.font='13px Arial,sans-serif';
    String(shop.terms).split('\n').forEach(line=>{if(!line.trim())return;
      wrapCanvasText(meas,line,contentW).forEach(w=>L.push({t:w,s:13,c:'#777'}));});
  }
  let h=pad*2;
  L.forEach(l=>{h+=l.gap?l.gap:0; if(l.t!=='')h+= (l.s?l.s*1.7:24); if(l.rule)h+=6;});
  const c=document.createElement('canvas');c.width=W;c.height=h;const x=c.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,h);let y=pad+24;
  L.forEach(l=>{
    if(l.gap)y+=l.gap;
    if(l.rule){x.strokeStyle='#ddd';x.beginPath();x.moveTo(pad,y);x.lineTo(W-pad,y);x.stroke();y+=6;return;}
    if(l.t===''){return;}
    if(l.hl){x.fillStyle=l.hl;x.font=(l.b?'bold ':'')+(l.s||16)+'px Arial,sans-serif';const wtxt=x.measureText(l.t).width;x.fillRect(pad-4,y-l.s,wtxt+8,l.s+10);}
    x.fillStyle=l.c||'#111';x.font=(l.italic?'italic ':'')+(l.b?'bold ':'')+(l.s||16)+'px Arial,sans-serif';x.fillText(l.t,pad,y);
    if(l.right){x.font=(l.rightB?'bold ':'')+(l.rightS||16)+'px Arial,sans-serif';const rw=x.measureText(l.right).width;x.fillText(l.right,W-pad-rw,y);}
    y+=(l.s?l.s*1.7:24);
  });
  return c;
}
async function waInvoice(kind,id){const rec=invRecOf(kind,id);if(!rec||!rec.invoice)return;

let rpPeriod='month', rpFrom='', rpTo='';
function rpRange(){
  const today=new Date();const iso=d=>d.toISOString().slice(0,10);
  if(rpPeriod==='week'){const d=new Date(today);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return {from:iso(d),to:iso(today)};}
  if(rpPeriod==='month'){return {from:iso(new Date(today.getFullYear(),today.getMonth(),1)),to:iso(today)};}
  return {from:rpFrom||iso(new Date(today.getFullYear(),today.getMonth(),1)),to:rpTo||iso(today)};
}
function setRpPeriod(p){rpPeriod=p;if(p==='custom'){if($('#rp_from'))rpFrom=$('#rp_from').value;if($('#rp_to'))rpTo=$('#rp_to').value;}renderReports();}

async function recToggle(btn,lbl,onDone){
  if(recorder&&recorder.state==='recording'){recorder.stop();return;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){micHelp();return;}
  try{recStream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(err){ if(err&&(err.name==='NotAllowedError'||err.name==='SecurityError'))micHelp(); else toast('Mic: '+(err.name||'error'),'bad'); return; }
  let mime='';['audio/webm','audio/mp4','audio/ogg'].forEach(m=>{if(!mime&&window.MediaRecorder&&MediaRecorder.isTypeSupported(m))mime=m;});
  try{recorder=mime?new MediaRecorder(recStream,{mimeType:mime}):new MediaRecorder(recStream);}catch(e){recorder=new MediaRecorder(recStream);}
  recChunks=[];
  recorder.ondataavailable=e=>{if(e.data&&e.data.size)recChunks.push(e.data);};
  recorder.onstop=async()=>{
    const blob=new Blob(recChunks,{type:recorder.mimeType||'audio/webm'});
    if(recStream){recStream.getTracks().forEach(tr=>tr.stop());recStream=null;}
    clearInterval(recTimer); if(btn){btn.classList.remove('recording');btn.textContent='🎙️';} if(lbl)lbl.textContent=t('vn_hint');
    if(blob.size>0){const vid='voice_'+uid();try{await mPut(vid,blob);onDone&&onDone(vid);toast(t('t_voice'),'ok');}catch(e){toast('Save fail','bad');}}
    recorder=null;
  };
  recorder.start();recT0=Date.now(); if(btn){btn.classList.add('recording');btn.textContent='⏹️';}
  recTimer=setInterval(()=>{const s=Math.floor((Date.now()-recT0)/1000); if(lbl)lbl.textContent=`${t('recording')}  ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;},200);
}

function slipCanvas(o,itemId){

  L.push({t:(o.customerName||''),s:26,c:'#111'});
  L.push({t:'Delivery: '+fmtDate(masterDate(o.deliveryDate)),s:24,c:'#444'});
  L.push({gap:14});
  items.forEach(gid=>{const g=G(gid);if(!g)return;const cols=mcols(g),v=o.m[gid]||{};
    L.push({t:(g.ico||'')+' '+g.n,s:28,b:1,c:'#111',rule:1});

    if(o.design&&o.design[gid])L.push({t:'   ✎ '+o.design[gid],s:22,c:'#666'});
    L.push({gap:10});});
  if(o.notes){L.push({t:'Note: '+o.notes,s:22,c:'#444'});L.push({gap:6});}
  let h=pad*2; L.forEach(l=>h+=l.gap?l.gap:lh);
  const c=document.createElement('canvas');c.width=W;c.height=h;const x=c.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,h);let y=pad+20;
  L.forEach(l=>{ if(l.gap){y+=l.gap;return;} x.fillStyle=l.c||'#111'; x.font=(l.b?'bold ':'')+(l.s||24)+'px Arial,sans-serif'; x.fillText(l.t,pad,y);
    if(l.rule){x.strokeStyle='#ddd';x.beginPath();x.moveTo(pad,y+8);x.lineTo(W-pad,y+8);x.stroke();} y+=lh; });
  return c;
}

    const c=slipCanvas(o,gid);
    const slipBlob=await new Promise(r=>c.toBlob(r,'image/png'));
    if(slipBlob)files.push(new File([slipBlob],'PARAMPARA-'+o.orderNo+'.png',{type:'image/png'}));
    const gids=gid?[gid]:sortItems(o.items);
    for(const k of gids){ for(const pid of((o.itemPhotos&&o.itemPhotos[k])||[])){const b=await mGet(pid);if(b)files.push(new File([b],'photo-'+pid+'.jpg',{type:b.type||'image/jpeg'}));} }
    if(navigator.canShare&&files.length&&navigator.canShare({files})){ await navigator.share({files,title:'Order #'+o.orderNo,text}); return; }
    if(navigator.canShare&&files[0]&&navigator.canShare({files:[files[0]]})){ await navigator.share({files:[files[0]],title:'Order #'+o.orderNo,text}); return; }
  }catch(e){ if(e&&e.name==='AbortError')return; }
  window.open(waLink('',text),'_blank');
}
function buildPrintHTML(o,itemId){
  const items=itemId?[itemId]:sortItems(o.items);
  const blocks=items.map(gid=>{const g=G(gid);if(!g)return '';const cols=mcols(g),v=o.m[gid]||{};
    const rows=cols.filter(col=>v[col.k]).map(col=>`<tr><td>${esc(col.n)}</td><td><b>${esc(v[col.k])}</b></td></tr>`).join('');
    const dn=(o.design&&o.design[gid])?`<div class="dn">✎ ${esc(o.design[gid])}</div>`:'';
    return `<div class="item"><h3>${g.ico||''} ${esc(g.n)}</h3><table>${rows||'<tr><td>—</td><td></td></tr>'}</table>${dn}</div>`;}).join('');
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Order ${esc(o.orderNo)}</title><style>
    *{font-family:Arial,sans-serif;color:#111;-webkit-print-color-adjust:exact}
    body{margin:22px}
    .hd{display:flex;justify-content:space-between;align-items:baseline;border-bottom:3px solid #c97e10;padding-bottom:8px;margin-bottom:14px}
    .hd .b{font-size:26px;font-weight:bold;letter-spacing:2px;color:#c97e10}
    .hd .o{font-size:18px;font-weight:bold}
    .meta{font-size:15px;margin-bottom:16px;line-height:1.7}
    .item{border:1px solid #ccc;border-radius:8px;padding:10px 14px;margin-bottom:12px;page-break-inside:avoid}
    .item h3{margin:0 0 6px;font-size:18px}
    table{width:100%;border-collapse:collapse}
    td{padding:5px 6px;font-size:15px;border-bottom:1px solid #eee}
    td:last-child{text-align:right;width:42%}
    .dn{margin-top:8px;font-size:14px;color:#444;font-style:italic}
    @media print{@page{margin:12mm}body{margin:0}}
  </style></head><body>
    <div class="hd"><div class="b">PARAMPARA</div><div class="o">Order #${esc(o.orderNo)}</div></div>
    <div class="meta"><b>Customer:</b> ${esc(o.customerName)} &nbsp;&nbsp; <b>Phone:</b> ${esc(o.phone||'-')}<br>
      <b>Delivery:</b> ${fmtDate(masterDate(o.deliveryDate))} &nbsp;&nbsp; <b>Order date:</b> ${fmtDate(o.orderDate)}</div>
    ${blocks}
    ${o.notes?`<div class="item"><h3>Note</h3><div style="font-size:15px">${esc(o.notes)}</div></div>`:''}
  </body></html>`;
}
function doPrint(o,itemId){
  const ifr=document.createElement('iframe');
  ifr.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
  document.body.appendChild(ifr);
  const d=ifr.contentWindow.document; d.open(); d.write(buildPrintHTML(o,itemId)); d.close();
  setTimeout(()=>{ try{ifr.contentWindow.focus();ifr.contentWindow.print();}catch(e){} setTimeout(()=>ifr.remove(),2000); },400);
}
function itemPrint(oid,gid){const o=DB.orders.find(x=>x.id===oid);if(o)doPrint(o,gid);}
function orderPrint(oid){const o=DB.orders.find(x=>x.id===oid);if(o)doPrint(o,null);}

function renderItemEdit(){const d=itemDraft;

    <button class="btn sm danger" style="margin-top:8px" onclick="itemDraftDelField(${i})">${t('remove')}</button></div>`).join('');
  $('#sheet').innerHTML=`<div class="grip"></div><h3 style="margin-bottom:14px">${d.n?esc(d.n):t('add_item')}</h3>

    <div class="modal-actions"><button class="btn ghost" onclick="itemMaster()">${t('cancel')}</button><button class="btn primary" onclick="itemDraftSave()">${t('save')}</button></div>`;

  $('#sheet').querySelectorAll('select[data-ft]').forEach(sel=>sel.addEventListener('change',()=>{captureItemDraft();renderItemEdit();}));

function captureItemDraft(){const d=itemDraft;
  if($('#id_name'))d.n=$('#id_name').value.trim(); if($('#id_ico'))d.ico=$('#id_ico').value.trim()||'🧩';
  $('#sheet').querySelectorAll('[data-fn]').forEach(inp=>{d.fields[+inp.dataset.fn].n=inp.value.trim();});
  $('#sheet').querySelectorAll('[data-ft]').forEach(sel=>{d.fields[+sel.dataset.ft].type=sel.value;});
  $('#sheet').querySelectorAll('[data-fopt]').forEach(inp=>{d.fields[+inp.dataset.fopt].options=inp.value.split(',').map(s=>s.trim()).filter(Boolean);});
}
function itemDraftAddField(){captureItemDraft();itemDraft.fields.push({k:'f_'+uid(),n:'',type:'number',options:[]});renderItemEdit();}
function itemDraftDelField(i){captureItemDraft();itemDraft.fields.splice(i,1);renderItemEdit();}
function itemDraftSave(){captureItemDraft();const d=itemDraft;

  d.fields=d.fields.filter(f=>f.n);

function markBackup(){localStorage.setItem('pb_ob_lastbackup',new Date().toISOString().slice(0,10));}
function backupMenu(){modal(t('backup_title'),`<p style="color:var(--txt2);font-size:14px;line-height:1.6">${t('backup_desc')}</p>
  <p class="hint" style="margin-top:8px">${t('backup_note')}</p>
  <div class="modal-actions" style="flex-direction:column">
  <button class="btn primary block" onclick="shareBackup()">📤 ${t('send_backup')}</button>
  <p class="hint" style="margin:2px 0 4px">${t('send_backup_hint')}</p>
  <button class="btn ghost block" onclick="doExport()">⬇️ ${t('download_backup')}</button>
  <button class="btn ghost block" onclick="doImport()">⬆️ ${t('restore_backup')}</button>
  <button class="btn ghost block" onclick="restoreSnapshotMenu()">🕑 ${t('restore_auto')}</button></div>`,[]);}
function doExport(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=u;a.download='parampara-orderbook-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000);markBackup();renderOrders();closeSheet();toast('Backup ✓','ok');}
async function shareBackup(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const file=new File([blob],'parampara-backup-'+new Date().toISOString().slice(0,10)+'.json',{type:'application/json'});
  markBackup();renderOrders();
  try{ if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:'PARAMPARA Backup'}); closeSheet(); return; } }
  catch(e){ if(e&&e.name==='AbortError'){closeSheet();return;} }
  doExport();
}
function doImport(){const inp=document.createElement('input');inp.type='file';inp.accept='.json,application/json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.orders)throw 0;
      confirmModal(t('restore_title'),t('restore_msg'),()=>{DB=d;if(!DB.customers)DB.customers=[];if(!DB.designLib)DB.designLib={};if(!DB.karigars)DB.karigars=[];save();closeSheet();go('orders');toast(t('t_restored'),'ok');});
    }catch(_){toast(t('t_wrong'),'bad');}};r.readAsText(f);};inp.click();}
async function restoreSnapshotMenu(){
  const keys=(await mKeys()).filter(k=>String(k).indexOf('snap_')===0).sort().reverse();
  if(!keys.length){toast(t('no_snapshots'),'bad');return;}
  modal(t('auto_backups'),`<p class="hint" style="margin-bottom:10px">${t('auto_backups_desc')}</p>`+keys.map(k=>`<button class="btn ghost block" style="margin-bottom:8px" onclick="restoreSnapshot('${k}')">🕑 ${String(k).replace('snap_','')}</button>`).join(''),[{label:t('close'),cls:'ghost',fn:closeSheet}]);
}
async function restoreSnapshot(key){
  let data=await mGet(key); if(!data){toast(t('t_wrong'),'bad');return;}
  if(data instanceof Blob)data=await data.text();
  confirmModal(t('restore_title'),t('restore_msg'),()=>{try{const d=JSON.parse(data);if(!d.orders)throw 0;DB=d;if(!DB.customers)DB.customers=[];if(!DB.designLib)DB.designLib={};if(!DB.karigars)DB.karigars=[];save();closeSheet();go('orders');toast(t('t_restored'),'ok');}catch(e){toast(t('t_wrong'),'bad');}});
}

function showSheet(){$('#scrim').classList.add('show');}
function closeSheet(){$('#scrim').classList.remove('show');$('#fracbar').classList.remove('show');}

function modal(title,html,actions){const acts=(actions||[]).map((a,i)=>`<button class="btn ${a.cls||'ghost'}" data-mi="${i}">${a.label}</button>`).join('');
  $('#sheet').innerHTML=`<div class="grip"></div>${title?`<h3 style="margin-bottom:14px">${title}</h3>`:''}${html}${actions&&actions.length?`<div class="modal-actions">${acts}</div>`:''}`;
  (actions||[]).forEach((a,i)=>{const b=$('#sheet').querySelector(`[data-mi="${i}"]`);if(b)b.onclick=a.fn;});showSheet();}
function confirmModal(ti,m,onYes){modal(ti,`<p style="color:var(--txt2);font-size:14px;line-height:1.6">${m}</p>`,[{label:t('no'),cls:'ghost',fn:closeSheet},{label:t('yes'),cls:'danger',fn:()=>{closeSheet();onYes();}}]);}
let toastT=null;
function toast(msg,kind){const el=$('#toast');el.textContent=msg;el.className='toast show '+(kind||'');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2400);}
