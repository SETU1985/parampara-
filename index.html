/* live prefill: copy BODY columns (not length) from any same-category garment already filled */
function prefillGarment(key){
  const f=form,g=G(key); if(!g)return; const common=commonFor(g.cat); if(!f.m[key])f.m[key]={};
  const mid=memberOf(key), gid=g.id;
  const allow=itemCols(g).map(c=>c.k);   // don't carry columns this garment doesn't have (e.g. sleeveless)
  const putRaw=(k,val)=>{if(!allow.includes(k)||f.m[key][k]||val==null||val==='')return;f.m[key][k]=val;};
  const putDeriv=(k,val)=>{if(!allow.includes(k)||f.m[key][k]||val==null||val==='')return;const dv=deriveMeasVal(g.id,k,val);if(dv!=='')f.m[key][k]=dv;};
  // copy from THIS member's other garments only — never mix two people's bodies
  for(const ok of f.items){ if(ok===key)continue; if(memberOf(ok)!==mid)continue;
    const og=G(ok); if(!og||!f.m[ok])continue;
    if(og.cat===g.cat){ common.forEach(k=>{if(f.m[ok][k])putDeriv(k,f.m[ok][k]);}); }
    else { GLOBAL_MEAS.forEach(k=>{if(f.m[ok][k])putDeriv(k,f.m[ok][k]);}); }   // Hip flows upper<->lower
  }
  // the saved customer's own measurements only help the first (main) member
  const isMain = !mid || (f.members&&f.members[0]&&f.members[0].id===mid);
  if(isMain && f.customerId){const c=custById(f.customerId); if(c&&c.m){
    if(c.m[gid]){Object.keys(c.m[gid]).forEach(k=>{putRaw(k,c.m[gid][k]);});}      // own saved → no derivation
    else {for(const okid of Object.keys(c.m)){const og=G(okid);if(!og||og.cat!==g.cat)continue;common.forEach(k=>{if(c.m[okid][k])putDeriv(k,c.m[okid][k]);});break;}}
    GLOBAL_MEAS.forEach(k=>{if(f.m[key][k])return;for(const okid of Object.keys(c.m)){if(c.m[okid]&&c.m[okid][k]){putDeriv(k,c.m[okid][k]);break;}}});
  }}
}
/* keep a measurement to max 2 whole digits (+ optional .dd or fraction). No 3-digit values. */
function sanitizeMeas(v){if(!v)return '';const m=String(v).match(/^(\d{0,2})([.][0-9]{0,2})?([½¼¾⅛])?/);return m?m[0]:'';}
/* parse "18½" / "18.5" -> 18.5 ; format 17.5 -> "17½" (keeps tailor-friendly fractions) */
function parseMeas(v){if(v==null)return null;v=String(v).trim();if(!v)return null;
  const map={'½':.5,'¼':.25,'¾':.75,'⅛':.125};let frac=0;
  for(const ch in map){if(v.indexOf(ch)>=0){frac=map[ch];v=v.replace(ch,'');}}
  v=v.trim();if(v==='')return frac||null;const n=parseFloat(v);if(isNaN(n))return frac||null;return n+frac;}
function fmtMeas(n){if(n==null||isNaN(n))return '';if(n<0)n=0;
  const whole=Math.floor(n),frac=+(n-whole).toFixed(3),fm={0.5:'½',0.25:'¼',0.75:'¾',0.125:'⅛'};
  if(fm[frac]!=null)return (whole?whole:'')+fm[frac];
  if(frac===0)return String(whole);
  return (Math.round(n*100)/100).toString();}
/* apply garment-specific derivation (e.g. waistcoat shoulder = source − 0.5) */
function deriveMeasVal(gid,k,v){const d=(MEAS_DERIVE[gid]||{})[k];
  if(d==null||v==null||v==='')return v;const n=parseMeas(v);if(n==null)return v;return fmtMeas(n+d);}
/* fraction bar + live body-measurement propagation across garments */
let _mfocus=null;
function bindMeasInputs(){
  document.querySelectorAll('.mInput').forEach(inp=>{
    if(inp.tagName==='SELECT') return;
    inp.addEventListener('focus',()=>{_mfocus=inp;$('#fracbar').classList.add('show');});
    inp.addEventListener('blur',()=>{setTimeout(()=>{const a=document.activeElement;if(a&&a.classList&&a.classList.contains('mInput')&&a.tagName!=='SELECT')return;$('#fracbar').classList.remove('show');},150);});

  });

function propagate(inp){
  const g=G(inp.dataset.g),k=inp.dataset.k,v=inp.value.trim();
  if(!g)return;
  const isGlobal=GLOBAL_MEAS.includes(k);
  if(!isGlobal && !commonFor(g.cat).includes(k))return; // only BODY columns flow, never Length
  if((MEAS_DERIVE[g.id]||{})[k]!=null)return;            // derived field (e.g. waistcoat shoulder) — manual, don't push back
  document.querySelectorAll('.mInput').forEach(other=>{ if(other===inp)return;
    const og=G(other.dataset.g); if(!og)return;
    const sameGroup = isGlobal ? true : (og.cat===g.cat);
    if(sameGroup && other.dataset.k===k){
      if(!other.value.trim()||other.dataset.auto==='1'){ const dv=deriveMeasVal(og.id,k,v); other.value=dv; other.dataset.auto='1'; other.classList.toggle('filled',!!dv); }
    }
  });
}

let _rec=null,_recBtn=null;
function sttSupported(){return !!(window.SpeechRecognition||window.webkitSpeechRecognition);}
function sttLang(){return localStorage.getItem('pb_ob_stt')||'en-IN';}
function sttLangLabel(){return sttLang()==='hi-IN'?'हिंदी':'English';}
function toggleSTTLang(btn){const nl=sttLang()==='hi-IN'?'en-IN':'hi-IN';localStorage.setItem('pb_ob_stt',nl);if(btn)btn.innerHTML='🎤 '+t('voice_lang')+': <b>'+sttLangLabel()+'</b>';toast(t('voice_lang')+' → '+sttLangLabel(),'ok');}
function micBtn(sel){ return sttSupported()?`<button type="button" class="btn sm ghost micbtn" onclick="dictate('${sel}',this)" title="${t('dictate')}">🎤</button>`:''; }
function dictate(sel,btn){
  if(!sttSupported()){toast(t('stt_na'),'bad');return;}
  const el=document.querySelector(sel); if(!el)return;
  if(_rec){ try{_rec.stop();}catch(e){} const wasSame=(_recBtn===btn); if(_recBtn)_recBtn.classList.remove('listening'); _rec=null;_recBtn=null; if(wasSame)return; }
  const R=window.SpeechRecognition||window.webkitSpeechRecognition; const r=new R(); _rec=r; _recBtn=btn||null;
  r.lang=sttLang(); r.interimResults=true; r.continuous=false; r.maxAlternatives=1;
  const base=el.value?el.value.replace(/\s+$/,'')+' ':'';
  if(btn)btn.classList.add('listening');
  r.onresult=(e)=>{ let interim='',fin=''; for(let i=0;i<e.results.length;i++){const tr=e.results[i][0].transcript; if(e.results[i].isFinal)fin+=tr; else interim+=tr;}
    el.value=base+fin+interim; el.dispatchEvent(new Event('input',{bubbles:true})); };
  r.onerror=()=>{ if(_recBtn)_recBtn.classList.remove('listening'); _rec=null;_recBtn=null; toast(t('stt_err'),'bad'); };
  r.onend=()=>{ if(_recBtn)_recBtn.classList.remove('listening'); _rec=null;_recBtn=null;
    el.dispatchEvent(new Event('input',{bubbles:true}));
    if(el.dataset&&el.dataset.design&&window.form&&form.design)form.design[el.dataset.design]=el.value.trim();
    if(el.id==='f_notes'&&window.form)form.notes=el.value; toast(t('stt_done'),'ok'); };
  try{r.start(); toast(t('stt_listening'),'ok');}catch(e){}
}

    [{label:t('cancel'),cls:'ghost',fn:closeSheet},{label:t('add'),cls:'primary',fn:()=>savePayment(id)}]); }
function savePayment(id){ const o=DB.orders.find(x=>x.id===id); if(!o)return; migratePayments(o);
  const amt=+(($('#p_amt')&&$('#p_amt').value)||0); const date=($('#p_date')&&$('#p_date').value)||todayISO();

function delPayment(id,i){ const o=DB.orders.find(x=>x.id===id); if(!o||!o.payments)return;

async function renderThaanPhotos(){const el=$('#th_photos');if(!el)return;el.innerHTML='';
  for(const id of(_th.photos||[])){const url=await mURL(id);const w=document.createElement('div');w.className='thumb-wrap';

async function renderReadyPhotos(){const el=$('#rd_photos');if(!el)return;el.innerHTML='';
  for(const id of(_rd.photos||[])){const url=await mURL(id);const w=document.createElement('div');w.className='thumb-wrap';
    w.innerHTML=`<img class="thumb" src="${url||''}"><div class="thumb-x">✕</div>`;
    w.querySelector('.thumb').onclick=()=>viewPhoto(url);
    w.querySelector('.thumb-x').onclick=async()=>{await mDel(id);_rd.photos=(_rd.photos||[]).filter(x=>x!==id);renderReadyPhotos();};
    el.appendChild(w);}}
async function processPhoto(e){const file=e.target.files[0];if(!file)return;
  const blob=await downscale(file);const id='img_'+uid();await mPut(id,blob);
  if(photoTarget.type==='item'){const gid=photoTarget.gid;form.itemPhotos=form.itemPhotos||{};form.itemPhotos[gid]=form.itemPhotos[gid]||[];form.itemPhotos[gid].push(id);renderItemPhotos(gid);}
  else if(photoTarget.type==='alt'){altForm.photos=altForm.photos||[];altForm.photos.push(id);renderAltFormPhotos();}
  else if(photoTarget.type==='purch'){purchForm.photos=purchForm.photos||[];purchForm.photos.push(id);renderPurchPhotos();}
  else if(photoTarget.type==='fab'){_th.photos=_th.photos||[];_th.photos.push(id);renderThaanPhotos();}
  else if(photoTarget.type==='exp'){_exp.photos=_exp.photos||[];_exp.photos.push(id);renderExpPhotos();}
  else if(photoTarget.type==='rdy'){_rd.photos=_rd.photos||[];_rd.photos.push(id);renderReadyPhotos();}
  else if(photoTarget.type==='rbulk'){ if(_rbulk){_rbulk.entryPhotos=_rbulk.entryPhotos||[];_rbulk.entryPhotos.push(id);readyBulkPhotoBadge();} }
  else if(photoTarget.type==='bulkfab'){ if(_bulk){_bulk.entryPhotos=_bulk.entryPhotos||[];_bulk.entryPhotos.push(id);bulkPhotoBadge();} }
  else if(photoTarget.type==='cust'){ const c=custById(_custPhotoId||''); if(c){c.photos=c.photos||[];c.photos.push(id);save();renderCustPhotos();} }
  else if(photoTarget.type==='puritem'){ _purD.photos=_purD.photos||[]; _purD.photos.push(id); purItemPhotoBadge(); }
  else if(photoTarget.type==='imaster'){ if(_imDraft){_imDraft.photos=_imDraft.photos||[];_imDraft.photos.push(id);imRender();} }
  else {form.photos.push(id);renderFormPhotos();}
  toast(t('t_photo'));}
$('#filePick').addEventListener('change',processPhoto);
$('#filePickCam').addEventListener('change',processPhoto);
function downscale(file){return new Promise(res=>{const img=new Image(),rd=new FileReader();
  rd.onload=()=>{img.onload=()=>{const max=1280;let{width:w,height:h}=img;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(b=>res(b||file),'image/jpeg',.82);};img.onerror=()=>res(file);img.src=rd.result;};
  rd.onerror=()=>res(file);rd.readAsDataURL(file);});}
async function renderFormPhotos(){const el=$('#f_photos');if(!el)return;el.innerHTML='';
  for(const id of form.photos){const url=await mURL(id);const w=document.createElement('div');w.className='thumb-wrap';
    w.innerHTML=`<img class="thumb" src="${url||''}"><div class="thumb-x">✕</div>`;
    w.querySelector('.thumb').onclick=()=>viewPhoto(url);
    w.querySelector('.thumb-x').onclick=async()=>{await mDel(id);form.photos=form.photos.filter(x=>x!==id);renderFormPhotos();};
    el.appendChild(w);}}
function viewPhoto(url){if(!url)return;modal('',`<img src="${url}" style="width:100%;border-radius:12px">`,[{label:t('close'),cls:'ghost',fn:closeSheet}]);}

let purQ='', purSort='new';
function setPurQ(v){purQ=v;renderPurchases(true);}
function setPurSort(v){purSort=v;renderPurchases();}
function renderPurchases(keepFocus){
  const el=$('#purchList');
  const all=(DB.purchases||[]);
  const addBtn=`<div class="row" style="margin-bottom:12px;gap:8px">
    <button class="btn primary" style="flex:1" onclick="openPurchaseForm()">+ ${t('new_purchase')}</button>
    <button class="btn ghost" style="flex:1" onclick="go('reports')">📊 ${t('reports')}</button></div>`;
  if(!all.length){el.innerHTML=addBtn+`<div class="empty"><div class="big">📦</div><p><b>${t('no_purchases')}</b></p><p style="font-size:13px">${t('no_purchases_sub')}</p></div>`;return;}

  const q=(purQ||'').trim().toLowerCase();
  let list=q?all.filter(p=>
      String(p.supplier||'').toLowerCase().includes(q)
      ||String(p.billNo||'').toLowerCase().includes(q)
      ||String(p.desc||'').toLowerCase().includes(q)
      ||String(p.phone||'').includes(q)):all.slice();
  list=applySort(list,purSort,p=>p.date,p=>+p.total||0);

  const searchBox=`<div class="field" style="margin-bottom:10px">
    <input id="purSearch" value="${esc(purQ)}" placeholder="🔍 ${t('pur_search_ph')}" oninput="setPurQ(this.value)"></div>`
    + sortChips(purSort,'setPurSort');
  const spent=r2(list.reduce((s,p)=>s+(+p.total||0),0));
  const due=r2(list.reduce((s,p)=>s+orderBaaki(p),0));
  const title=`<div class="kv" style="margin:0 0 10px">
    <span class="hint">${t('pur_count',{n:list.length})}</span>
    <span class="hint">${t('pur_spent')}: <b style="color:var(--txt)">${money(spent)}</b>${due>0?` · ${t('baaki')}: <b style="color:var(--bad)">${money(due)}</b>`:''}</span></div>`;

  if(!list.length){el.innerHTML=addBtn+searchBox+`<div class="empty"><p>${t('inv_none_match')}</p></div>`;
    if(keepFocus)focusPurSearch(); return;}

  el.innerHTML=addBtn+searchBox+title+list.map(p=>{
    const baaki=orderBaaki(p);
    return `<div class="card ocard" onclick="purchMenu('${p.id}')">
      <div class="top"><div><div class="ono">📦 ${esc(p.supplier)}</div>
        ${p.billNo?`<div class="name">${t('bill_no')}: ${esc(p.billNo)}</div>`:''}
        <div class="meta">${esc((p.desc||'').slice(0,50))}${(p.desc||'').length>50?'…':''}</div></div>
        <div class="deliv">${fmtDate(p.date)}</div></div>
      <div class="botrow"><span style="font-weight:800">${money(p.total)}</span>${baaki>0?`<span style="font-size:12px;color:var(--bad);font-weight:700">${t('baaki')}: ${money(baaki)}</span>`:`<span class="pill st-delivered">✓ ${t('inv_paid')}</span>`}</div>
    </div>`;
  }).join('');
  if(keepFocus)focusPurSearch();
}

/* ====================== INVOICE / BILLING (GST) ====================== */
/* ============================ SALE ESTIMATE / QUOTATION ============================
   A non-committal quote: customer + items + total. NO stock, NO money movement.
   Customer says OK (or asks to change) → edit freely → "Convert to sale" makes a real
   sale (which then deducts stock and takes payment through the normal invoice flow). */
let _est=null;
function estimateList(){
  const rows=(DB.estimates||[]).slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)))
    .map(e=>`<div class="cust-result" style="margin-bottom:6px" onclick="estimateOpen('${e.id}')">
      <div style="min-width:0"><b>📄 ${esc(e.no)}</b>
        <div class="hint">${esc(e.customerName||'—')} · ${fmtDate(e.date)}${e.convertedSaleId?` · ✅ ${t('est_converted')}`:''}</div></div>
      <b style="flex:0 0 auto">${money(estTotal(e))}</b></div>`).join('')
    || `<p class="hint" style="padding:20px 0;text-align:center">${t('est_none')}</p>`;
  $('#sheet').innerHTML=`<div class="grip"></div>
    <h2 style="margin-bottom:4px">📄 ${t('estimate')}</h2>
    <button class="btn primary block" style="margin-bottom:10px" onclick="estimateNew()">➕ ${t('est_new')}</button>
    ${rows}
    <div class="modal-actions"><button class="btn ghost block" onclick="closeSheet()">${t('close')}</button></div>
    <div class="fab-pad"></div>`;
  showSheet();
}
function estTotal(e){ return r2((e.items||[]).reduce((s,it)=>s+(+it.amount||0),0)); }
function estimateNew(){
  _est={id:uid(),no:nextDocNo('EST'),date:todayISO(),customerId:null,customerName:'',phone:'',
    items:[{label:'',qty:1,rate:'',amount:0}],note:'',convertedSaleId:null,_new:true};
  estimateRender();
}
function estimateOpen(id){
  const e=(DB.estimates||[]).find(x=>x.id===id); if(!e)return;
  _est=JSON.parse(JSON.stringify(e)); _est._new=false;
  estimateRender();
}
function estimateRender(){
  const e=_est;
  const rows=e.items.map((it,i)=>`<div class="pur-card">
    <div class="pur-card-h"><span class="pur-num">#${i+1}</span>
      <input value="${esc(it.label)}" placeholder="${t('est_item_ph')}" oninput="estLine(${i},'label',this.value)"
        style="flex:1;min-width:0;margin:0" list="estItemList">
      <button class="btn sm danger" style="flex:0 0 auto;padding:4px 9px" onclick="estDel(${i})">✕</button></div>
    <div class="pu-qty-row" style="grid-template-columns:1fr 1fr 1.2fr;margin-top:8px">
      <input type="number" inputmode="decimal" value="${esc(it.qty)}" placeholder="${t('qty')}" oninput="estLine(${i},'qty',this.value)" style="margin:0;text-align:center">
      <input type="number" inputmode="numeric" value="${esc(it.rate)}" placeholder="${t('purch_rate')}" oninput="estLine(${i},'rate',this.value)" style="margin:0;text-align:center">
      <div style="text-align:right;align-self:center;font-weight:800">${money(+it.amount||0)}</div>
    </div></div>`).join('');
  const savedItems=(DB.itemMaster||[]).map(m=>`<option value="${esc(m.name)}">`).join('');
  $('#sheet').innerHTML=`<div class="grip"></div>
    <h2 style="margin-bottom:2px">📄 ${e.convertedSaleId?t('est_view'):t('est_title')} <span class="hint">${esc(e.no)}</span></h2>
    ${e.convertedSaleId?`<p class="hint" style="margin-bottom:10px">✅ ${t('est_already')}</p>`:''}
    <datalist id="estItemList">${savedItems}</datalist>
    <div class="card" style="padding:10px 12px;margin-bottom:10px">
      <input id="est_cname" placeholder="👤 ${t('name_ph')}" value="${esc(e.customerName||'')}" autocomplete="off"
        onfocus="estCustSearch(this.value)" oninput="estCustSearch(this.value)" style="margin:0">
      <div id="estCustResults"></div>
      <input id="est_cphone" type="tel" placeholder="📞 ${t('phone')}" value="${esc(e.phone||'')}" style="margin-top:8px">
    </div>
    <div class="billed-bar"><span>📄 ${t('est_items')}</span><span class="hint" style="color:inherit">${money(estTotal(e))}</span></div>
    ${rows}
    <button class="btn ghost block" style="margin:8px 0 12px" onclick="estAddLine()">➕ ${t('add_item')}</button>
    <div class="field"><label>${t('stk_note')}</label><input id="est_note" value="${esc(e.note||'')}" placeholder="${t('est_note_ph')}"></div>
    <div class="card" style="padding:12px 14px;margin-top:10px">
      <div class="kv"><b>${t('grand_total')}</b><b style="font-size:18px;color:var(--saffron2)">${money(estTotal(e))}</b></div>
    </div>
    <div class="modal-actions" style="flex-wrap:wrap">
      <button class="btn ghost" onclick="estimateList()">${t('back')}</button>
      ${e.convertedSaleId?'':`<button class="btn ghost" onclick="estSave(false)">💾 ${t('save')}</button>
      <button class="btn primary" style="flex:2" onclick="estConvert()">➡️ ${t('est_convert')}</button>`}
    </div>
    ${!e._new&&!e.convertedSaleId?`<button class="btn danger block" style="margin-top:8px" onclick="estDelete('${e.id}')">🗑️ ${t('delete')}</button>`:''}
    <div class="fab-pad"></div>`;
  showSheet();
}
function estCustSearch(q){const box=$('#estCustResults'); if(!box)return;
  const hits=custHits(q);
  box.innerHTML=sugHead('saved_customers','estNewCust()')
    +(hits.length?hits.map(c=>custRowHTML(c,`estPickCust('${c.id}')`)).join('')
      :`<p class="hint" style="margin:6px 0 0">${q?t('cust_none_q'):t('cust_none')}</p>`);}
function estPickCust(id){const c=custById(id);if(!c)return;estCapture();_est.customerId=id;_est.customerName=c.name;_est.phone=c.phone;estimateRender();}
function estNewCust(){estCapture();_est.customerId=null;const box=$('#estCustResults');if(box)box.innerHTML='';const p=$('#est_cphone');if(p)p.focus();}
function estCapture(){const e=_est;if(!e)return;
  if($('#est_cname'))e.customerName=$('#est_cname').value.trim();
  if($('#est_cphone'))e.phone=$('#est_cphone').value.trim();
  if($('#est_note'))e.note=$('#est_note').value.trim();}
function estLine(i,f,v){ if(f==='label')_est.items[i].label=v; else _est.items[i][f]=v;
  const it=_est.items[i]; it.amount=r2((+it.qty||0)*(+it.rate||0));
  // light refresh of totals without losing focus
  const cards=document.querySelectorAll('#sheet .pur-card');
  if(cards[i]){const amtEl=cards[i].querySelector('.pu-qty-row>div');if(amtEl)amtEl.textContent=money(it.amount);}
  document.querySelectorAll('.billed-bar .hint').forEach(el=>el.textContent=money(estTotal(_est)));}
function estAddLine(){estCapture();_est.items.push({label:'',qty:1,rate:'',amount:0});estimateRender();}
function estDel(i){estCapture();_est.items.splice(i,1);if(!_est.items.length)_est.items.push({label:'',qty:1,rate:'',amount:0});estimateRender();}
function estSave(silent){
  estCapture();
  const e=_est;
  if(!(e.customerName||'').trim()){toast(t('t_no_name'),'bad');return false;}
  e.items=(e.items||[]).filter(it=>(it.label||'').trim()||(+it.amount||0)>0);
  if(!e.items.length){toast(t('est_no_items'),'bad');return false;}
  const idx=(DB.estimates||[]).findIndex(x=>x.id===e.id);
  const rec={...e}; delete rec._new;
  if(idx>=0)DB.estimates[idx]=rec; else {DB.estimates=DB.estimates||[];DB.estimates.push(rec);}
  save();
  if(!silent){closeSheet();toast(t('est_saved'),'ok');}
  return true;
}
function estDelete(id){confirmModal(t('confirm_del'),t('confirm_del_msg'),()=>{
  DB.estimates=(DB.estimates||[]).filter(x=>x.id!==id);save();closeSheet();estimateList();toast(t('t_deleted'));});}
function estConvert(){
  if(!estSave(true))return;
  const e=_est;
  confirmModal(t('est_convert'),t('est_convert_msg'),()=>{
    // a BARE sale first (like openSaleForm) — the bill exists only when he SAVES it,
    // so backing out leaves no phantom due
    const sale={id:uid(),created:new Date().toISOString(),customerId:e.customerId||null,
      customerName:e.customerName,phone:e.phone,payments:[],total:0,_fromEst:e.id};
    DB.sales=DB.sales||[]; DB.sales.push(sale);
    save(); closeSheet();
    openInvoiceForm('sale',sale.id);
    // pre-fill the FORM (not the record) with the estimate's lines
    invForm.items=e.items.map(it=>({label:it.label,hsn:'',qty:+it.qty||1,unit:'Pcs',rate:+it.rate||0,price:r2((+it.qty||1)*(+it.rate||0)),incl:[],includes:''}));
    invNormItems(invForm.items);
    renderInvoiceForm(); posRefresh();
    toast(t('est_converted_ok'),'ok');
  });
}

  let s;
  if(editId){s=(DB.sales||[]).find(x=>x.id===editId);}
  else{s={id:uid(),created:new Date().toISOString(),customerId:null,customerName:'',phone:'',payments:[],total:0};DB.sales=DB.sales||[];DB.sales.push(s);}
  openInvoiceForm('sale',s.id);

function openAltInvoice(id){const a=altById(id);if(!a)return;
  if(a.invoice)openInvoicePreview('alt',id); else openInvoiceForm('alt',id);}
function invRecOf(kind,id){return kind==='alt'?altById(id):(kind==='sale'?(DB.sales||[]).find(x=>x.id===id):DB.orders.find(x=>x.id===id));}
function invNormItems(items){
  (items||[]).forEach(it=>{
    it.qty=+it.qty||1;
    if(it.rate==null||it.rate==='')it.rate=it.price?r2((+it.price||0)/it.qty):'';
    if(!Array.isArray(it.incl))it.incl=it.includes?String(it.includes).split(',').map(x=>x.trim()).filter(Boolean):[];
  });
  return items;
}
function openInvoiceForm(kind,id){
  const rec=invRecOf(kind,id); if(!rec)return;
  if(rec.invoice){ invForm=JSON.parse(JSON.stringify(rec.invoice)); invForm.kind=kind; invForm.id=id;
    invNormItems(invForm.items);
    invForm.deliveryDate=rec.deliveryDate||invForm.deliveryDate||'';
    invForm.salesmanId=rec.salesmanId||invForm.salesmanId||'';
    if(kind==='sale'){invForm.customerName=rec.customerName||'';invForm.phone=rec.phone||'';invForm.notes=rec.notes||'';invForm.customerId=rec.customerId||null;} }
  else{
    let items;
    if(kind==='alt'){ items=[{label:rec.itemDesc||t('alterations'),hsn:'',qty:1,unit:'Pcs',price:+rec.total||0,disc:0,includes:''}]; }
    else if(kind==='sale'){ items=[]; }
    else{ items=orderBillLines(rec);
      if(!items.length)items=[{label:'Item',hsn:'',qty:1,unit:'Pcs',rate:'',price:'',disc:0,includes:''}];
    }
    invNormItems(items);
    invForm={kind,id,no:nextInvoiceNo(),date:todayISO(),interstate:false,paymentMode:'UPI',discType:'amount',discValue:0,courier:0,
      saleType:kind==='sale'?'rdy':null, orderNo:'',
      deliveryDate:rec.deliveryDate||'', salesmanId:rec.salesmanId||'',
      customerId:kind==='sale'?(rec.customerId||null):undefined,
      customerName:kind==='sale'?(rec.customerName||''):undefined,phone:kind==='sale'?(rec.phone||''):undefined,
      notes:kind==='sale'?(rec.notes||''):undefined,items};
  }
  renderInvoiceForm();
}
function itemLineAmt(it){const q=+it.qty||1;const r=+it.rate||0;return r2(q*r);}
function invItemRow(i,it){
  const masters=(DB.itemMaster||[]);
  const opts=masters.map(m=>`<option value="${m.id}" ${it.masterId===m.id?'selected':''}>${esc(m.name)}</option>`).join('');
  // includes chips = union of this item's picked parts + master's parts + global lib
  const picked=Array.isArray(it.incl)?it.incl:[];
  const mst=masters.find(m=>m.id===it.masterId);
  const pool=[]; (mst?mst.incl||[]:[]).forEach(p=>{if(!pool.includes(p))pool.push(p);});
  picked.forEach(p=>{if(!pool.includes(p))pool.push(p);});
  (DB.inclLib||[]).forEach(p=>{if(!pool.includes(p))pool.push(p);});
  const chips=pool.map(p=>{const on=picked.includes(p);
    return `<span class="gtag" onclick="invTogglePart(${i},'${esc(p).replace(/'/g,"\\'")}')" style="cursor:pointer;${on?'background:var(--saffron);color:#1a1206;border-color:var(--saffron)':''}">${on?'✓ ':''}${esc(p)}</span>`;}).join('');
  const amt=itemLineAmt(it);
  return `<div class="card" style="padding:12px;margin-bottom:10px;border-color:var(--line2)">
    <div class="kv" style="margin-bottom:8px"><b style="color:var(--saffron)">${t('inv_item_name')} ${i+1}</b>
      <button class="btn sm danger" onclick="invDelItem(${i})">✕</button></div>
    <div class="field" style="margin:0"><select onchange="invApplyMaster(${i},this.value)">
      <option value="">${t('inv_pick_item')}</option>${opts}
      <option value="__new__">${t('inv_new_item_opt')}</option></select></div>
    <div class="field" style="margin:8px 0 0"><input data-iin="${i}" value="${esc(it.label||'')}" placeholder="${t('inv_item_name_ph')}"></div>
    <div class="row" style="margin-top:8px">
      <div class="field" style="margin:0"><label>${t('qty')}</label><input data-iqty="${i}" type="number" inputmode="numeric" min="1" value="${esc(it.qty||1)}" oninput="invLineChanged(${i})"></div>
      <div class="field" style="margin:0"><label>${t('inv_rate')}</label><input data-irate="${i}" type="number" inputmode="numeric" value="${it.rate?esc(it.rate):''}" placeholder="0" oninput="invLineChanged(${i})"></div>
    </div>
    <div class="kv" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--line)">
      <span>${t('inv_amount')}</span><b id="invAmt${i}" style="font-size:16px;color:var(--saffron2)">${money(amt)}</b></div>
    <div class="hint" style="margin-top:10px;margin-bottom:4px">${t('inv_includes')}</div>
    <div class="gtags">${chips}<span class="gtag" onclick="invAddPart(${i})" style="cursor:pointer;border-style:dashed">${t('im_add_part')}</span></div>
    <details style="margin-top:8px"><summary style="font-size:11px;color:var(--mut);cursor:pointer">${t('hsn')}</summary>
      <input data-ihsn="${i}" value="${esc(it.hsn||'')}" placeholder="6203" style="margin-top:6px"></details>
  </div>`;
}
function invApplyMaster(i,val){
  captureInvoiceForm();
  if(val==='__new__'){ _imDraft=null; imEdit(null,{type:'inv',i:i}); return; }
  if(!val){ invForm.items[i].masterId=''; renderInvoiceForm(); return; }
  const m=(DB.itemMaster||[]).find(x=>x.id===val); if(!m){renderInvoiceForm();return;}
  const it=invForm.items[i];
  it.masterId=m.id; it.label=m.name; it.hsn=m.hsn||it.hsn||'';
  it.incl=[...(m.incl||[])];
  if(!it.rate&&m.rate)it.rate=m.rate;
  renderInvoiceForm();
}
function invTogglePart(i,p){captureInvoiceForm();const it=invForm.items[i];
  it.incl=Array.isArray(it.incl)?it.incl:[]; const k=it.incl.indexOf(p);
  if(k>=0)it.incl.splice(k,1); else it.incl.push(p); renderInvoiceForm();}
function invAddPart(i){captureInvoiceForm();
  modal(t('im_add_part'),`<div class="field"><label>${t('im_new_part')}</label><input id="invNewPart" placeholder="${t('im_part_ph')}"></div>`,
    [{label:t('cancel'),cls:'ghost',fn:()=>renderInvoiceForm()},
     {label:t('save'),cls:'primary',fn:()=>{const v=$('#invNewPart').value.trim();
       if(v){DB.inclLib=DB.inclLib||[];if(!DB.inclLib.includes(v))DB.inclLib.push(v);
         const it=invForm.items[i];it.incl=Array.isArray(it.incl)?it.incl:[];if(!it.incl.includes(v))it.incl.push(v);save();}
       renderInvoiceForm();}}]);
  setTimeout(()=>{const el=$('#invNewPart');if(el)el.focus();},120);}
function invLineChanged(i){
  const q=+(document.querySelector('[data-iqty="'+i+'"]')||{}).value||1;
  const r=+(document.querySelector('[data-irate="'+i+'"]')||{}).value||0;
  const el=$('#invAmt'+i); if(el)el.textContent=money(r2(q*r));
  updateInvTotals();
}
function invQuickPick(i,val){if(!val)return;captureInvoiceForm();invForm.items[i].label=val;renderInvoiceForm();}
/* ============ POS BILLING SCREEN (fast, no re-render on typing) ============ */

    <div class="head-grid" style="margin-top:8px">
      <div class="field" style="margin:0"><label>📅 ${t('inv_delivery')}</label>

      ${f.kind==='sale'?`

        <div style="display:flex;gap:6px">
          <input id="pos_ono" list="posOrderList" class="bold-in" value="${esc(f.orderNo||'')}"
            placeholder="${t('pos_ono_auto')}" style="flex:1" onchange="posLinkOrder(this.value)">
          <button class="btn ghost" style="flex:0 0 auto;padding:0 10px" onclick="invLoadFromOrder()">🔍</button>

    <div class="card pos-total" id="invTotalsBox" style="padding:12px 14px">

            <input id="inv_recv" type="number" inputmode="numeric" value="${esc(shown)}" placeholder="0"

      <div class="il il-stack">

        <span style="width:100%">${acctSelHTML('inv_acc', f.acc||(defaultAcc()||{}).id)}</span></div>

      <button class="btn ghost" onclick="previewInvoice()">👁️</button>

    <div class="fab-pad"></div>`;
  posRefresh();
  showSheet();
}

/* ---- bill lines: rendered on their own, so typing never re-renders the page ---- */

function posBilledSummary(){
  const f=invForm; if(!f||!(f.items||[]).length)return '';
  const qty=r2(f.items.reduce((s,it)=>s+(+it.qty||0),0));
  const sub=r2(f.items.reduce((s,it)=>s+(+it.price||((+it.qty||1)*(+it.rate||0)))||0,0));
  return `<div class="billed-sum">
    <span>${t('pur_total_qty')}: <b>${qty}</b></span>
    <span>${t('pur_subtotal')}: <b>${money(sub)}</b></span>
  </div>`;
}
function posRefresh(){
  const el=$('#posLines'); if(!el)return;
  const f=invForm;
  el.innerHTML=(f.items||[]).length
    ? f.items.map((it,i)=>posLineHTML(i,it)).join('')
    : `<div class="empty" style="padding:22px 10px"><p>${t('pos_empty')}</p></div>`;
  const c=$('#posCount'); if(c)c.textContent=t('inv_items_n',{n:(f.items||[]).length});
  const bb=$('#posBilledBar'); if(bb)bb.style.display=(f.items||[]).length?'':'none';
  const bs=$('#posBilledSummary'); if(bs)bs.innerHTML=posBilledSummary();
  updateInvTotals();
}
function posLineCalc(i){            // ← no re-render: cursor stays exactly where it is
  const qEl=document.querySelector('[data-iqty="'+i+'"]');
  const rEl=document.querySelector('[data-irate="'+i+'"]');
  const q=+((qEl||{}).value)||1, r=+((rEl||{}).value)||0;
  if(invForm.items[i]){invForm.items[i].qty=q;invForm.items[i].rate=r;invForm.items[i].price=r2(q*r);}
  const a=document.querySelector('[data-iamt="'+i+'"]'); if(a&&document.activeElement!==a)a.value=r2(q*r)||'';

let _posItems=[], _posTopFn=null;
function posSearchRun(qraw){
  const box=$('#posSearchRes'); if(!box)return;
  const q=(qraw||'').trim();
  const norm=s=>String(s||'').toLowerCase().replace(/[^a-z0-9]/g,'');   // ignore spaces, #, - , case
  const key=s=>{const n=norm(s);return /^\d+$/.test(n)?String(parseInt(n,10)||0):n;};   // pure numbers: drop leading zeros (01=1=001)
  const qn=key(q);
  const match=s=>!qn||key(s).includes(qn);
  // Search shows real stock (readymade pieces + fabric rolls) PLUS saved made-to-order presets
  // (Suit 3 PC, Sherwani…) — picking a preset links masterId so Includes + rate auto-fill,
  // which a plain typed line can't do. Presets still never get auto-created from billed names.
  const ready=(DB.itemMaster||[]).filter(m=>m.kind==='ready'&&match(m.name)).slice(0,12);
  const presets=(DB.itemMaster||[]).filter(m=>m.kind!=='ready'&&match(m.name)).slice(0,12);
  const rolls=(DB.thaans||[]).filter(th=>{const fi=(DB.fabItems||[]).find(x=>x.id===th.fabId)||{};return match(th.serial)||match(fi.name)||match(fi.category);}).slice(0,15);
  const exact = qn && (ready.some(m=>key(m.name)===qn) || presets.some(m=>key(m.name)===qn) || rolls.some(th=>{const fi=(DB.fabItems||[]).find(x=>x.id===th.fabId)||{};return key(th.serial)===qn||key(fi.name)===qn;}));
  _posItems=[];
  const scoreOf=fields=>{let b=9;for(const f of fields){if(!f)continue;if(f===qn)b=Math.min(b,0);else if(f.indexOf(qn)===0)b=Math.min(b,1);else if(f.includes(qn))b=Math.min(b,2);}return b;};
  ready.forEach(m=>{
    const szs=(DB.stkCfg.sizes||[]).filter(sz=>readyQty(m,sz)>0);
    _posItems.push({title:esc(m.name),sub:`In stock: ${readyTotal(m)}${m.sell?` · ₹${esc(m.sell)}`:''}`,mid:m.id,sizes:szs,
      act:()=>{ if(szs.length)posAddReadySize(m.id,szs[0]); else posAddMaster(m.id); },score:qn?scoreOf([key(m.name)]):3});
  });
  presets.forEach(m=>{
    const parts=(m.incl||[]).join(' + ');
    _posItems.push({title:esc(m.name),sub:`${parts?esc(parts)+' · ':''}${m.rate?'₹'+esc(m.rate):t('pos_preset_norate')}`,
      act:()=>posAddMaster(m.id),score:qn?scoreOf([key(m.name)]):3});
  });
  rolls.forEach(th=>{const fi=(DB.fabItems||[]).find(x=>x.id===th.fabId)||{};
    const sl=th.sell||fi.sell||0, ct=th.rate||fi.rate||0;
    _posItems.push({title:`${esc(fi.name||'Fabric')} · #${esc(th.serial)}`,
      sub:`${thaanBal(th)} mtr left${sl?` · 🏷️ ₹${esc(sl)}/mtr`:''}${ct?` · ${t('stk_rate')} ₹${esc(ct)}`:''}`,
      act:()=>posAddThaan(th.id),score:qn?scoreOf([key(th.serial),key(fi.name)]):3});});
  if(qn)_posItems.sort((a,b)=>a.score-b.score);
  // Enter adds the top match; if nothing matched but text typed, Enter adds it as a one-off
  _posTopFn = (q&&_posItems.length) ? _posItems[0].act : ((q&&!exact) ? ()=>posAddTyped() : null);
  let h=`<div class="sug-head"><span>📦 ${t('pos_sec_stock')}</span>
      <a onclick="posNewFromSearch()">➕ ${t('pos_new_item')}</a></div>`;
  if(_posItems.length){
    h+=_posItems.map((it,i)=>{
      if(it.sizes){   // readymade → tap a SIZE (so the right size's stock is deducted)
        const szchips=it.sizes.length
          ? `<div class="hint" style="margin:6px 0 3px">${t('stk_pick_size')}:</div><div class="gtags">`+it.sizes.map(sz=>`<span class="gtag" style="cursor:pointer" onclick="event.stopPropagation();posAddReadySize('${it.mid}','${esc(sz).replace(/'/g,"\\'")}')">${esc(sz)} <b style="color:var(--saffron2)">(${readyQty((DB.itemMaster||[]).find(x=>x.id===it.mid)||{},sz)})</b></span>`).join('')+`</div>`
          : '';
        return `<div class="cust-result ${(i===0&&q)?'pos-top':''}" style="margin-bottom:6px;display:block;cursor:pointer" onclick="posPick(${i})">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
            <div><b>${it.title}</b>${it.sub?`<div class="hint">${it.sub}</div>`:''}</div>
            <span class="btn sm primary" style="flex:0 0 auto">+</span></div>${szchips}</div>`;
      }
      return `<div class="cust-result ${(i===0&&q)?'pos-top':''}" style="margin-bottom:6px" onclick="posPick(${i})"><div><b>${it.title}</b>${it.sub?`<div class="hint">${it.sub}</div>`:''}</div><span class="btn sm primary">+</span></div>`;
    }).join(''); }
  if(q && !exact){ h+=`<div class="cust-result" style="margin:10px 0 0;border:1px dashed var(--line2)" onclick="posAddTyped()"><div><b>➕ ${t('add')} “${esc(q)}”</b><div class="hint">${t('pos_add_typed_hint')}</div></div><span class="btn sm ghost">${t('add')}</span></div>`; }
  box.innerHTML=h||`<p class="hint" style="padding:6px 0">${q?t('pos_no_results'):(_posItems.length?'':t('pos_stock_empty'))}</p>`;
}

function captureInvoiceForm(){const f=invForm;
  if($('#inv_no'))f.no=$('#inv_no').value.trim();
  if($('#inv_date'))f.date=$('#inv_date').value;
  if($('#inv_inter'))f.interstate=$('#inv_inter').checked;
  if($('#inv_pm'))f.paymentMode=$('#inv_pm').value;
  if($('#inv_acc')&&$('#inv_acc').value!=='__new')f.acc=$('#inv_acc').value;
  if($('#inv_disctype'))f.discType=$('#inv_disctype').value;
  if($('#inv_discval'))f.discValue=+$('#inv_discval').value||0;
  if($('#inv_courier'))f.courier=+$('#inv_courier').value||0;
  if($('#inv_cname')&&!f.customerId)f.customerName=$('#inv_cname').value.trim();
  if($('#inv_cphone')&&!f.customerId)f.phone=$('#inv_cphone').value.trim();
  if($('#inv_notes'))f.notes=$('#inv_notes').value.trim();
  if($('#inv_recv'))f.receivedNow=$('#inv_recv').value===''?null:(+$('#inv_recv').value||0);
  if(f.split){
    if($('#inv_cash'))f.split.cash=$('#inv_cash').value===''?'':(+$('#inv_cash').value||0);
    if($('#inv_upi'))f.split.upi=$('#inv_upi').value===''?'':(+$('#inv_upi').value||0);
    f.receivedNow=(+f.split.cash||0)+(+f.split.upi||0);
  }
  if($('#inv_ddate'))f.deliveryDate=$('#inv_ddate').value;
  if($('#pos_ono'))f.orderNo=($('#pos_ono').value||'').trim();
  if($('#inv_sm'))f.salesmanId=$('#inv_sm').value;
  document.querySelectorAll('[data-iin]').forEach(inp=>{f.items[+inp.dataset.iin].label=inp.value.trim();});
  document.querySelectorAll('[data-ihsn]').forEach(inp=>{f.items[+inp.dataset.ihsn].hsn=inp.value.trim();});
  document.querySelectorAll('[data-iqty]').forEach(inp=>{f.items[+inp.dataset.iqty].qty=(+inp.value||1);});
  document.querySelectorAll('[data-irate]').forEach(inp=>{f.items[+inp.dataset.irate].rate=+inp.value||0;});
  // line amount = qty x rate ; keep .price (line total) for GST engine & printing
  (f.items||[]).forEach(it=>{ it.qty=+it.qty||1; it.rate=+it.rate||0; it.price=r2(it.qty*it.rate);
    it.incl=Array.isArray(it.incl)?it.incl:[]; it.includes=it.incl.join(', '); });
}
function saveInvoice(){
  captureInvoiceForm();const f=invForm;
  if(!f.no){toast(t('t_no_invno'),'bad');return;}
  f.items=(f.items||[]).filter(it=>it.label||+it.price);
  if(!f.items.length||f.items.every(it=>!(+it.price))){toast(t('t_no_invitem'),'bad');return;}
  if(f.split){ const sSum=r2((+f.split.cash||0)+(+f.split.upi||0));
    if(sSum>r2(invCompute(f).total)+0.5){toast(t('split_over'),'bad');return;} }

  // Invoice is billing only — it does NOT auto-create/sync an order.
  // (Wedding bills carry many items; the tailoring order is taken separately in Orders.)

  // Make-to-order: this bill belongs on a real ORDER, not a counter sale.
  // Create the order (or reuse the number), move everything onto it, drop the sale stub.
  if(f.kind==='sale' && f.saleType==='mto'){
    const ono=(f.orderNo||'').trim() || nextOrderNo();
    let o=(DB.orders||[]).find(x=>String(x.orderNo).toLowerCase()===ono.toLowerCase());
    let cust=null;
    if(f.customerId)cust=(DB.customers||[]).find(x=>x.id===f.customerId);
    if(!cust&&f.customerName){
      cust=(DB.customers||[]).find(x=>String(x.name||'').toLowerCase()===f.customerName.toLowerCase()&&(x.phone||'')===(f.phone||''));
      if(!cust){cust={id:uid(),name:f.customerName,phone:f.phone||'',m:{}};DB.customers.push(cust);}
    }
    if(!o){
      o={id:uid(),created:new Date().toISOString(),orderNo:ono,
        customerId:cust?cust.id:null,customerName:f.customerName||'',phone:f.phone||'',
        items:[],itemStatus:{},m:{},design:{},photos:[],voiceNotes:[],log:[],
        deliveryDate:f.deliveryDate||'',salesmanId:f.salesmanId||'',
        total:0,payments:[],notes:f.notes||'',fromBill:true};
      DB.orders.push(o);
    }else{
      if(cust){o.customerId=cust.id;o.customerName=f.customerName||o.customerName;o.phone=f.phone||o.phone;}
      if(f.deliveryDate)o.deliveryDate=f.deliveryDate;
    }
    // remove the temporary sale stub this form was sitting on
    DB.sales=(DB.sales||[]).filter(x=>x.id!==f.id);
    f.kind='order'; f.id=o.id; f.saleType=null;
    save();
  }

  const rec=invRecOf(f.kind,f.id); if(!rec)return;
  rec.invoice={no:f.no,date:f.date,interstate:f.interstate,paymentMode:f.paymentMode,discType:f.discType||'amount',discValue:f.discValue||0,courier:+f.courier||0,
    deliveryDate:f.deliveryDate||'',salesmanId:f.salesmanId||'',items:f.items};
  if(rec._fromEst){ const _e=(DB.estimates||[]).find(x=>x.id===rec._fromEst); if(_e)_e.convertedSaleId=rec.id; delete rec._fromEst; }
  // delivery date & salesman live on the record so they print on the invoice
  if(f.deliveryDate)rec.deliveryDate=f.deliveryDate;
  rec.salesmanId=f.salesmanId||'';

  // the bill is now the final word on the amount — write it back onto the record
  if(f.kind==='order'||f.kind==='alt'){
    rec.total=invCompute(rec.invoice).total;
    // all money lives on the bill now: the "Received" box is the advance
    migratePayments(rec);
    if((rec.payments||[]).length<=1 && f.receivedNow!=null){
      const recv=+f.receivedNow||0;
      rec.payments = recv>0 ? [{amt:recv,date:f.date||todayISO(),mode:f.paymentMode,acc:payAccFor(f.paymentMode,f.acc)}] : [];
    }
  }
  // an order created from the billing screen has no payment of its own — take it from the bill
  if(f.kind==='order' && rec.fromBill){
    const comp=invCompute(rec.invoice);
    rec.total=comp.total;
    if(f.customerName)rec.customerName=f.customerName;
    if(f.phone)rec.phone=f.phone;
    const recv=(f.receivedNow!=null)?(+f.receivedNow||0):0;   // blank box = advance not received yet
    if(!(rec.payments||[]).length){ rec.payments = recv>0?[{amt:recv,date:f.date,mode:f.paymentMode,acc:payAccFor(f.paymentMode,f.acc)}]:[]; }
  }
  if(f.kind==='sale'){
    const comp=invCompute(rec.invoice);
    rec.customerName=f.customerName||'';rec.phone=f.phone||'';rec.total=comp.total;rec.notes=f.notes||'';
    if(f.customerId)rec.customerId=f.customerId;
    else{ let c=(DB.customers||[]).find(x=>(x.name||'').toLowerCase()===(f.customerName||'').toLowerCase()&&(x.phone||'')===(f.phone||''));
      if(!c&&f.customerName){c={id:uid(),name:f.customerName,phone:f.phone||'',m:{}};DB.customers.push(c);}
      if(c)rec.customerId=c.id; }
    // money follows what the SCREEN showed: blank Received box = nothing received (full due),
    // never a silent auto-paid. Real payment history (e.g. split cash+UPI) is never overwritten.
    if(!((rec.payments||[]).length>1)){
      const recv=(f.receivedNow!=null)?(+f.receivedNow||0):0;
      rec.payments=recv>0?[{amt:recv,date:f.date,mode:f.paymentMode,acc:payAccFor(f.paymentMode,f.acc)}]:[];
    }
  }
  // Split payment: record cash and online separately so Cash & Bank routes each correctly
  if(f.split && ((+f.split.cash||0)>0 || (+f.split.upi||0)>0)){
    const d=f.date||todayISO(), pays=[];
    if((+f.split.cash||0)>0)pays.push({amt:r2(+f.split.cash),date:d,mode:'Cash',acc:(cashAcc()||{}).id});
    if((+f.split.upi||0)>0)pays.push({amt:r2(+f.split.upi),date:d,mode:'UPI',acc:payAccFor('UPI',f.acc)});
    rec.payments=pays;
    rec.invoice.paymentMode=pays.map(p=>p.mode+' '+money(p.amt)).join(' + ');
  }
  DB.itemMaster=DB.itemMaster||[];
  // NOTE: bill items do NOT auto-become tap-to-add shortcuts anymore.
  // Shortcuts are curated by hand (⚡ Edit / Manage / long-press) so the shortcut row
  // stays clean and separate from what gets billed. Adding to the bill never touches shortcuts.
  // readymade items leave stock; stitched (made-to-order) items never touch stock
  if(!f._stockDone){
    f.items.forEach(it=>{
      const m=DB.itemMaster.find(x=>x.id===it.masterId);
      if(!m||m.kind!=='ready')return;
      const sz=it.size||'';
      const q=+it.qty||1;
      if(sz){ if(q>readyQty(m,sz))toast(t('stk_oversell'),'bad'); readySet(m,sz,readyQty(m,sz)-q); }
      move({dir:MV_OUT,target:'ready',itemId:m.id,size:sz,qty:q,rate:+it.rate||0,
        reason:'sale',ref:'Invoice '+f.no,refId:f.id});
    });
    // fabric sold on the bill leaves stock too — meters out of the roll
    f.items.forEach(it=>{
      if(it.unit!=='Mtr')return;
      const q=+it.qty||0; if(q<=0)return;
      let th=it.thaanId?(DB.thaans||[]).find(x=>x.id===it.thaanId):null;
      if(!th && it.fabId){ th=(DB.thaans||[]).filter(x=>x.fabId===it.fabId && thaanBal(x)>0).sort((a,b)=>thaanBal(b)-thaanBal(a))[0]; }
      if(!th)return;
      if(q>thaanBal(th))toast(t('stk_oversell_f'),'bad');
      th.used=r2((+th.used||0)+q);
      move({dir:MV_OUT,target:'fab',thaanId:th.id,qty:q,rate:+it.rate||0,reason:'sale',ref:'Invoice '+f.no,refId:f.id});
    });
    f._stockDone=true;
    rec.invoice._stockDone=true;
  }
  save();closeSheet();toast(t('t_invoice_saved'),'ok');
  invQ=''; invSort='new';
  go('invoices');                       // the new bill is right there when you close the preview
  openInvoicePreview(f.kind,f.id);
}

function alreadyReturnedQty(saleId,idx){

  });

  if(_sret.refund && total>0){

/* credit held against a customer (un-refunded returns) reduces what they owe */
function customerCredit(customerId){
  if(!customerId)return 0;
  return r2((DB.salesReturns||[]).filter(r=>r.customerId===customerId)
    .reduce((s,r)=>s+(r.total-(r.refunded||0)),0));
}

/* A return puts stock back (sale) or takes it out (purchase). Deleting the parent
   bill ALSO reverses the bill's own stock — so if its returns stayed, the same
   pieces would be counted twice. Unwind the returns first: reverse their moves,
   drop their refund ledger rows, remove the records. */
function unwindReturnsFor(kind,parentId){
  const list = kind==='sale' ? (DB.salesReturns||[]) : (DB.purchaseReturns||[]);
  const mine = list.filter(r=> kind==='sale' ? r.saleId===parentId : r.purId===parentId);
  mine.forEach(r=>{
    revertStockByRef(r.id);                                    // undo the return's stock effect
    DB.ledger=(DB.ledger||[]).filter(l=>!(l.ref===r.no));      // drop its refund entry if any
  });
  if(kind==='sale') DB.salesReturns=(DB.salesReturns||[]).filter(r=>r.saleId!==parentId);
  else DB.purchaseReturns=(DB.purchaseReturns||[]).filter(r=>r.purId!==parentId);
  return mine.length;
}
function delSale(id){

  unwindReturnsFor('sale',id);
  revertStockByRef(id);                       // put sold pieces / meters back in stock
  DB.sales=(DB.sales||[]).filter(x=>x.id!==id);save();closeSheet();renderInvoices();toast(t('t_deleted'));});}

function printInvoice(kind,id){const rec=invRecOf(kind,id);if(!rec||!rec.invoice)return;
  const html=buildInvoiceHTML(rec,rec.invoice);
  const ifr=document.createElement('iframe');ifr.style.cssText='position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
  document.body.appendChild(ifr);const d=ifr.contentWindow.document;d.open();d.write(html);d.close();
  setTimeout(()=>{try{ifr.contentWindow.focus();ifr.contentWindow.print();}catch(e){}setTimeout(()=>ifr.remove(),2000);},400);
}
function invoiceGreetingText(rec,inv){
  const shop=(DB.shopInfo&&DB.shopInfo.name)||'PARAMPARA';
  const comp=invCompute(inv);const baaki=orderBaaki(rec);
  let g=`Namaste ${rec.customerName||''} ji 🙏\n\nThank you for shopping with ${shop}! Please find your invoice attached.\n\nInvoice No: ${inv.no}\nGrand Total: ${money(comp.total)}`;
  g+= baaki>0?`\nBalance Due: ${money(baaki)}`:`\nPayment Received in Full ✅`;
  g+=`\n\nWe truly appreciate your trust in us. Looking forward to serving you again! 😊`;
  return g;
}
function wrapCanvasText(ctx,text,maxWidth){
  const words=String(text).split(' ');let lines=[],cur='';
  words.forEach(w=>{const test=cur?cur+' '+w:w;if(ctx.measureText(test).width>maxWidth&&cur){lines.push(cur);cur=w;}else cur=test;});
  if(cur)lines.push(cur);return lines;
}
function buildInvoiceCanvas(rec,inv){
  const comp=invCompute(inv),shop=DB.shopInfo||{};
  const received=orderReceived(rec),baaki=orderBaaki(rec);
  const prevBal=customerOutstanding(rec.customerId,rec.orderNo?'order':(rec.altNo?'alt':'sale'),rec.id);
  const currBal=r2(prevBal+baaki);
  const W=750,pad=40,contentW=W-pad*2;
  const meas=document.createElement('canvas').getContext('2d');
  const L=[];
  if(shop.blessing)L.push({t:shop.blessing,s:19,b:1,c:'#a8590a'});
  L.push({t:shop.name||'PARAMPARA',s:34,b:1,c:'#c97e10'});
  if(shop.tagline)L.push({t:shop.tagline,s:16,c:'#2e7d32',b:1});
  if(shop.address)L.push({t:shop.address,s:16,c:'#444'});
  L.push({t:'GSTIN: '+(shop.gstin||''),s:15,c:'#444'});
  L.push({rule:1,gap:16});
  L.push({t:'TAX INVOICE',s:14,b:1,c:'#888'});
  L.push({t:'Invoice No: '+inv.no+'   ·   Date: '+fmtDate(inv.date),s:19,b:1,c:'#111'});
  if(rec.orderNo)L.push({t:'Order No: '+rec.orderNo,s:16,c:'#444'});
  else if(rec.altNo)L.push({t:'Alteration No: '+rec.altNo,s:16,c:'#444'});
  if(rec.deliveryDate)L.push({t:'Delivery Date: '+fmtDate(rec.deliveryDate),s:18,b:1,c:'#7a4f01',hl:'#fff3cd'});
  L.push({gap:10});
  L.push({t:(rec.customerName||'').toUpperCase(),s:22,b:1,c:'#111'});
  L.push({t:'Contact: '+(rec.phone||''),s:16,c:'#444'});
  const sm=rec.salesmanId?(DB.salesmen||[]).find(x=>x.id===rec.salesmanId):null;
  if(sm)L.push({t:'Salesman: '+sm.name+(sm.phone?' ('+sm.phone+')':''),s:15,c:'#555'});
  L.push({rule:1,gap:14});
  (inv.items||[]).forEach(it=>{const p=+it.price||0,qty=+it.qty||1;
    L.push({t:it.label||'Item',s:19,b:1,c:'#111',right:money(p),rightS:19,rightB:1});
    L.push({t:qty>1?`Qty ${qty}`:'',s:14,c:'#777'});
    if(it.includes)L.push({t:'Includes: '+it.includes,s:14,c:'#777',italic:1});
    L.push({gap:6});});
  L.push({rule:1,gap:12});
  L.push({t:'Sub Total',s:16,c:'#444',right:money(comp.gross),rightS:16});
  if(comp.discount>0)L.push({t:'Discount',s:16,c:'#444',right:'− '+money(comp.discount),rightS:16});
  L.push({t:'Grand Total',s:24,b:1,c:'#111',right:money(comp.total),rightS:24,rightB:1});
  L.push({gap:6});
  L.push({t:'Received',s:16,c:'#444',right:money(received),rightS:16});
  L.push({t:'Balance Due',s:19,b:1,c:baaki>0?'#c0392b':'#2e7d32',right:money(baaki),rightS:19,rightB:1});
  if(prevBal>0){L.push({gap:6});
    L.push({t:'Previous Balance',s:15,c:'#666',right:money(prevBal),rightS:15});
    L.push({t:'Current Balance',s:16,b:1,c:'#444',right:money(currBal),rightS:16,rightB:1});}
  L.push({t:'Payment Mode: '+(inv.paymentMode||'Cash'),s:15,c:'#555'});
  L.push({rule:1,gap:14});
  if(shop.terms){
    L.push({t:'Terms & Conditions',s:15,b:1,c:'#555'});
    meas.font='13px Arial,sans-serif';
    String(shop.terms).split('\n').forEach(line=>{if(!line.trim())return;
      wrapCanvasText(meas,line,contentW).forEach(w=>L.push({t:w,s:13,c:'#777'}));});
  }
  let h=pad*2;
  L.forEach(l=>{h+=l.gap?l.gap:0; if(l.t!=='')h+= (l.s?l.s*1.7:24); if(l.rule)h+=6;});
  const qAmt = (DB.shopInfo&&DB.shopInfo.qrOpen) ? 0 : (baaki>0?baaki:comp.total);
  const qUri = (()=>{try{return upiUri(qAmt,'Invoice '+inv.no);}catch(e){return null;}})();
  const QBLOCK = qUri ? 300 : 0;          // room for the UPI QR at the bottom
  h += QBLOCK;
  const c=document.createElement('canvas');c.width=W;c.height=h;const x=c.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,h);let y=pad+24;
  L.forEach(l=>{
    if(l.gap)y+=l.gap;
    if(l.rule){x.strokeStyle='#ddd';x.beginPath();x.moveTo(pad,y);x.lineTo(W-pad,y);x.stroke();y+=6;return;}
    if(l.t===''){return;}
    if(l.hl){x.fillStyle=l.hl;x.font=(l.b?'bold ':'')+(l.s||16)+'px Arial,sans-serif';const wtxt=x.measureText(l.t).width;x.fillRect(pad-4,y-l.s,wtxt+8,l.s+10);}
    x.fillStyle=l.c||'#111';x.font=(l.italic?'italic ':'')+(l.b?'bold ':'')+(l.s||16)+'px Arial,sans-serif';x.fillText(l.t,pad,y);
    if(l.right){x.font=(l.rightB?'bold ':'')+(l.rightS||16)+'px Arial,sans-serif';const rw=x.measureText(l.right).width;x.fillText(l.right,W-pad-rw,y);}
    y+=(l.s?l.s*1.7:24);
  });
  // --- UPI QR at the bottom (space reserved above) ---
  try{
    if(qUri){
      const q=qrCanvas(qUri,300);
      const qs=200, qx=(W-qs)/2, qy=h-QBLOCK+30;
      x.fillStyle='#fff'; x.fillRect(qx-10,qy-10,qs+20,qs+20);
      x.strokeStyle='#ddd'; x.lineWidth=1; x.strokeRect(qx-10,qy-10,qs+20,qs+20);
      x.drawImage(q,qx,qy,qs,qs);
      x.textAlign='center';
      x.fillStyle='#111'; x.font='bold 18px sans-serif';
      x.fillText('Scan & Pay'+(qAmt>0?'  '+money(qAmt):''), W/2, qy+qs+32);
      x.fillStyle='#666'; x.font='14px sans-serif';
      x.fillText((DB.shopInfo&&DB.shopInfo.upi)||'', W/2, qy+qs+54);
      x.textAlign='left';
    }
  }catch(e){}
  return c;
}
async function waInvoice(kind,id){const rec=invRecOf(kind,id);if(!rec||!rec.invoice)return;
  const text=invoiceGreetingText(rec,rec.invoice);
  try{
    const c=buildInvoiceCanvas(rec,rec.invoice);
    const blob=await new Promise(r=>c.toBlob(r,'image/png'));
    if(blob){const file=new File([blob],'Invoice-'+String(rec.invoice.no).replace(/\//g,'-')+'.png',{type:'image/png'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'Invoice '+rec.invoice.no,text});return;}}
  }catch(e){ if(e&&e.name==='AbortError')return; }
  waSend(rec.phone,text+'\n\n'+buildInvoiceText(rec,rec.invoice));
}

function shopInfoSave(){DB.shopInfo={name:($('#si_name').value||'').trim(),blessing:($('#si_bless').value||'').trim(),tagline:($('#si_tag').value||'').trim(),gstin:($('#si_gstin').value||'').trim(),
  address:($('#si_addr').value||'').trim(),phone:($('#si_phone').value||'').trim(),email:($('#si_email').value||'').trim(),
  proprietor:($('#si_prop').value||'').trim(),upi:($('#si_upi').value||'').trim(),qrOpen:!!($('#si_qropen')&&$('#si_qropen').value),showGst:!!($('#si_showgst')&&$('#si_showgst').checked),terms:($('#si_terms').value||'').trim()};
  // bank details entered here live on the account itself, so there is only one copy
  const bn=($('#si_bankname')&&$('#si_bankname').value.trim())||'';
  const an=($('#si_accno')&&$('#si_accno').value.trim())||'';

function allInvoices(){
  const list=[];
  (DB.orders||[]).forEach(o=>{if(o.invoice)list.push({kind:'order',rec:o,inv:o.invoice});});
  (DB.alterations||[]).forEach(a=>{if(a.invoice)list.push({kind:'alt',rec:a,inv:a.invoice});});
  (DB.sales||[]).forEach(s=>{if(s.invoice)list.push({kind:'sale',rec:s,inv:s.invoice});});
  list.sort((x,y)=>String(y.inv.date||'').localeCompare(String(x.inv.date||'')));
  return list;
}
let invQ='', invSort='new';
function setInvQ(v){invQ=v;renderInvoices(true);}
function setInvSort(v){invSort=v;renderInvoices();}
const SORTS=[['new','↓ '],['old','↑ '],['hi','₹↓ '],['lo','₹↑ ']];
function sortChips(cur,fn){
  return `<div class="gtags" style="margin-bottom:10px">
    <span class="gtag ${cur==='new'?'on-tag':''}" style="cursor:pointer" onclick="${fn}('new')">🕐 ${t('srt_new')}</span>
    <span class="gtag ${cur==='old'?'on-tag':''}" style="cursor:pointer" onclick="${fn}('old')">🕐 ${t('srt_old')}</span>
    <span class="gtag ${cur==='hi'?'on-tag':''}" style="cursor:pointer" onclick="${fn}('hi')">₹ ${t('srt_hi')}</span>
    <span class="gtag ${cur==='lo'?'on-tag':''}" style="cursor:pointer" onclick="${fn}('lo')">₹ ${t('srt_lo')}</span>
  </div>`;
}
function applySort(arr,mode,dateOf,amtOf){
  const a=arr.slice();
  if(mode==='old')a.sort((x,y)=>String(dateOf(x)||'').localeCompare(String(dateOf(y)||'')));
  else if(mode==='hi')a.sort((x,y)=>amtOf(y)-amtOf(x));
  else if(mode==='lo')a.sort((x,y)=>amtOf(x)-amtOf(y));
  else a.sort((x,y)=>String(dateOf(y)||'').localeCompare(String(dateOf(x)||'')));
  return a;
}
function renderInvoices(keepFocus){
  const el=$('#invList');

    <button class="btn primary" style="flex:2" onclick="openSaleForm()">+ ${t('new_sale')}</button>

  if(!all.length){ el.innerHTML=head+`<div class="empty"><div class="big">🧾</div><p><b>${t('no_invoices')}</b></p><p style="font-size:13px">${t('no_invoices_sub2')}</p></div>`; return; }

  const q=(invQ||'').trim().toLowerCase();
  const list=q?all.filter(x=>{
    const no=String(x.inv.no||'').toLowerCase();
    const nm=String(x.rec.customerName||'').toLowerCase();
    const ph=String(x.rec.phone||'');
    const ref=String(x.rec.orderNo||x.rec.altNo||'').toLowerCase();
    return no.includes(q)||nm.includes(q)||ph.includes(q)||ref.includes(q);
  }):all;

  const searchBox=`<div class="field" style="margin-bottom:10px">
    <input id="invSearch" value="${esc(invQ)}" placeholder="🔍 ${t('inv_search_ph')}" oninput="setInvQ(this.value)"></div>`

  const title=`<div class="kv" style="margin:0 0 10px">
    <h3 style="margin:0;font-size:16px">📋 ${t('inv_all')}</h3>
    <span class="hint">${t('inv_count',{n:list.length})}</span></div>`;

  if(!list.length){ el.innerHTML=head+searchBox+title+`<div class="empty"><p>${t('inv_none_match')}</p></div>`; if(keepFocus)focusInvSearch(); return; }

  const amtOf=x=>invCompute(x.inv).total;
  if(invSort==='hi'||invSort==='lo'){
    const flat=applySort(list,invSort,x=>x.inv.date,amtOf);
    el.innerHTML=head+searchBox+title+flat.map(x=>invCardHTML(x)).join('');
    if(keepFocus)focusInvSearch();

  }
  const groups={};
  list.forEach(x=>{const mk=String(x.inv.date||'').slice(0,7)||'—';(groups[mk]=groups[mk]||[]).push(x);});
  const monthName=mk=>{if(mk==='—')return '—';const[y,m]=mk.split('-');return new Date(+y,+m-1,1).toLocaleDateString('en-IN',{month:'long',year:'numeric'});};

  el.innerHTML=head+searchBox+title+Object.keys(groups).sort().reverse().map(mk=>{
    const rows=applySort(groups[mk],invSort,x=>x.inv.date,x=>invCompute(x.inv).total);
    let sales=0,tax=0;
    rows.forEach(x=>{const c=invCompute(x.inv);sales+=c.total;tax+=c.cgst+c.sgst+c.igst;});
    return `<div class="section-h" style="display:flex;justify-content:space-between;align-items:baseline">${monthName(mk)}
      <span style="font-size:12px;font-weight:600;color:var(--txt2)">${t('inv_sales')}: <b style="color:var(--txt)">${money(r2(sales))}</b> · ${t('inv_tax')}: <b style="color:var(--txt)">${money(r2(tax))}</b></span></div>`+
      rows.map(x=>invCardHTML(x)).join('');
  }).join('');
  if(keepFocus)focusInvSearch();
}

/* Purchase gets its own draft, separate from the order draft, so a supplier bill
   half-typed survives closing / back / a phone call and reopens where you left off. */
const PUR_DRAFT_KEY='pb_ob_purdraft';
function purHasContent(f){ return !!(f && (f.supplier || f.phone || (f.items||[]).length || (f.notes||'').trim() || (f.photos||[]).length)); }
function getPurDraft(){ try{ const d=JSON.parse(localStorage.getItem(PUR_DRAFT_KEY)||'null'); return (d&&purHasContent(d))?d:null; }catch(e){ return null; } }
function savePurDraft(){
  if(!purchForm||purchForm.editId)return;      // never draft an edit of a saved bill
  capturePurchForm();
  if(!purHasContent(purchForm)){ localStorage.removeItem(PUR_DRAFT_KEY); return; }
  try{ localStorage.setItem(PUR_DRAFT_KEY, JSON.stringify(purchForm)); }catch(e){}
  const h=document.getElementById('puDraftHint'); if(h){ h.textContent='✅ '+t('draft_saved'); h.style.opacity='1'; }
}
function clearPurDraft(){ try{ localStorage.removeItem(PUR_DRAFT_KEY); }catch(e){} }
function capturePurchForm(){const f=purchForm;if(!f)return;
  if($('#pu_acc')&&$('#pu_acc').value!=='__new')f.acc=$('#pu_acc').value;
  if($('#pu_ref'))f.payRef=$('#pu_ref').value;
  if($('#pu_supplier'))f.supplier=$('#pu_supplier').value.trim();
  if($('#pu_phone'))f.phone=$('#pu_phone').value.trim();
  if($('#pu_billno'))f.billNo=$('#pu_billno').value.trim();
  if($('#pu_date'))f.date=$('#pu_date').value;
  if($('#pu_paid'))f.paidNow=$('#pu_paid').value===''?null:(+$('#pu_paid').value||0);
  if($('#pu_pm'))f.paymentMode=$('#pu_pm').value;
  if($('#pu_disctype'))f.discType=$('#pu_disctype').value;
  if($('#pu_discval'))f.discValue=+$('#pu_discval').value||0;
  if($('#pu_courier'))f.courier=+$('#pu_courier').value||0;
  if($('#pu_notes'))f.notes=$('#pu_notes').value.trim();
  // items are committed by the entry line (purDraftAdd), not read back from row inputs
}
function purchCompute(f){
  const gross=r2(f.items.reduce((s,it)=>s+(+it.amount||0),0));
  let discAmt=f.discType==='percent'?r2(gross*(+f.discValue||0)/100):r2(+f.discValue||0);
  discAmt=Math.max(0,Math.min(discAmt,gross));
  const courier=+f.courier||0;
  return {gross,discount:discAmt,courier,total:r2(gross-discAmt+courier)};
}

/* ============ PURCHASE: one-screen entry ============
   Vyapar makes you go Purchase → Add Items → Add New Item (three screens) and asks
   twelve fields for a new item. A boutique needs four. So: one always-open entry
   line right on the purchase screen. Type → Add → it collapses → type the next.
   A name that isn't saved yet is simply a new item; no separate master form. */
function supBalance(name){
  const n=String(name||'').trim().toLowerCase(); if(!n)return 0;
  return (DB.purchases||[]).reduce((sum,p)=>{
    if(String(p.supplier||'').trim().toLowerCase()!==n)return sum;
    if(purchForm&&purchForm.editId&&p.id===purchForm.editId)return sum;   // this bill isn't saved yet
    return sum+Math.max(0,(+p.total||0)-orderReceived(p));},0)
    - supplierCredit(name);   // purchase-return debit reduces what we owe the supplier
}
function supBalHTML(name){
  const b=supBalance(name);
  if(!b)return '';
  // supBalance>0 means we owe the supplier → you'll give → red ↑
  return `<span class="hint">${t('pur_party_bal')}:</span> ${balArrow(-b)}`;
}

  if(q)list=list.filter(x=>x.name.toLowerCase().includes(q)||String(x.phone||'').includes(q));
  list=list.slice(0,6);
  if(q&&list.length===1&&list[0].name.toLowerCase()===q){box.innerHTML='';return;}
  box.innerHTML=sugHead('saved_suppliers','puNewSupplier()')
    +(list.length?list.map(x=>{const b=supBalance(x.name);
    return `<div class="cust-result" style="margin-top:7px" onclick="puPickSup('${esc(x.name).replace(/'/g,"\\'")}')">
      <div><b>${esc(x.name)}</b><div class="hint">${esc(x.phone||'')}${b?` · ${balArrow(-b)}`:''}</div></div>
      <span class="btn sm primary">${t('select')}</span></div>`;}).join('')
      :`<p class="hint" style="margin:6px 0 0">${q?t('sup_none_q'):t('sup_none')}</p>`);
}

/* One line of truth under every suggestion: what it cost last, what is left. */
function sugFacts(o){
  const v=o.val||{}, bits=[];
  if(v.thaanId){ const th=(DB.thaans||[]).find(x=>x.id===v.thaanId);
    if(th){ bits.push(thaanBal(th)+' m '+t('stk_left')); if(th.rate)bits.push('₹'+th.rate+'/m'); } }
  else if(v.masterId){ const m=(DB.itemMaster||[]).find(x=>x.id===v.masterId);
    if(m){ const q=readyTotal(m); bits.push(q>0?(q+' '+t('stk_in')):t('stk_none')); if(m.cost)bits.push('₹'+m.cost); } }
  else if(v.fabId){ const rolls=(DB.thaans||[]).filter(x=>x.fabId===v.fabId);
    const bal=rolls.reduce((s,x)=>s+thaanBal(x),0);
    bits.push(bal>0?(r2(bal)+' m '+t('stk_in')):t('stk_none'));
    const last=rolls.filter(x=>x.rate).pop(); if(last)bits.push('₹'+last.rate+'/m'); }
  if(v.rate&&!bits.length)bits.push('₹'+v.rate);
  return bits.join(' · ')||(o.sub||'');
}

let _purSug={};
function purSugList(q){
  const norm=v=>String(v||'').toLowerCase().replace(/[^a-z0-9]/g,'');
  const qn=norm(q), hit=v=>!qn||norm(v).includes(qn);
  const out=[], seen=new Set();
  const push=o=>{const k=o.title.toLowerCase(); if(seen.has(k))return; seen.add(k); out.push(o);};
  // fabric ROLLS first — this is what a serial number search is for
  (DB.thaans||[]).forEach(th=>{
    const fi=(DB.fabItems||[]).find(x=>x.id===th.fabId)||{};
    if(!(hit(th.serial)||hit(fi.name)||hit(fi.category)))return;
    const rt=th.rate||fi.rate||'';
    push({title:(fi.name||'Fabric')+' · #'+th.serial,
      sub:thaanBal(th)+' mtr '+t('pur_sug_left')+(rt?' · ₹'+rt:''),
      val:{label:(fi.name||'Fabric')+' ('+th.serial+')',hsn:fi.hsn||'',unit:'Mtr',rate:rt}});
  });
  // fabric designs (no roll picked)
  (DB.fabItems||[]).forEach(fi=>{ if(!(hit(fi.name)||hit(fi.category)))return;
    push({title:fi.name||'Fabric',sub:(fi.category?fi.category+' · ':'')+t('pur_sug_fab'),
      val:{label:fi.name||'',hsn:fi.hsn||'',unit:'Mtr',rate:fi.rate||''}}); });
  // readymade masters
  (DB.itemMaster||[]).filter(m=>m.kind==='ready').forEach(m=>{ if(!hit(m.name))return;
    const bits=[];
    if(m.cost)bits.push(t('pur_sug_purch')+': ₹'+m.cost);
    bits.push(t('pur_sug_instock')+': '+readyTotal(m));
    push({title:m.name,sub:bits.join(' · '),
      val:{label:m.name,hsn:m.hsn||'',unit:'Pcs',rate:m.cost||''}}); });
  // anything bought before, so repeat purchases need no retyping
  (DB.purchases||[]).forEach(pu=>(pu.items||[]).forEach(it=>{ if(!it.label||!hit(it.label))return;
    push({title:it.label,sub:t('pur_sug_past')+(it.rate?' · ₹'+it.rate:''),
      val:{label:it.label,hsn:it.hsn||'',unit:it.unit||'Mtr',rate:it.rate||''}}); }));
  return out.slice(0,12);
}

/* ===== purchase → stock, automatic =====
   The SERIAL is the identity (the app's own barcode); the party's design no is just a label,
   because not every party prints one. Merge rule Setu set out: same design + same colour/size
   + same rate → the SAME serial, quantity just grows. Any one of them different → new serial.
   Mtr = fabric roll, Pcs = readymade piece. */
function purStockKey(it){
  const n=v=>String(v||'').trim().toLowerCase().replace(/\s+/g,' ');
  return [n(it.label),n(it.design),n(it.colour),r2(it.rate)].join('|');
}
/* Opening stock entered before this existed has no _key. Match it the same way and
   stamp the key on, so old stock merges instead of spawning a duplicate serial. */
function purMatchThaan(it,key){
  let th=(DB.thaans||[]).find(x=>x._key===key); if(th)return th;
  const n=v=>String(v||'').trim().toLowerCase().replace(/\s+/g,' ');
  th=(DB.thaans||[]).find(x=>{
    if(x._key)return false;
    const nm=n((FI(x.fabId)||{}).name)||n(x.name);
    const want=n(it.label);
    const bySerial=n(x.serial)&&n(x.serial)===want;     // opening stock often named by serial
    if(!(bySerial||(nm&&nm===want)||(n(x.design)&&n(x.design)===n(it.design))))return false;
    return n(x.colour)===n(it.colour) && r2(x.rate)===r2(it.rate);
  });
  if(th)th._key=key;
  return th;
}
function purMatchReady(it,key){
  let m=(DB.itemMaster||[]).find(x=>x.kind==='ready'&&x._key===key); if(m)return m;
  const n=v=>String(v||'').trim().toLowerCase().replace(/\s+/g,' ');
  m=(DB.itemMaster||[]).find(x=>x.kind==='ready'&&!x._key&&n(x.name)===n(it.label)&&r2(x.cost)===r2(it.rate));
  if(m)m._key=key;
  return m;
}
function purApplyStock(pur){
  if(pur._stockDone)return {made:0,merged:0};
  let made=0,merged=0;
  (pur.items||[]).forEach(it=>{
    const qty=+it.qty||0, rate=+it.rate||0;
    if(!it.label||qty<=0)return;
    const key=purStockKey(it);
    if((it.unit||'Mtr')==='Pcs'){
      // ---- readymade ----
      let m=purMatchReady(it,key);
      const size=(it.colour||'').trim()||'-';
      if(m){ readySet(m,size,(+(m.stk||{})[size]||0)+qty); merged++; }
      else{
        m={id:uid(),kind:'ready',name:it.label,_key:key,serial:nextThaanSerial(),design:it.design||'',
           hsn:it.hsn||'',cost:rate,sell:'',rate:'',stk:{}};
        readySet(m,size,qty); DB.itemMaster.push(m); bumpSerial(); made++;
        it.serial=m.serial;
      }
      it.masterId=m.id; if(!it.serial)it.serial=m.serial;
      move({date:pur.date,dir:'in',target:'ready',itemId:m.id,size,qty,rate,
        reason:'purchase',ref:pur.billNo||'',refId:pur.id});
    }else{
      // ---- fabric ----
      let th=purMatchThaan(it,key);
      if(th){ th.mtr=r2((+th.mtr||0)+qty); merged++; }
      else{
        let f=(DB.fabItems||[]).find(x=>String(x.name||'').trim().toLowerCase()===String(it.label).trim().toLowerCase());
        if(!f){ f={id:uid(),name:it.label,category:'',party:pur.supplier||'',rate}; DB.fabItems.push(f); }
        th={id:uid(),created:new Date().toISOString(),serial:nextThaanSerial(),fabId:f.id,_key:key,
            design:it.design||'',colour:it.colour||'',mtr:qty,used:0,rate,rack:'',party:pur.supplier||'',
            notes:'',photos:[]};
        DB.thaans.push(th); bumpSerial(); made++;
      }
      it.thaanId=th.id; it.fabId=th.fabId; it.serial=th.serial;
      move({date:pur.date,dir:'in',target:'fabric',thaanId:th.id,qty,rate,
        reason:'purchase',ref:pur.billNo||'',refId:pur.id});
    }
  });
  pur._stockDone=true;
  return {made,merged};
}

   qty per line ("received"); "Convert to purchase" makes a real purchase (which
   adds stock + payable through the normal purchase flow). Any short/over receipt

function savePurchaseReturn(){
  if($('#pr_acc'))_pret.acc=$('#pr_acc').value==='__new'?(defaultAcc()||{}).id:$('#pr_acc').value;
  const lines=_pret.lines.filter(l=>(+l.ret||0)>0);
  if(!lines.length){toast(t('sr_pick_qty'),'bad');return;}
  const p=(DB.purchases||[]).find(x=>x.id===_pret.purId); if(!p)return;
  const total=prTotal();
  const no=nextDocNo('PR');
  const rec={id:uid(),no,created:new Date().toISOString(),date:_pret.date,
    purId:_pret.purId, supplier:p.supplier||'', phone:p.phone||'',
    lines:lines.map(l=>({idx:l.idx,label:l.label,qty:+l.ret,rate:l.rate,amount:r2(l.rate*(+l.ret))})),
    total, refunded:_pret.refund?total:0, acc:_pret.refund?_pret.acc:''};
  // stock goes DOWN — the goods left the shop back to the supplier
  lines.forEach(l=>{
    const q=+l.ret||0; if(q<=0)return;
    if(l.thaanId){ const th=(DB.thaans||[]).find(x=>x.id===l.thaanId);
      if(th){ th.mtr=r2(Math.max(0,(+th.mtr||0)-q));

      const size=(l.colour||'').trim()||'-';

        move({dir:MV_OUT,target:'ready',itemId:m.id,size,qty:q,rate:l.rate,reason:'purchase_return',ref:no,refId:rec.id}); } }
  });
  if(_pret.refund && total>0){
    DB.ledger=DB.ledger||[];
    DB.ledger.push({id:uid(),dir:'in',date:_pret.date,amt:total,acc:_pret.acc,
      party:p.supplier||'',partyId:null,ref:no,refKind:'purchase_return',cat:'',note:t('pr_refund_note'),photos:[]});

}

/* ====================== REPORTS ====================== */
let rpPeriod='month', rpFrom='', rpTo='';
function rpRange(){
  const today=new Date();const iso=d=>d.toISOString().slice(0,10);
  if(rpPeriod==='week'){const d=new Date(today);const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return {from:iso(d),to:iso(today)};}
  if(rpPeriod==='month'){return {from:iso(new Date(today.getFullYear(),today.getMonth(),1)),to:iso(today)};}
  return {from:rpFrom||iso(new Date(today.getFullYear(),today.getMonth(),1)),to:rpTo||iso(today)};
}
function setRpPeriod(p){rpPeriod=p;if(p==='custom'){if($('#rp_from'))rpFrom=$('#rp_from').value;if($('#rp_to'))rpTo=$('#rp_to').value;}renderReports();}

  const invRows=invs.map(x=>{const c=invCompute(x.inv);
    return `<div class="card ocard" onclick="openInvoicePreview('${x.kind}','${x.rec.id}')" style="padding:10px 12px">
      <div class="top"><div><div class="ono" style="font-size:14px">🧾 ${esc(x.inv.no)}</div>
        <div class="meta">${esc(x.rec.customerName||'—')} · ${fmtDate(x.inv.date)}</div></div>
        <div style="text-align:right;font-weight:800">${money(c.total)}</div></div></div>`;}).join('');

  /* debtors */
  const map={};
  const addDeb=(rec,kind)=>{const bk=orderBaaki(rec);if(bk<=0)return;
    const key=rec.customerId||((rec.customerName||'')+'|'+(rec.phone||''));if(!key||key==='|')return;

    map[key].total+=bk;map[key].count++;};
  (DB.orders||[]).forEach(o=>addDeb(o,'order'));
  (DB.alterations||[]).forEach(a=>addDeb(a,'alt'));
  (DB.sales||[]).forEach(s=>addDeb(s,'sale'));
  const debtors=Object.values(map).sort((a,b)=>b.total-a.total);
  const debTotal=debtors.reduce((s,d)=>s+d.total,0);
  const debRows=debtors.map(d=>`<div class="card" style="padding:10px 12px;display:flex;justify-content:space-between;align-items:center">

    <div style="display:flex;align-items:center;gap:10px"><b style="color:var(--saffron2);font-size:16px">${money(r2(d.total))}</b>
    ${d.phone?`<button class="btn sm ghost" onclick="event.stopPropagation();waSend('${esc(d.phone)}','Namaste ${esc(d.name)} ji 🙏\\n\\nAapka ${money(r2(d.total))} balance pending hai PARAMPARA me. Kripya jald se jald clear karein. Dhanyawad!')">💬</button>`:''}</div></div>`).join('');

  /* purchases in period */
  const purch=(DB.purchases||[]).filter(p=>{const d=String(p.date||'');return d>=from&&d<=to;}).sort((a,b)=>String(b.date).localeCompare(String(a.date)));
  const purchTotal=purch.reduce((s,p)=>s+(+p.total||0),0);
  const purchRows=purch.map(p=>`<div class="card ocard" onclick="purchMenu('${p.id}')" style="padding:10px 12px">
    <div class="top"><div><div class="ono" style="font-size:14px">📦 ${esc(p.supplier)}</div>
      <div class="meta">${esc((p.desc||'').slice(0,40))}${(p.desc||'').length>40?'…':''} · ${fmtDate(p.date)}</div></div>
      <div style="text-align:right"><div style="font-weight:800">${money(p.total)}</div>
      ${orderBaaki(p)>0?`<div style="font-size:11px;color:var(--saffron2)">${t('baaki')}: ${money(orderBaaki(p))}</div>`:''}</div></div></div>`).join('');

  /* creditors: suppliers we owe */
  const cmap={};

let recorder=null,recChunks=[],recStream=null,recTimer=null,recT0=0;
const voiceCtx={};
function voiceSection(prefix){

function bindVoice(prefix,getList,persist){
  voiceCtx[prefix]={getList,persist};

  btn.onclick=()=>recToggle(btn,lbl,vid=>{getList().push({id:uid(),ts:new Date().toISOString(),voiceId:vid});persist&&persist();renderVoiceList(prefix);});

async function renderVoiceList(prefix){
  const ctx=voiceCtx[prefix],el=$('#'+prefix+'List'); if(!el||!ctx)return;
  const list=ctx.getList()||[];
  el.innerHTML=list.length?list.slice().reverse().map(v=>`<div class="tl-entry"><div class="tl-dot"></div>

    <button class="btn sm danger" style="padding:4px 8px" onclick="delVoice('${prefix}','${v.id}')">✕</button></div>`).join(''):'';
  for(const a of el.querySelectorAll('audio[data-aud]')){const u=await mURL(a.dataset.aud);if(u)a.src=u;}

async function shareVoice(voiceId){
  const b=await mGet(voiceId); if(!b){toast(t('t_wrong'),'bad');return;}
  const ty=b.type||'audio/mp4'; const ext=ty.indexOf('mp4')>=0?'m4a':(ty.indexOf('ogg')>=0?'ogg':(ty.indexOf('webm')>=0?'webm':'m4a'));
  const file=new File([b],'voice-note.'+ext,{type:ty});
  try{ if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:'PARAMPARA voice note'}); return; } }
  catch(e){ if(e&&e.name==='AbortError')return; }
  try{ const url=URL.createObjectURL(b); const a=document.createElement('a'); a.href=url; a.download='voice-note.'+ext; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),4000); toast(t('voice_dl'),'ok'); }
  catch(e){ toast(t('voice_share_na'),'bad'); }
}
function delVoice(prefix,vid){const ctx=voiceCtx[prefix];if(!ctx)return;const list=ctx.getList();const v=list.find(x=>x.id===vid);  if(v&&v.voiceId)mDel(v.voiceId);const i=list.indexOf(v);if(i>=0)list.splice(i,1);ctx.persist&&ctx.persist();renderVoiceList(prefix);toast(t('t_voice_del'));}
async function recToggle(btn,lbl,onDone){
  if(recorder&&recorder.state==='recording'){recorder.stop();return;}
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){micHelp();return;}
  try{recStream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(err){ if(err&&(err.name==='NotAllowedError'||err.name==='SecurityError'))micHelp(); else toast('Mic: '+(err.name||'error'),'bad'); return; }
  let mime='';['audio/webm','audio/mp4','audio/ogg'].forEach(m=>{if(!mime&&window.MediaRecorder&&MediaRecorder.isTypeSupported(m))mime=m;});
  try{recorder=mime?new MediaRecorder(recStream,{mimeType:mime}):new MediaRecorder(recStream);}catch(e){recorder=new MediaRecorder(recStream);}
  recChunks=[];
  recorder.ondataavailable=e=>{if(e.data&&e.data.size)recChunks.push(e.data);};
  recorder.onstop=async()=>{
    const blob=new Blob(recChunks,{type:recorder.mimeType||'audio/webm'});
    if(recStream){recStream.getTracks().forEach(tr=>tr.stop());recStream=null;}
    clearInterval(recTimer); if(btn){btn.classList.remove('recording');btn.textContent='🎙️';} if(lbl)lbl.textContent=t('vn_hint');
    if(blob.size>0){const vid='voice_'+uid();try{await mPut(vid,blob);onDone&&onDone(vid);toast(t('t_voice'),'ok');}catch(e){toast('Save fail','bad');}}
    recorder=null;
  };
  recorder.start();recT0=Date.now(); if(btn){btn.classList.add('recording');btn.textContent='⏹️';}
  recTimer=setInterval(()=>{const s=Math.floor((Date.now()-recT0)/1000); if(lbl)lbl.textContent=`${t('recording')}  ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;},200);
}

function waLink(phone,text){const p=(phone||'').replace(/\D/g,'');const full=p.length===10?'91'+p:p;return `https://wa.me/${full}?text=${encodeURIComponent(text)}`;}
/* Open WhatsApp DIRECTLY. window.open(...,'_blank') is treated as a pop-up by most
   in-app browsers, which is what raises the "Open external link — Cancel/Open" box.
   A real <a> click inside the tap gesture counts as normal navigation instead. */
/* tel: hrefs get swallowed by some in-app browsers, and a number saved with spaces
   or +91 breaks the link. Clean it and fire the same anchor-click navigation. */
function callNum(phone){
  const p=String(phone||'').replace(/[^\d+]/g,'');
  if(!p){ toast(t('fu_no_phone'),'bad'); return; }
  const url='tel:'+p;
  try{
    const a=document.createElement('a');
    a.href=url; document.body.appendChild(a); a.click(); a.remove(); return;
  }catch(e){}
  try{ location.href=url; }catch(e){}
}
function waSend(phone,text){
  const url=waLink(phone,text);
  try{
    const a=document.createElement('a');
    a.href=url; a.rel='noopener';
    document.body.appendChild(a); a.click(); a.remove();
    return;
  }catch(e){}
  try{ location.href=url; }catch(e){ window.open(url,'_blank'); }
}

function buildSlipText(o,itemId){

  const multi=activeMembers(o).length>1;
  items.forEach(gid=>{const g=G(gid);if(!g)return;const cols=mcols(g),v=o.m[gid]||{};

  if(o.notes)s+='\nNote: '+o.notes+'\n';

/* master slip — each garment shown fully & clearly with full labels. No consolidation (avoids karigar length mistakes). Send only the relevant items via the item picker. */
function buildMasterText(o,gids){
  gids=(gids&&gids.length)?gids:sortItems(o.items);
  let s='PARAMPARA\nOrder #'+o.orderNo+'  ·  '+(o.customerName||'')+'\nDelivery: '+fmtDate(masterDate(o.deliveryDate))+'\n';
  const _bt=Array.isArray(o.bodyType)?o.bodyType.join(', '):(o.bodyType||''); if(_bt)s+='🧍 '+_bt+'\n';
    const _multi=activeMembers(o).length>1;
  sortItems(gids).forEach(gid=>{const g=G(gid);if(!g)return;const cols=mcols(g),v=o.m[gid]||{};
    const _who=_multi?memberLabel(o,memberOf(gid)):'';
    const vals=cols.filter(c=>v[c.k]).map(c=>c.n+' '+v[c.k]);
    s+='\n'+(g.ico||'▪')+' '+itemTitle(o,gid).toUpperCase()+(_who?('   [ '+_who+' ]'):'')+'\n'+(vals.join('  ·  ')||'-')+'\n';
    if(o.design&&o.design[gid])s+='Design: '+o.design[gid]+'\n';});
  if(o.notes)s+='\nNote: '+o.notes+'\n';
  return s;
}
async function shareMaster(o,gids,phone){
